<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>遊創舎スロット Ver.0.4</title>
<style>
body{
  margin:0;
  background:#111;
  color:white;
  font-family:sans-serif;
  text-align:center;
}
h1{margin-top:20px;}
.machine{
  width:340px;
  margin:20px auto;
  padding:20px;
  background:linear-gradient(#333,#111);
  border:6px solid #777;
  border-radius:20px;
  box-shadow:0 0 25px #000;
}
.lamp{
  width:90px;
  height:90px;
  margin:0 auto 15px;
  border-radius:50%;
  background:#333;
  border:4px solid #999;
}
.lamp.on{
  background:yellow;
  box-shadow:0 0 30px yellow,0 0 70px gold;
  animation:peka .25s infinite alternate;
}
@keyframes peka{
  from{transform:scale(1);}
  to{transform:scale(1.12);}
}
.reels{
  display:flex;
  justify-content:center;
  gap:10px;
  margin:20px 0;
}
.reel{
  width:85px;
  height:85px;
  line-height:85px;
  background:white;
  color:black;
  font-size:38px;
  border-radius:12px;
  border:4px solid #999;
}
button{
  font-size:18px;
  padding:14px 24px;
  margin:8px;
  border:none;
  border-radius:50px;
  background:linear-gradient(#f66,#900);
  color:white;
  box-shadow:0 6px #500;
}
button:active{
  transform:translateY(5px);
  box-shadow:0 1px #500;
}
.message{
  min-height:50px;
  font-size:22px;
  font-weight:bold;
  margin-top:15px;
}
.big{
  animation:bigflash .25s infinite alternate;
}
@keyframes bigflash{
  from{background:#111;}
  to{background:#700;}
}
</style>
</head>
<body>

<h1>遊創舎スロット Ver.0.4</h1>

<div class="machine">
  <div id="lamp" class="lamp"></div>

  <div class="reels">
    <div id="r1" class="reel">🍒</div>
    <div id="r2" class="reel">🍇</div>
    <div id="r3" class="reel">🔔</div>
  </div>

  <button onclick="spin()">レバーON</button>

  <div id="message" class="message">演出強化版 起動中</div>
  <div>メダル：<span id="medal">50</span></div>
</div>

<script>
const symbols = ["🍒","🍇","🔔","7️⃣","BAR"];
let medal = 50;
let spinning = false;

function randSymbol(){
  return symbols[Math.floor(Math.random()*symbols.length)];
}

function spin(){
  if(spinning) return;
  if(medal <= 0){
    message("メダルがありません");
    return;
  }

  spinning = true;
  medal -= 3;
  updateMedal();

  document.body.classList.remove("big");
  lampOff();
  message("リール回転中…");

  let count = 0;
  const interval = setInterval(()=>{
    r1.textContent = randSymbol();
    r2.textContent = randSymbol();
    r3.textContent = randSymbol();
    count++;

    if(count > 18){
      clearInterval(interval);
      result();
      spinning = false;
    }
  },80);
}

function result(){
  const n = Math.random();

  if(n < 0.08){
    r1.textContent = "7️⃣";
    r2.textContent = "7️⃣";
    r3.textContent = "7️⃣";
    medal += 100;
    bigBonus();
  }
  else if(n < 0.20){
    r1.textContent = "🍒";
    r2.textContent = randSymbol();
    r3.textContent = randSymbol();
    medal += 2;
    peka("チェリー +2枚");
  }
  else if(n < 0.35){
    r1.textContent = "🍇";
    r2.textContent = "🍇";
    r3.textContent = randSymbol();
    medal += 8;
    peka("ブドウ +8枚");
  }
  else if(n < 0.48){
    r1.textContent = "🔔";
    r2.textContent = "🔔";
    r3.textContent = "🔔";
    medal += 10;
    peka("ベル +10枚");
  }
  else{
    r1.textContent = randSymbol();
    r2.textContent = randSymbol();
    r3.textContent = randSymbol();
    message("ハズレ");
  }

  updateMedal();
}

function bigBonus(){
  lampOn();
  document.body.classList.add("big");
  message("✨ BIG BONUS ✨");
  setTimeout(()=>{
    document.body.classList.remove("big");
  },1800);
}

function peka(text){
  lampOn();
  message("ペカッ！ " + text);
  setTimeout(lampOff,900);
}

function lampOn(){
  document.getElementById("lamp").classList.add("on");
}

function lampOff(){
  document.getElementById("lamp").classList.remove("on");
}

function message(text){
  document.getElementById("message").textContent = text;
}

function updateMedal(){
  document.getElementById("medal").textContent = medal;
}
</script>

</body>
</html>
