<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>異世界転生サクセス UIモック Ver.0.1</title>
<style>
*{box-sizing:border-box;}

body{
  margin:0;
  background:#1b1b22;
  font-family:-apple-system,BlinkMacSystemFont,"Helvetica Neue",sans-serif;
  color:#2b2418;
}

.app{
  max-width:390px;
  min-height:100vh;
  margin:auto;
  background:#f4ead7;
  padding:8px;
}

.panel{
  background:#fff8e8;
  border:2px solid #b8955a;
  border-radius:12px;
  padding:8px;
  margin-bottom:8px;
  box-shadow:0 2px 0 rgba(0,0,0,.15);
}

.title{
  text-align:center;
  font-weight:800;
  font-size:20px;
  letter-spacing:1px;
  background:#2d3b55;
  color:#fff4c4;
}

.hero{
  display:grid;
  grid-template-columns:78px 1fr 72px;
  gap:8px;
  align-items:center;
}

.chara{
  height:92px;
  border:2px solid #8b6f3d;
  border-radius:10px;
  background:linear-gradient(#fff,#e7d2a5);
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:13px;
  text-align:center;
  font-weight:bold;
}

.info div{
  font-size:13px;
  line-height:1.55;
}

.reserve{
  height:92px;
  border:1px dashed #c8b37d;
  border-radius:10px;
  opacity:.55;
}

.grid3{
  display:grid;
  grid-template-columns:1fr 1fr 1fr;
  gap:5px;
}

.cell{
  background:#f8edcf;
  border:1px solid #d4b77c;
  border-radius:8px;
  padding:5px;
  font-size:12px;
  min-height:30px;
}

.section-title{
  font-size:13px;
  font-weight:800;
  margin-bottom:6px;
  color:#5b431d;
}

.equip-item{
  border-bottom:1px solid #d7bd84;
  padding:5px 0;
  font-size:12px;
}

.equip-item:last-child{border-bottom:none;}

.equip-name{
  font-weight:700;
}

.effect{
  padding-left:12px;
  color:#4d3a1d;
  font-size:11px;
  line-height:1.45;
}

.actions{
  display:grid;
  grid-template-columns:1fr 1fr 1fr;
  gap:6px;
}

button{
  border:none;
  border-radius:10px;
  padding:9px 4px;
  background:#2d3b55;
  color:#fff4c4;
  font-weight:700;
  font-size:13px;
}

.log{
  height:92px;
  overflow-y:auto;
  background:#2b2418;
  color:#fff5d8;
  border-radius:8px;
  padding:7px;
  font-size:11px;
  line-height:1.55;
}

.bottom{
  position:sticky;
  bottom:0;
  display:grid;
  grid-template-columns:repeat(5,1fr);
  gap:4px;
  background:#f4ead7;
  padding-top:4px;
}

.bottom button{
  font-size:11px;
  padding:8px 2px;
}
</style>
</head>
<body>

<div class="app">

  <div class="panel title">異世界転生サクセス</div>

  <div class="panel hero">
    <div class="chara">3頭身<br>ミニキャラ</div>
    <div class="info">
      <div>名前：主人公</div>
      <div>転生先：村人</div>
      <div>職業：村人</div>
      <div>年齢：10歳</div>
      <div>1年目・1月</div>
    </div>
    <div class="reserve"></div>
  </div>

  <div class="panel">
    <div class="section-title">基本ステータス</div>
    <div class="grid3">
      <div class="cell">健康：良好</div>
      <div class="cell">所持金：50G</div>
      <div class="cell">予約</div>
      <div class="cell">疲労：100</div>
      <div class="cell">名声：0</div>
      <div class="cell">予約</div>
      <div class="cell">状態：なし</div>
      <div class="cell">予約</div>
      <div class="cell">予約</div>
    </div>
  </div>

  <div class="panel">
    <div class="section-title">能力値</div>
    <div class="grid3">
      <div class="cell">筋力：12</div>
      <div class="cell">知力：10</div>
      <div class="cell">魅力：8</div>
      <div class="cell">魔力：6</div>
      <div class="cell">器用：11</div>
      <div class="cell">運：9</div>
      <div class="cell">予約</div>
      <div class="cell">予約</div>
      <div class="cell">予約</div>
    </div>
  </div>

  <div class="panel">
    <div class="section-title">装備</div>
    <div class="equip-item">
      <div class="equip-name">武器：木の剣</div>
      <div class="effect">・筋力 +2<br>・冒険成功率 +1%</div>
    </div>
    <div class="equip-item">
      <div class="equip-name">頭防具：なし</div>
      <div class="effect">・効果なし</div>
    </div>
    <div class="equip-item">
      <div class="equip-name">胴防具：布の服</div>
      <div class="effect">・健康 +1</div>
    </div>
    <div class="equip-item">
      <div class="equip-name">装飾品①：なし</div>
      <div class="effect">・効果なし</div>
    </div>
    <div class="equip-item">
      <div class="equip-name">装飾品②：なし</div>
      <div class="effect">・効果なし</div>
    </div>
  </div>

  <div class="panel">
    <div class="section-title">行動</div>
    <div class="actions">
      <button>訓練</button>
      <button>学習</button>
      <button>冒険</button>
      <button>仕事</button>
      <button>休息</button>
      <button>特殊</button>
      <button>予約</button>
      <button>予約</button>
      <button>予約</button>
    </div>
  </div>

  <div class="panel">
    <div class="section-title">ログ</div>
    <div class="log">
      ▶ 1年目 1月<br>
      ・異世界での人生が始まった<br>
      ・転生先は村人だった<br>
      ・職業は村人です<br>
    </div>
  </div>

  <div class="bottom">
    <button>メイン</button>
    <button>記録</button>
    <button>所持品</button>
    <button>図鑑</button>
    <button>設定</button>
  </div>

</div>

</body>
</html>
