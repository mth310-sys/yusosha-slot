<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>リールバトルRPG Ver.RB-0.3</title>
<style>
*{box-sizing:border-box}
body{margin:0;background:#111;color:#fff;font-family:sans-serif;text-align:center}
.wrap{max-width:390px;margin:auto;padding:12px}
.panel{background:#1e1e1e;border:1px solid #444;border-radius:12px;padding:12px;margin-bottom:10px}
h1{font-size:24px;margin:16px 0}
h2{font-size:26px;margin:16px 0}
.status{display:flex;gap:8px}
.box{flex:1;background:#2b2b2b;border-radius:10px;padding:10px;font-size:18px}
.reels{display:flex;gap:10px;justify-content:center;margin:18px 0}
.reelWrap{display:flex;flex-direction:column;align-items:center}
.reel{width:70px;height:82px;background:#fff;color:#111;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:44px;font-weight:bold}
.reelLabel{margin-top:8px;font-size:14px;color:#bbb;font-weight:bold}
.hint{font-size:20px;font-weight:bold;margin:8px 0 12px;color:#ddd}
button{width:100%;padding:14px;border:0;border-radius:12px;font-size:20px;font-weight:bold;margin-top:12px}
.main{background:#ffd54a;color:#0784ff}
.log{min-height:90px;text-align:left;white-space:pre-line;line-height:1.55;font-size:18px}
</style>
</head>
<body>
<div class="wrap">
<h1>リールバトルRPG</h1>
<div id="scene"></div>
</div>

<script>
const nums=[1,2,3,4,5,6,7];

const characters=[{
  name:"主人公",level:1,hp:120,maxHp:120,exp:0,nextExp:100,gold:0,
  skills:["斬撃","強打","二連撃","火炎斬り","雷撃","必殺技","奥義"]
}];

const enemies=[{
  name:"スライム",hp:100,maxHp:100,baseExp:10,baseGold:20,
  skills:["体当たり","跳ねる","粘液","ぶつかる","強打","突進","怒り"]
}];

let party=[copy(characters[0])];
let enemy=null;
let phase="party";
let battleStep="turnSpin";
let turnOwner=null;
let lastRoll=[1,1,1];
let logText="";
let lastReward=null;

function copy(o){return JSON.parse(JSON.stringify(o))}
function roll(){return [1,2,3].map(()=>nums[Math.floor(Math.random()*nums.length)])}

function calcAttack(actor){
  const r=roll();
  const skill=actor.skills[r[0]-1];
  const baseDamage=r[1]*10;
  const mult=[1,2,3,4,5,7,10][r[2]-1];
  const damage=baseDamage*mult;
  return {r,skill,baseDamage,mult,damage};
}

function calcReward(enemy){
  const r=roll();
  const type=r[0]%2===0?"gold":"exp";
  const m1=r[1]%2===0?2:1;
  const m2=r[2]%2===0?4:3;
  const base=type==="exp"?enemy.baseExp:enemy.baseGold;
  const total=base*m1*m2;
  return {r,type,m1,m2,base,total};
}

function render(){
  const p=party[0];

  if(phase==="party"){
    scene.innerHTML=`
    <div class="panel">
      <h2>仲間選択</h2>
      <p>現在は主人公のみ</p>
      <div class="box">
        ${p.name} Lv${p.level}<br>
        HP ${p.hp}/${p.maxHp}<br>
        EXP ${p.exp}/${p.nextExp}<br>
        GOLD ${p.gold}
      </div>
      <button class="main" onclick="goStage()">ステージ選択へ</button>
    </div>`;
    return;
  }

  if(phase==="stage"){
    scene.innerHTML=`
    <div class="panel">
      <h2>ステージ選択</h2>
      <button class="main" onclick="startBattle()">草原へ進む</button>
    </div>`;
    return;
  }

  const title={
    turnSpin:"ターン判定",
    turnResult:"ターン判定結果",
    attackSpin:"攻撃パート",
    attackResult:"攻撃パート結果",
    rewardSpin:"報酬チャンス",
    rewardResult:"報酬チャンス結果"
  }[battleStep];

  const btn={
    turnSpin:"SPIN",
    turnResult:"攻撃パートへ",
    attackSpin:"SPIN",
    attackResult:getAttackResultButton(),
    rewardSpin:"SPIN",
    rewardResult:"仲間選択へ"
  }[battleStep];

  scene.innerHTML=`
  ${battleStep!=="rewardSpin"&&battleStep!=="rewardResult"?`
  <div class="status">
    <div class="box">${p.name}<br>HP ${p.hp}/${p.maxHp}</div>
    <div class="box">${enemy.name}<br>HP ${enemy.hp}/${enemy.maxHp}</div>
  </div>`:""}

  <div class="panel">
    <h2>${title}</h2>
    ${getHint()}
    ${renderReels()}
    <div class="log">${logText}</div>
    <button class="main" onclick="nextAction()">${btn}</button>
  </div>`;
}

function getHint(){
  if(battleStep==="turnSpin") return `<div class="hint">偶数 ← ターン判定 → 奇数</div>`;
  if(battleStep==="rewardSpin") return `<div class="hint">奇数 EXP　偶数 GOLD</div>`;
  return "";
}

function renderReels(){
  let labels=["","",""];

  if(battleStep==="attackSpin"){
    labels=["技","ﾀﾞﾒｰｼﾞ","倍率"];
  }

  if(battleStep==="rewardSpin"){
    labels=["報酬","×1/×2","×3/×4"];
  }

  return `
  <div class="reels">
    ${lastRoll.map((n,i)=>`
    <div class="reelWrap">
      <div class="reel">${n}</div>
      ${labels[i]?`<div class="reelLabel">${labels[i]}</div>`:""}
    </div>`).join("")}
  </div>`;
}

function getAttackResultButton(){
  const p=party[0];
  if(enemy.hp<=0)return"報酬チャンスへ";
  if(p.hp<=0)return"仲間選択へ";
  return"次のターン判定へ";
}

function goStage(){
  phase="stage";
  render();
}

function startBattle(){
  enemy=copy(enemies[0]);
  phase="battle";
  battleStep="turnSpin";
  lastRoll=[1,1,1];
  logText="";
  render();
}

function nextAction(){
  const p=party[0];

  if(battleStep==="turnSpin"){
    lastRoll=roll();
    const sum=lastRoll[0]+lastRoll[1]+lastRoll[2];
    turnOwner=sum%2===0?"player":"enemy";
    logText=`合計 ${sum}\n${turnOwner==="player"?"プレイヤーターン！":"敵ターン！"}`;
    battleStep="turnResult";
    render();
    return;
  }

  if(battleStep==="turnResult"){
    battleStep="attackSpin";
    lastRoll=[1,1,1];
    logText="";
    render();
    return;
  }

  if(battleStep==="attackSpin"){
    const actor=turnOwner==="player"?p:enemy;
    const a=calcAttack(actor);
    lastRoll=a.r;

    if(turnOwner==="player"){
      enemy.hp-=a.damage;
      if(enemy.hp<0)enemy.hp=0;
      logText=`${p.name}の${a.skill}！\n${a.baseDamage} × ${a.mult}\n${a.damage}ダメージ！`;
      if(enemy.hp<=0)logText+=`\n\n${enemy.name}を倒した！`;
    }else{
      p.hp-=a.damage;
      if(p.hp<0)p.hp=0;
      logText=`${enemy.name}の${a.skill}！\n${a.baseDamage} × ${a.mult}\n${a.damage}ダメージ！`;
      if(p.hp<=0)logText+=`\n\n敗北…`;
    }

    battleStep="attackResult";
    render();
    return;
  }

  if(battleStep==="attackResult"){
    if(enemy.hp<=0){
      battleStep="rewardSpin";
      lastRoll=[1,1,1];
      logText="";
      render();
      return;
    }

    if(p.hp<=0){
      p.hp=p.maxHp;
      phase="party";
      render();
      return;
    }

    battleStep="turnSpin";
    lastRoll=[1,1,1];
    logText="";
    render();
    return;
  }

  if(battleStep==="rewardSpin"){
    lastReward=calcReward(enemy);
    lastRoll=lastReward.r;

    if(lastReward.type==="exp"){
      p.exp+=lastReward.total;
      logText=`EXP獲得！\n${lastReward.base} × ${lastReward.m1} × ${lastReward.m2}\n${lastReward.total}EXP`;

      if(p.exp>=p.nextExp){
        p.exp-=p.nextExp;
        p.level++;
        p.nextExp+=100;
        p.maxHp+=20;
        p.hp=p.maxHp;
        logText+=`\n\nレベルアップ！ Lv${p.level}`;
      }
    }else{
      p.gold+=lastReward.total;
      logText=`GOLD獲得！\n${lastReward.base} × ${lastReward.m1} × ${lastReward.m2}\n${lastReward.total}GOLD`;
    }

    battleStep="rewardResult";
    render();
    return;
  }

  if(battleStep==="rewardResult"){
    phase="party";
    render();
    return;
  }
}

render();
</script>
</body>
</html>
