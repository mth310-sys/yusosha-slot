<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>七つの刻印 Ver.0.4.0 画像筐体版</title>
<style>
*{box-sizing:border-box}

body{
  margin:0;
  background:radial-gradient(circle,#2b1245,#020005 72%);
  color:white;
  font-family:sans-serif;
  text-align:center;
}

.wrap{
  max-width:430px;
  margin:auto;
  padding:6px;
}

.machine{
  position:relative;
  width:100%;
  aspect-ratio:525/990;
  margin:auto;
  overflow:hidden;
  filter:drop-shadow(0 0 24px #9b4dff);
}

.base{
  position:absolute;
  inset:0;
  width:100%;
  height:100%;
  object-fit:contain;
  z-index:1;
  pointer-events:none;
}

.layer{
  position:absolute;
  inset:0;
  z-index:2;
}

.lcd{
  position:absolute;
  left:12%;
  top:8%;
  width:76%;
  height:26%;
  border-radius:10px;
  overflow:hidden;
}

.lcd img{
  width:100%;
  height:100%;
  object-fit:cover;
}

.modeBar{
  position:absolute;
  left:12%;
  top:34.8%;
  width:76%;
}

.modeBar img{
  width:100%;
  display:block;
}

.reels{
  position:absolute;
  left:18%;
  top:42.5%;
  width:64%;
  height:14.5%;
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:3%;
  padding:2%;
}

.reel{
  background:linear-gradient(#fff,#ddd);
  border:3px solid #d7c6ff;
  border-radius:10px;
  color:#22002f;
  font-size:16px;
  font-weight:bold;
  display:flex;
  align-items:center;
  justify-content:center;
  box-shadow:inset 0 0 12px #000,0 0 8px #8b4dff;
}

.spin{
  animation:spin .12s infinite;
}

@keyframes spin{
  50%{transform:translateY(4px);filter:blur(1px)}
}

.status{
  position:absolute;
  left:15%;
  top:59%;
  width:70%;
  font-size:12px;
  color:#ffeab7;
  text-shadow:0 0 8px #b45cff;
  font-weight:bold;
}

.info{
  position:absolute;
  left:15%;
  top:63.5%;
  width:70%;
  display:grid;
  grid-template-columns:1fr 1fr 1fr;
  gap:4px;
}

.info div{
  background:rgba(0,0,0,.75);
  border:1px solid #8b4dff;
  border-radius:8px;
  padding:3px;
  font-size:10px;
}

.info b{
  display:block;
  font-size:16px;
  color:#7dff9b;
  text-shadow:0 0 8px #4dff78;
}

.controls{
  position:absolute;
  left:13%;
  top:69%;
  width:74%;
  display:flex;
  justify-content:center;
  gap:4px;
}

button{
  border:none;
  border-radius:10px;
  padding:8px 9px;
  font-weight:bold;
  color:white;
  background:linear-gradient(#c8a8ff,#6d22c9,#260045);
  box-shadow:0 3px 0 #100018,0 0 8px #8b4dff;
}

button:disabled{
  opacity:.35;
}

.reset{
  background:linear-gradient(#777,#111);
}

.stopArea{
  position:absolute;
  left:20%;
  top:75%;
  width:60%;
  display:flex;
  justify-content:space-around;
}

.stop{
  width:58px;
  height:58px;
  border-radius:50%;
  background:radial-gradient(circle at 35% 25%,#ffc0c0,#ff3030 38%,#a00000 68%,#3a0000);
  box-shadow:0 0 14px rgba(255,0,0,.65),0 5px 0 #240000;
  font-size:11px;
}

.lower{
  position:absolute;
  left:10%;
  top:82%;
  width:80%;
}

.lower img{
  width:100%;
  display:block;
  border-radius:8px;
}

.msg{
  position:absolute;
  left:10%;
  top:79.2%;
  width:80%;
  min-height:20px;
  color:#fff3a0;
  font-size:12px;
  font-weight:bold;
  text-shadow:0 0 8px #b45cff;
}
</style>
</head>

<body>
<div class="wrap">
  <div class="machine">
    <img class="base" src="machine_base_full.png" alt="七つの刻印 筐体">

    <div class="layer">
      <div class="lcd">
        <img src="main_lcd_area.png" alt="液晶">
      </div>

      <div class="modeBar">
        <img src="mode_777_bell_bar.png" alt="モードバー">
      </div>

      <div class="reels">
        <div id="r0" class="reel">刻印</div>
        <div id="r1" class="reel">ベル</div>
        <div id="r2" class="reel">リプ</div>
      </div>

      <div class="status">
        STATE：<span id="stateView">通常</span>
      </div>

      <div class="info">
        <div>CREDIT<b id="creditView">100</b></div>
        <div>BET<b id="betView">0</b></div>
        <div>PAY<b id="payView">0</b></div>
      </div>

      <div class="controls">
        <button id="betBtn">BET</button>
        <button id="maxBetBtn">MAX</button>
        <button id="startBtn">START</button>
        <button id="resetBtn" class="reset">RESET</button>
      </div>

      <div class="stopArea">
        <button id="s0" class="stop">STOP</button>
        <button id="s1" class="stop">STOP</button>
        <button id="s2" class="stop">STOP</button>
      </div>

      <div id="msg" class="msg">BETしてください</div>

      <div class="lower">
        <img src="sins_lower_panel.png" alt="Seven Deadly Sins 下パネル">
      </div>
    </div>
  </div>
</div>

<script>
let credit=100;
let bet=0;
let pay=0;
let spinning=false;
let stopped=0;
let result=["刻印","ベル","リプ"];

const $=id=>document.getElementById(id);

function update(){
  $("creditView").textContent=credit;
  $("betView").textContent=bet;
  $("payView").textContent=pay;

  $("betBtn").disabled=spinning||bet>=3||credit<=0;
  $("maxBetBtn").disabled=spinning||bet>=3||credit<(3-bet);
  $("startBtn").disabled=spinning||bet!==3;

  for(let i=0;i<3;i++){
    $("s"+i).disabled=!spinning;
  }
}

function message(t){
  $("msg").textContent=t;
}

function betOne(){
  if(spinning||bet>=3||credit<=0)return;
  credit--;
  bet++;
  message(bet===3?"STARTできます":"3BETしてください");
  update();
}

function maxBet(){
  if(spinning||bet>=3)return;
  const need=3-bet;
  if(credit<need){
    message("クレジット不足");
    return;
  }
  credit-=need;
  bet=3;
  message("MAX BET");
  update();
}

function start(){
  if(spinning||bet!==3)return;

  spinning=true;
  stopped=0;
  pay=0;

  const patterns=[
    ["刻印","刻印","刻印"],
    ["青紫7","青紫7","青紫7"],
    ["ベル","ベル","ベル"],
    ["チェリー","刻印","ベル"],
    ["リプ","リプ","リプ"],
    ["ベル","赤7","リプ"]
  ];

  result=patterns[Math.floor(Math.random()*patterns.length)];

  for(let i=0;i<3;i++){
    $("r"+i).classList.add("spin");
    $("r"+i).textContent=["赤7","青紫7","ベル","リプ","刻印"][Math.floor(Math.random()*5)];
  }

  message("リール回転中");
  update();
}

function stop(i){
  if(!spinning)return;

  $("r"+i).classList.remove("spin");
  $("r"+i).textContent=result[i];

  stopped++;

  if(stopped===3){
    spinning=false;
    bet=0;

    if(result.join("")==="刻印刻印刻印"){
      pay=0;
      $("stateView").textContent="守護者MODE";
      message("刻印揃い！守護者MODE確定");
    }else if(result.join("")==="青紫7青紫7青紫7"){
      pay=100;
      credit+=pay;
      $("stateView").textContent="終焉ノ刻";
      message("青紫7揃い！終焉ノ刻");
    }else if(result.join("")==="ベルベルベル"){
      pay=8;
      credit+=pay;
      message("ベル 8枚");
    }else if(result.join("")==="リプリプリプ"){
      pay=0;
      message("リプレイ");
    }else{
      pay=0;
      message("ハズレ");
    }
  }

  update();
}

function reset(){
  credit=100;
  bet=0;
  pay=0;
  spinning=false;
  stopped=0;
  result=["刻印","ベル","リプ"];
  $("stateView").textContent="通常";

  for(let i=0;i<3;i++){
    $("r"+i).classList.remove("spin");
    $("r"+i).textContent=result[i];
  }

  message("BETしてください");
  update();
}

$("betBtn").onclick=betOne;
$("maxBetBtn").onclick=maxBet;
$("startBtn").onclick=start;
$("resetBtn").onclick=reset;
$("s0").onclick=()=>stop(0);
$("s1").onclick=()=>stop(1);
$("s2").onclick=()=>stop(2);

update();
</script>
</body>
</html>
