<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>遊創舎スロット Ver.0.4.3</title>
<style>
*{box-sizing:border-box;}

body{
  margin:0;
  background:radial-gradient(circle,#1b1b1b,#020202);
  color:white;
  font-family:sans-serif;
  text-align:center;
}

.wrap{
  max-width:390px;
  margin:auto;
  padding:4px;
}

.machine{
  background:linear-gradient(145deg,#050505,#151515,#050505);
  border:4px solid #9a9a9a;
  border-radius:20px;
  padding:7px;
  box-shadow:
    0 0 18px #0077ff,
    inset 0 0 18px #000;
  position:relative;
}

.machine:before{
  content:"";
  position:absolute;
  inset:6px;
  border:2px solid #005dff;
  border-radius:16px;
  box-shadow:0 0 18px #008cff;
  pointer-events:none;
}

.top-panel{
  background:linear-gradient(#111,#050505);
  border:2px solid #555;
  border-radius:14px;
  padding:7px;
  margin-bottom:6px;
  box-shadow:inset 0 0 12px #000;
}

.logo{
  font-size:14px;
  color:#9cff9c;
  font-weight:bold;
}

h1{
  font-size:26px;
  margin:4px 0;
  color:#ffd34f;
  text-shadow:0 0 14px #ffb000;
}

.version{
  font-size:11px;
  color:#eee;
}

.center-panel{
  background:#050505;
  border:2px solid #444;
  border-radius:14px;
  padding:7px;
  margin-bottom:6px;
}

.reel-area{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:7px;
}

.lamp{
  width:54px;
  height:54px;
  border-radius:8px;
  background:#1a1200;
  border:3px solid #a06b00;
  color:#ffcc3d;
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:bold;
  font-size:14px;
  box-shadow:inset 0 0 10px #000;
}

.lamp.on{
  background:gold;
  color:#442200;
  box-shadow:0 0 28px gold,0 0 55px orange;
  animation:peka 0.7s infinite alternate;
}

.reels{
  display:flex;
  justify-content:center;
  gap:6px;
}

.reel{
  width:75px;
  height:92px;
  background:linear-gradient(#fff,#ddd);
  color:#111;
  border-radius:9px;
  border:3px solid #777;
  box-shadow:
    inset 0 0 12px #aaa,
    0 0 8px #111;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:28px;
  font-weight:bold;
}

.msg{
  color:#ffd76b;
  font-weight:bold;
  min-height:27px;
  margin:6px 0 2px;
  font-size:18px;
  text-shadow:0 0 8px #a06000;
}

.msg.big{
  color:#fff200;
  font-size:21px;
  animation:bigFlash 0.6s infinite alternate;
}

.info-panel{
  display:flex;
  justify-content:space-around;
  background:#020202;
  border:2px solid #444;
  border-radius:12px;
  padding:7px;
  margin-bottom:7px;
}

.info-box{
  width:32%;
  border-right:1px solid #222;
}

.info-box:last-child{
  border-right:none;
}

.info-label{
  font-size:10px;
  color:#ddd;
}

.info-value{
  font-size:28px;
  font-weight:bold;
  color:#ff2a2a;
  font-family:monospace;
  text-shadow:0 0 10px red;
}

.control-panel{
  display:grid;
  grid-template-columns:1.15fr 1fr 1fr;
  gap:7px;
  background:#111;
  border:2px solid #555;
  border-radius:13px;
  padding:8px;
  margin-bottom:7px;
}

.stop-panel{
  display:grid;
  grid-template-columns:1fr 1fr 1fr;
  gap:7px;
  background:#101010;
  border:2px solid #555;
  border-radius:13px;
  padding:9px;
  margin-bottom:7px;
}

button{
  width:100%;
  font-size:15px;
  font-weight:bold;
  padding:10px 2px;
  border:none;
  border-radius:10px;
  color:white;
  box-shadow:
    inset 0 2px 4px rgba(255,255,255,.5),
    inset 0 -4px 8px rgba(0,0,0,.5),
    0 3px 0 #111;
}

.btn-lever{
  background:linear-gradient(#ff6b5f,#b00000);
}

.btn-bet{
  background:linear-gradient(#4cff76,#00751c);
}

.stop{
  background:linear-gradient(#39aaff,#003dba);
  font-size:17px;
  box-shadow:
    inset 0 2px 5px rgba(255,255,255,.6),
    inset 0 -4px 10px rgba(0,0,0,.6),
    0 0 12px #0077ff;
}

.reset{
  background:linear-gradient(#999,#444);
  color:white;
  font-size:12px;
  padding:7px 18px;
  width:auto;
  margin-bottom:4px;
}

button:disabled{
  opacity:0.35;
}

.role{
  font-size:11px;
  color:#ddd;
  line-height:1.35;
}

.reel.stopFlash{
  animation:stopFlash 0.25s;
}

.payEffect{
  position:fixed;
  top:45%;
  left:50%;
  transform:translate(-50%,-50%);
  font-size:36px;
  font-weight:bold;
  color:#fff200;
  text-shadow:0 0 18px orange;
  display:none;
  pointer-events:none;
}

.payEffect.show{
  display:block;
  animation:payPop 1s forwards;
}

.flash{
  animation:screenFlash 0.35s 4;
}

@keyframes stopFlash{
  0%{transform:scale(1.12);}
  100%{transform:scale(1);}
}

@keyframes peka{
  from{transform:scale(1);filter:brightness(1);}
  to{transform:scale(1.08);filter:brightness(1.7);}
}

@keyframes bigFlash{
  from{text-shadow:0 0 8px yellow;}
  to{text-shadow:0 0 24px red;transform:scale(1.05);}
}

@keyframes payPop{
  0%{opacity:0;transform:translate(-50%,-30%) scale(0.5);}
  30%{opacity:1;transform:translate(-50%,-50%) scale(1.2);}
  100%{opacity:0;transform:translate(-50%,-90%) scale(1);}
}

@keyframes screenFlash{
  0%{background:white;}
  100%{background:radial-gradient(circle,#1b1b1b,#020202);}
}
</style>
</head>

<body>
<div class="wrap">
  <div class="machine">

    <div class="top-panel">
      <div class="logo">🌱 遊創舎</div>
      <h1>遊創舎スロット</h1>
      <div class="version">Ver.0.4.3 画面内収め・操作横一列版</div>
    </div>

    <div class="center-panel">
      <div class="reel-area">
        <div id="lamp" class="lamp">PEKA</div>

        <div class="reels">
          <div id="r1" class="reel">🍒</div>
          <div id="r2" class="reel">🍇</div>
          <div id="r3" class="reel">🔔</div>
        </div>
      </div>

      <div id="msg" class="msg">BETしてください</div>
    </div>

    <div class="info-panel">
      <div class="info-box">
        <div class="info-label">CREDIT</div>
        <div id="credit" class="info-value">50</div>
      </div>
      <div class="info-box">
        <div class="info-label">BET</div>
        <div id="bet" class="info-value">0</div>
      </div>
      <div class="info-box">
        <div class="info-label">PAYOUT</div>
        <div id="pay" class="info-value">0</div>
      </div>
    </div>

    <div class="control-panel">
      <button id="startBtn" class="btn-lever" onclick="start()" disabled>START<br>レバー</button>
      <button class="btn-bet" onclick="betOne()">BET</button>
      <button class="btn-bet" onclick="maxBet()">MAX<br>BET</button>
    </div>

    <div class="stop-panel">
      <button id="s1" class="stop" onclick="stop(0)" disabled>STOP</button>
      <button id="s2" class="stop" onclick="stop(1)" disabled>STOP</button>
      <button id="s3" class="stop" onclick="stop(2)" disabled>STOP</button>
    </div>

    <button class="reset" onclick="resetGame()">リセット</button>

    <div class="role">
      777：BIG 50枚 / 🍇：8枚 / 🔔：10枚 / 🍒：2枚
    </div>

  </div>
</div>

<div id="payEffect" class="payEffect"></div>

<script>
const symbols = ["7","BAR","🍒","🍇","🔔","⭐"];

let credit = 50;
let bet = 0;
let pay = 0;
let reels = ["🍒","🍇","🔔"];
let spinning = [false,false,false];
let timers = [null,null,null];
let stopped = 0;
let bonus = false;

function update(){
  document.getElementById("credit").textContent = credit;
  document.getElementById("bet").textContent = bet;
  document.getElementById("pay").textContent = pay;

  document.getElementById("startBtn").disabled = bet !== 3 || spinning.includes(true);

  for(let i=0;i<3;i++){
    document.getElementById("s"+(i+1)).disabled = !spinning[i];
  }
}

function msg(t,big=false){
  const m = document.getElementById("msg");
  m.textContent = t;
  m.classList.toggle("big",big);
}

function rand(){
  return symbols[Math.floor(Math.random()*symbols.length)];
}

function betOne(){
  if(credit <= 0 || bet >= 3 || spinning.includes(true)) return;

  credit--;
  bet++;
  pay = 0;

  document.getElementById("lamp").classList.remove("on");
  msg(bet === 3 ? "STARTできます" : "BET中");

  update();
}

function maxBet(){
  if(spinning.includes(true)) return;

  while(bet < 3 && credit > 0){
    credit--;
    bet++;
  }

  pay = 0;
  document.getElementById("lamp").classList.remove("on");
  msg(bet === 3 ? "STARTできます" : "クレジット不足");

  update();
}

function start(){
  if(bet !== 3) return;

  stopped = 0;
  pay = 0;
  bonus = Math.random() < 0.06;

  if(bonus){
    document.getElementById("lamp").classList.add("on");
    msg("ペカッ！");
  }else{
    document.getElementById("lamp").classList.remove("on");
    msg("リール回転中");
  }

  for(let i=0;i<3;i++){
    spinning[i] = true;
    timers[i] = setInterval(()=>{
      reels[i] = rand();
      document.getElementById("r"+(i+1)).textContent = reels[i];
    },70);
  }

  update();
}

function stop(i){
  if(!spinning[i]) return;

  clearInterval(timers[i]);
  spinning[i] = false;

  if(bonus){
    reels[i] = "7";
  }else{
    reels[i] = rand();
  }

  const reelEl = document.getElementById("r"+(i+1));
  reelEl.textContent = reels[i];
  reelEl.classList.remove("stopFlash");
  void reelEl.offsetWidth;
  reelEl.classList.add("stopFlash");

  stopped++;

  if(stopped === 3){
    judge();
  }

  update();
}

function showPayEffect(amount){
  if(amount <= 0) return;

  const effect = document.getElementById("payEffect");
  effect.textContent = "+" + amount;
  effect.classList.remove("show");
  void effect.offsetWidth;
  effect.classList.add("show");
}

function judge(){
  if(reels[0] === "7" && reels[1] === "7" && reels[2] === "7"){
    pay = 50;
    credit += pay;
    document.getElementById("lamp").classList.add("on");
    document.body.classList.add("flash");

    setTimeout(()=>{
      document.body.classList.remove("flash");
    },1500);

    msg("BIG BONUS！！",true);
    showPayEffect(pay);

  }else if(reels[0] === "🍇" && reels[1] === "🍇" && reels[2] === "🍇"){
    pay = 8;
    credit += pay;
    msg("ブドウ 8枚");
    showPayEffect(pay);

  }else if(reels[0] === "🔔" && reels[1] === "🔔" && reels[2] === "🔔"){
    pay = 10;
    credit += pay;
    msg("ベル 10枚");
    showPayEffect(pay);

  }else if(reels.includes("🍒")){
    pay = 2;
    credit += pay;
    msg("チェリー 2枚");
    showPayEffect(pay);

  }else{
    pay = 0;
    msg("ハズレ");
  }

  bet = 0;
  update();
}

function resetGame(){
  for(let i=0;i<3;i++){
    clearInterval(timers[i]);
  }

  credit = 50;
  bet = 0;
  pay = 0;
  reels = ["🍒","🍇","🔔"];
  spinning = [false,false,false];
  stopped = 0;
  bonus = false;

  for(let i=0;i<3;i++){
    document.getElementById("r"+(i+1)).textContent = reels[i];
  }

  document.getElementById("lamp").classList.remove("on");
  document.body.classList.remove("flash");
  msg("BETしてください");

  update();
}

update();
</script>
</body>
</html>
