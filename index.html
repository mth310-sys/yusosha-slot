<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>七つの刻印 Ver.0.4.0</title>
<style>
*{box-sizing:border-box}
body{
  margin:0;
  background:radial-gradient(circle,#2b1245,#020005 72%);
  color:#fff;
  font-family:sans-serif;
  text-align:center;
}
.wrap{max-width:440px;margin:auto;padding:6px}
.machine{
  position:relative;
  overflow:hidden;
  border:10px solid #050505;
  border-radius:34px;
  padding:8px 12px 12px;
  background:
    linear-gradient(90deg,rgba(255,255,255,.65),rgba(0,0,0,.25),rgba(145,65,255,.3),rgba(0,0,0,.3),rgba(255,255,255,.65)),
    linear-gradient(135deg,#eee,#15131a 18%,#2b1640,#08060d,#35195c,#fff);
  box-shadow:0 0 42px #9b4dff,inset 0 0 58px #000,inset 0 0 0 7px rgba(255,255,255,.12);
}
.machine>*{position:relative;z-index:2}
.sideMetal{
  position:absolute;top:38px;width:32px;height:78%;z-index:1;border-radius:18px;
  background:linear-gradient(90deg,#050505,#444,#fff,#7d39ff,#1b0030);
  box-shadow:inset 0 0 22px #fff,inset 0 0 22px #000,0 0 22px #b45cff;
}
.sideMetal.left{left:4px}.sideMetal.right{right:4px;transform:scaleX(-1)}

.topUnit{
  height:42px;border-radius:18px;margin-bottom:5px;
  background:linear-gradient(135deg,#08000d,#2d0048,#050008);
  box-shadow:inset 0 0 18px #000,0 0 18px #b45cff;
  display:flex;align-items:center;justify-content:center;
}
.topUnit b{font-size:22px;color:#ead7ff;text-shadow:0 0 10px #fff,0 0 18px #9b4dff}

.panel{
  margin:5px 0;padding:5px;border:2px solid #c6a8ff;border-radius:16px;
  background:linear-gradient(180deg,rgba(255,255,255,.18),rgba(80,0,120,.82) 12%,rgba(10,0,20,.9) 72%,rgba(180,130,255,.2));
  box-shadow:inset 0 0 16px #000,0 0 12px rgba(180,92,255,.7);
}
.upperArt{overflow:hidden;border-radius:14px;border:2px solid rgba(255,255,255,.18);box-shadow:0 0 18px #8b4dff,inset 0 0 24px #000}
.panelImg{width:100%;display:block;border-radius:12px}

.modeBar{
  display:grid;grid-template-columns:1.1fr 1fr 1.1fr;gap:4px;align-items:center;
  padding:6px;border-radius:14px;background:#050008;border:2px solid #7d39ff;
  box-shadow:inset 0 0 14px #000,0 0 12px #8b4dff;
}
.modeBox,.chargeBox{font-size:11px;color:#ffeab7;text-shadow:0 0 8px #b45cff}
.modeBox b{color:#ff4040;font-size:14px}
.center777{display:flex;justify-content:center;gap:4px}
.center777 img{width:42px;height:30px;object-fit:contain;filter:drop-shadow(0 0 6px #b45cff)}

.statePanel{font-size:13px}
.state{font-weight:bold;color:#fff3a0}
.small{font-size:11px;color:#ccc}

.playArea{display:grid;grid-template-columns:42px 1fr 34px;gap:5px;align-items:stretch;margin-top:5px}
.sideTitle,.indicators{
  border-radius:12px;background:#08000d;border:2px solid #7d39ff;
  box-shadow:inset 0 0 12px #000,0 0 10px #8b4dff;
}
.sideTitle{
  display:flex;align-items:center;justify-content:center;
  writing-mode:vertical-rl;font-weight:bold;color:#ead7ff;text-shadow:0 0 8px #b45cff;
}
.indicators{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px}
.indicators span{width:12px;height:12px;border-radius:50%;background:currentColor;box-shadow:0 0 8px currentColor}

.reels{
  display:flex;gap:7px;justify-content:center;padding:8px;border-radius:16px;
  background:linear-gradient(180deg,#ddd,#120020 15%,#050008 84%,#9d70ff);
  box-shadow:inset 0 0 20px #000,0 0 14px #8f48ff;
}
.reel{
  width:82px;height:106px;border:4px solid #d7c6ff;border-radius:14px;
  background:linear-gradient(#fff,#ddd);
  display:flex;align-items:center;justify-content:center;overflow:hidden;
  box-shadow:inset 0 0 18px #000,0 0 12px #8f48ff;
}
.reel img{max-width:76px;max-height:98px;object-fit:contain}

.msg{min-height:32px;color:#ffeab7;font-weight:bold;text-shadow:0 0 8px #b45cff}

.infoDeck{display:grid;grid-template-columns:1fr 1fr 1fr auto;gap:4px;align-items:center}
.infoDeck div{
  background:#030006;border:2px solid #8b4dff;border-radius:10px;padding:3px;min-height:42px;
  box-shadow:inset 0 0 12px #000,0 0 8px rgba(160,80,255,.5);font-size:10px;
}
.infoDeck b{font-family:monospace;font-size:16px;color:#7dff9b;text-shadow:0 0 8px #4dff78}

button{
  border:none;border-radius:13px;padding:9px;margin:3px;font-weight:bold;color:white;
  background:linear-gradient(#c8a8ff,#6d22c9 45%,#260045);
  box-shadow:0 4px 0 #100018,0 0 9px #8b4dff,inset 0 2px 5px rgba(255,255,255,.45);
}
.reset{background:linear-gradient(#777,#111)}

.stopArea{
  padding:7px 4px;border-radius:22px;
  background:linear-gradient(180deg,rgba(255,255,255,.12),rgba(0,0,0,.65));
  box-shadow:inset 0 0 14px #000;
}
.stop{
  width:64px;height:64px;border-radius:50%;border:3px solid #3b0000;
  background:radial-gradient(circle at 35% 25%,#ffc0c0,#ff3030 38%,#a00000 68%,#3a0000);
  box-shadow:0 0 16px rgba(255,0,0,.55),0 6px 0 #240000,inset 0 5px 10px rgba(255,255,255,.35);
}

.lowerWrap{position:relative;width:100%;padding:3px;border-radius:16px;background:linear-gradient(180deg,rgba(255,255,255,.25),rgba(0,0,0,.5))}
.lowerPanelImg{width:100%;border-radius:12px;display:block;border:2px solid rgba(255,255,255,.18);box-shadow:0 0 14px #8b4dff}
.bottomUnit{height:28px;margin-top:6px;border-radius:0 0 22px 22px;background:linear-gradient(180deg,#333,#080808 55%,#000);box-shadow:inset 0 0 12px #000,0 0 14px #8b4dff}
</style>
</head>

<body>
<div class="wrap">
<div class="machine">
  <div class="sideMetal left"></div>
  <div class="sideMetal right"></div>

  <div class="topUnit"><b>七つの刻印</b></div>

  <div class="panel">
    <div class="upperArt">
      <img class="panelImg" src="seven_seals_panel_normal.png">
    </div>
  </div>

  <div class="modeBar">
    <div class="modeBox">MODE<br><b>通常</b></div>
    <div class="center777">
      <img src="symbol_bluepurple7.png">
      <img src="symbol_bluepurple7.png">
      <img src="symbol_bluepurple7.png">
    </div>
    <div class="chargeBox">ベル 00/4</div>
  </div>

  <div class="panel statePanel">
    STATE：<span class="state">通常</span>
    <div class="small">BETしてください</div>
  </div>

  <div class="playArea">
    <div class="sideTitle">終焉ノ刻</div>

    <div class="reels">
      <div class="reel"><img src="symbol_seal.png"></div>
      <div class="reel"><img src="symbol_bell.png"></div>
      <div class="reel"><img src="symbol_replay.png"></div>
    </div>

    <div class="indicators">
      <span style="color:#ffd84d"></span>
      <span style="color:#58ff72"></span>
      <span style="color:#ff4040"></span>
      <span style="color:#4da6ff"></span>
      <span style="color:#c084ff"></span>
      <span style="color:#ff9d2e"></span>
      <span style="color:#ff8bd8"></span>
    </div>
  </div>

  <div class="msg">BETしてください</div>

  <div class="infoDeck">
    <div>CREDIT<br><b>100</b></div>
    <div>BET<br><b>0</b></div>
    <div>PAY<br><b>0</b></div>
    <button class="reset">RESET</button>
  </div>

  <div class="panel">
    <button>BET</button>
    <button>MAX BET</button>
    <button>START</button>
  </div>

  <div class="stopArea">
    <button class="stop">STOP</button>
    <button class="stop">STOP</button>
    <button class="stop">STOP</button>
  </div>

  <div class="panel">
    <div class="lowerWrap">
      <img class="lowerPanelImg" src="24BE7708-F796-4B2F-BDEA-77A632106F3C.PNG">
    </div>
  </div>

  <div class="bottomUnit"></div>
</div>
</div>
</body>
</html>
