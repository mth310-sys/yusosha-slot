<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>遊創舎スロット Ver.0.2</title>
<style>
body{
  margin:0;
  background:#111;
  color:white;
  font-family:sans-serif;
  text-align:center;
}
.wrap{
  max-width:420px;
  margin:auto;
  padding:20px;
}
h1{
  font-size:24px;
}
.machine{
  background:#222;
  border:3px solid #555;
  border-radius:20px;
  padding:20px;
}
.lamp{
  width:110px;
  height:110px;
  border-radius:50%;
  background:#333;
  border:4px solid #666;
  margin:0 auto 20px;
  display:flex;
  align-items:center;
  justify-content:center;
  color:#777;
  font-weight:bold;
}
.lamp.on{
  background:gold;
  color:#4a2500;
  box-shadow:0 0 30px gold;
}
.reels{
  display:flex;
  justify-content:center;
  gap:10px;
  margin-bottom:20px;
}
.reel{
  width:85px;
  height:100px;
  background:white;
  color:#111;
  border-radius:12px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:34px;
  font-weight:bold;
}
.info{
  display:flex;
  justify-content:space-around;
  background:#111;
  border-radius:12px;
  padding:10px;
  margin-bottom:15px;
}
button{
  font-size:18px;
  font-weight:bold;
  padding:14px;
  margin:5px;
  border:none;
  border-radius:12px;
}
.bet{background:#34c759;color:white;width:42%;}
.start{background:#ff3b30;color:white;width:90%;}
.stop{background:#0a84ff;color:white;width:28%;}
.reset{background:#777;color:white;font-size:14px;}
button:disabled{opacity:0.35;}
.msg{
  color:#ffd76b;
  font-weight:bold;
  min-height:28px;
  margin:12px;
}
</style>
</head>
<body>
<div class="wrap">
  <h1>遊創舎スロット</h1>
  <p>Ver.0.2</p>
  <div class="machine">
    <div id="lamp" class="lamp">CHANCE</div>
    <div class="reels">
      <div id="r1" class="reel">🍒</div>
      <div id="r2" class="reel">🍇</div>
      <div id="r3" class="reel">🔔</div>
    </div>
    <div class="info">
      <div>クレジット<br><span id="credit">50</span></div>
      <div>BET<br><span id="bet">0</span></div>
      <div>払出<br><span id="pay">0</span></div>
    </div>
    <button class="bet" onclick="betOne()">BET 1</button>
    <button class="bet" onclick="maxBet()">MAX BET</button>
    <br>
    <button id="startBtn" class="start" onclick="start()" disabled>START</button>
    <br>
    <button id="s1" class="stop" onclick="stop(0)" disabled>STOP</button>
    <button id="s2" class="stop" onclick="stop(1)" disabled>STOP</button>
    <button id="s3" class="stop" onclick="stop(2)" disabled>STOP</button>
    <div id="msg" class="msg">BETしてください</div>
    <button class="reset" onclick="resetGame()">リセット</button>
  </div>
</div>
<script>
const symbols = ["7","BAR","🍒","🍇","🔔","⭐"];
let credit = 50;
let bet = 0;
let pay = 0;
let reels = ["🍒","🍇","🔔"];
let spinning = [false,false,false];
let timers = [null,null,null];
let stopped = 0;
let bonus = false;
function update(){
  document.getElementById("credit").textContent = credit;
  document.getElementById("bet").textContent = bet;
  document.getElementById("pay").textContent = pay;
  document.getElementById("startBtn").disabled = bet !== 3 || spinning.includes(true);
  for(let i=0;i<3;i++){
    document.getElementById("s"+(i+1)).disabled = !spinning[i];
  }
}
function msg(t){
  document.getElementById("msg").textContent = t;
}
function rand(){
  return symbols[Math.floor(Math.random()*symbols.length)];
}
function betOne(){
  if(credit <= 0 || bet >= 3 || spinning.includes(true)) return;
  credit--;
  bet++;
  pay = 0;
  document.getElementById("lamp").classList.remove("on");
  msg(bet === 3 ? "STARTできます" : "BET中");
  update();
}
function maxBet(){
  while(bet < 3 && credit > 0){
    credit--;
    bet++;
  }
  pay = 0;
  document.getElementById("lamp").classList.remove("on");
  msg("STARTできます");
  update();
}
function start(){
  if(bet !== 3) return;
  stopped = 0;
  pay = 0;
  bonus = Math.random() < 0.12;
  msg("リール回転中");
  for(let i=0;i<3;i++){
    spinning[i] = true;
    timers[i] = setInterval(()=>{
      reels[i] = rand();
      document.getElementById("r"+(i+1)).textContent = reels[i];
    },80);
  }
  update();
}
function stop(i){
  if(!spinning[i]) return;
  clearInterval(timers[i]);
  spinning[i] = false;
  if(bonus){
    reels[i] = "7";
  }else{
    reels[i] = rand();
  }
  document.getElementById("r"+(i+1)).textContent = reels[i];
  stopped++;
  if(stopped === 3){
    judge();
  }
  update();
}
function judge(){
  if(reels[0] === "7" && reels[1] === "7" && reels[2] === "7"){
    pay = 50;
    credit += pay;
    document.getElementById("lamp").classList.add("on");
    msg("BIG BONUS！");
  }else if(reels[0] === reels[1] && reels[1] === reels[2]){
    pay = 8;
    credit += pay;
    msg("小役当たり！");
  }else{
    pay = 0;
    msg("ハズレ");
  }
  bet = 0;
  update();
}
function resetGame(){
  credit = 50;
  bet = 0;
  pay = 0;
  reels = ["🍒","🍇","🔔"];
  spinning = [false,false,false];
  stopped = 0;
  bonus = false;
  for(let i=0;i<3;i++){
    clearInterval(timers[i]);
    document.getElementById("r"+(i+1)).textContent = reels[i];
  }
  document.getElementById("lamp").classList.remove("on");
  msg("BETしてください");
  update();
}
update();
</script>
</body>
</html>
