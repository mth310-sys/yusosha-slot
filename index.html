<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>遊創舎スロット Ver.0.5.2</title>
<style>
*{box-sizing:border-box;}

body{
  margin:0;
  background:radial-gradient(circle,#1b1b1b,#020202);
  color:white;
  font-family:sans-serif;
  text-align:center;
}

.wrap{
  max-width:390px;
  margin:auto;
  padding:4px;
}

.machine{
  position:relative;
  overflow:hidden;
  background:linear-gradient(135deg,#cfd3d6,#171717 13%,#050505 50%,#171717 87%,#cfd3d6);
  border:5px solid #aeb5ba;
  border-radius:24px;
  padding:9px;
  box-shadow:0 0 28px #0077ff,inset 0 0 28px #000;
}

.machine:before{
  content:"";
  position:absolute;
  inset:8px;
  border:2px solid #0077ff;
  border-radius:18px;
  box-shadow:0 0 22px #009dff,inset 0 0 14px #003b88;
  pointer-events:none;
}

.led-side{
  position:absolute;
  top:44px;
  bottom:42px;
  width:11px;
  border-radius:8px;
  background:repeating-linear-gradient(to bottom,#00b7ff 0 8px,#003a99 8px 14px);
  box-shadow:0 0 18px #00aaff;
  animation:ledPulse 1s infinite alternate;
}

.led-left{left:8px;}
.led-right{right:8px;}

.top-led{
  position:relative;
  z-index:1;
  height:24px;
  margin:0 42px 7px;
  border-radius:0 0 18px 18px;
  background:linear-gradient(90deg,#001633,#00b7ff,#003dff,#00b7ff,#001633);
  box-shadow:0 0 22px #00aaff,inset 0 0 12px #bdefff;
  clip-path:polygon(10% 0,90% 0,100% 100%,0 100%);
}

.top-panel,.center-panel,.info-panel,.play-panel,.stop-panel,.role,.reset{
  position:relative;
  z-index:1;
}

.top-panel{
  background:radial-gradient(circle,#171717,#030303 75%);
  border:2px solid #4d4d4d;
  border-radius:16px;
  padding:8px 6px;
  margin-bottom:7px;
  box-shadow:inset 0 0 18px #000;
}

.logo{
  font-size:14px;
  color:#9cff9c;
  font-weight:bold;
  text-shadow:0 0 8px #3cff3c;
}

h1{
  font-size:29px;
  margin:4px 0;
  color:#ffd24a;
  text-shadow:0 0 12px #ff9d00,0 0 26px #9b5c00;
}

.version{
  font-size:11px;
  color:#eee;
}

.center-panel{
  background:linear-gradient(#060606,#111,#050505);
  border:2px solid #444;
  border-radius:16px;
  padding:9px 6px 6px;
  margin-bottom:7px;
}

.reel-area{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:7px;
}

.lamp{
  width:52px;
  height:52px;
  flex:0 0 52px;
  border-radius:10px;
  background:radial-gradient(circle,#302200,#120900 75%);
  border:3px solid #b47a00;
  color:#ffd45a;
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:bold;
  font-size:13px;
  box-shadow:inset 0 0 10px #000,0 0 10px #3b2300;
}

.lamp.on{
  background:radial-gradient(circle,#fff47a,#ffd000 45%,#ff9900);
  color:#402000;
  box-shadow:0 0 32px gold,0 0 65px orange,inset 0 0 8px #fff;
  animation:peka 0.65s infinite alternate;
}

.reels{
  display:flex;
  gap:6px;
}

.reel{
  width:80px;
  height:112px;
  background:linear-gradient(#fff,#e7e7e7 45%,#f7f7f7 55%,#d5d5d5);
  color:#111;
  border-radius:12px;
  border:4px solid #777;
  box-shadow:inset 0 0 14px #999,0 0 0 2px #151515,0 0 10px #000;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:34px;
  font-weight:bold;
}

.msg{
  color:#ffd76b;
  font-weight:bold;
  min-height:28px;
  margin:7px 0 1px;
  font-size:20px;
  text-shadow:0 0 10px #b56b00;
}

.msg.big{
  color:#fff200;
  font-size:23px;
  animation:bigFlash 0.55s infinite alternate;
}

.info-panel{
  display:flex;
  justify-content:space-around;
  background:#020202;
  border:2px solid #454545;
  border-radius:13px;
  padding:7px;
  margin-bottom:7px;
  box-shadow:inset 0 0 12px #000,0 0 8px #002e66;
}

.info-box{
  width:32%;
  border-right:1px solid #252525;
}

.info-box:last-child{border-right:none;}

.info-label{
  font-size:10px;
  color:#e7e7e7;
}

.info-value{
  font-size:30px;
  font-weight:bold;
  color:#ff2c2c;
  font-family:"Courier New",monospace;
  text-shadow:0 0 8px red,0 0 14px #5a0000;
}

.play-panel{
  display:grid;
  grid-template-columns:76px 1fr;
  gap:8px;
  align-items:end;
  background:linear-gradient(145deg,#555,#090909 35%,#151515 65%,#666);
  border:2px solid #8b9298;
  border-radius:16px;
  padding:9px;
  margin-bottom:8px;
  box-shadow:inset 0 0 14px #000,0 0 14px #005dcb;
}

.lever-deco{
  height:142px;
  position:relative;
  border-radius:15px;
  background:radial-gradient(circle at center,#101820,#050505 75%);
  border:2px solid #666;
  box-shadow:inset 0 0 12px #000,0 0 16px #0077ff;
  pointer-events:none;
}

.lever-deco:before{
  content:"";
  position:absolute;
  left:35px;
  bottom:15px;
  width:10px;
  height:92px;
  border-radius:8px;
  background:linear-gradient(90deg,#333,#fff,#aaa,#222);
  transform:rotate(-8deg);
  transform-origin:bottom;
  box-shadow:0 0 7px #fff;
}

.lever-deco:after{
  content:"";
  position:absolute;
  left:14px;
  top:4px;
  width:50px;
  height:50px;
  border-radius:50%;
  background:radial-gradient(circle at 28% 22%,#fff,#333 35%,#000 72%);
  box-shadow:0 0 14px #fff,0 0 22px #0077ff;
}

.control-panel{
  display:grid;
  grid-template-columns:1.15fr 1fr 1fr;
  gap:8px;
}

.stop-panel{
  display:grid;
  grid-template-columns:1fr 1fr 1fr;
  gap:8px;
  background:linear-gradient(145deg,#2c2c2c,#070707,#2a2a2a);
  border:2px solid #6f767c;
  border-radius:16px;
  padding:10px;
  margin-bottom:8px;
  box-shadow:inset 0 0 14px #000,0 0 16px #006dff;
}

button{
  width:100%;
  font-size:15px;
  font-weight:bold;
  padding:11px 2px;
  border:none;
  border-radius:12px;
  color:white;
  box-shadow:inset 0 2px 5px rgba(255,255,255,.65),inset 0 -5px 9px rgba(0,0,0,.65),0 4px 0 #050505,0 0 8px #000;
}

button:active{
  transform:translateY(2px);
}

.btn-lever{
  height:64px;
  background:linear-gradient(#ff6f66,#cf1010 45%,#6d0000);
  text-shadow:0 0 8px #ffb0b0;
}

.btn-bet{
  height:64px;
  background:linear-gradient(#66ff85,#00a82b 45%,#004f13);
  text-shadow:0 0 8px #b7ffc4;
}

.stop{
  height:82px;
  background:linear-gradient(#4fc3ff,#006eff 45%,#001f91);
  font-size:22px;
  padding:18px 2px;
  box-shadow:inset 0 2px 6px rgba(255,255,255,.75),inset 0 -5px 12px rgba(0,0,0,.7),0 4px 0 #030303,0 0 20px #008cff;
  text-shadow:0 0 12px #bde9ff;
}

.reset{
  background:linear-gradient(#aaa,#555,#333);
  color:white;
  font-size:12px;
  padding:7px 20px;
  width:auto;
  margin-bottom:5px;
}

button:disabled{opacity:0.35;}

.role{
  font-size:11px;
  color:#e2e2e2;
  line-height:1.35;
}

.reel.stopFlash{animation:stopFlash 0.25s;}

.payEffect{
  position:fixed;
  top:45%;
  left:50%;
  transform:translate(-50%,-50%);
  font-size:38px;
  font-weight:bold;
  color:#fff200;
  text-shadow:0 0 18px orange;
  display:none;
  pointer-events:none;
  z-index:10;
}

.payEffect.show{
  display:block;
  animation:payPop 1s forwards;
}

.flash{animation:screenFlash 0.35s 4;}

@keyframes ledPulse{
  from{opacity:.55;filter:brightness(1);}
  to{opacity:1;filter:brightness(1.9);}
}

@keyframes stopFlash{
  0%{transform:scale(1.12);}
  100%{transform:scale(1);}
}

@keyframes peka{
  from{transform:scale(1);filter:brightness(1);}
  to{transform:scale(1.08);filter:brightness(1.75);}
}

@keyframes bigFlash{
  from{text-shadow:0 0 8px yellow;}
  to{text-shadow:0 0 24px red;transform:scale(1.05);}
}

@keyframes payPop{
  0%{opacity:0;transform:translate(-50%,-30%) scale(0.5);}
  30%{opacity:1;transform:translate(-50%,-50%) scale(1.2);}
  100%{opacity:0;transform:translate(-50%,-90%) scale(1);}
}

@keyframes screenFlash{
  0%{background:white;}
  100%{background:radial-gradient(circle,#1b1b1b,#020202);}
}
</style>
</head>

<body>
<div class="wrap">
  <div class="machine">
    <div class="led-side led-left"></div>
    <div class="led-side led-right"></div>

    <div class="top-led"></div>

    <div class="top-panel">
      <div class="logo">🌱 遊創舎</div>
      <h1>遊創舎スロット</h1>
      <div class="version">Ver.0.5.2 YD-001調整版</div>
    </div>

    <div class="center-panel">
      <div class="reel-area">
        <div id="lamp" class="lamp">PEKA</div>

        <div class="reels">
          <div id="r1" class="reel">🍒</div>
          <div id="r2" class="reel">🍇</div>
          <div id="r3" class="reel">🔔</div>
        </div>
      </div>

      <div id="msg" class="msg">BETしてください</div>
    </div>

    <div class="info-panel">
      <div class="info-box">
        <div class="info-label">CREDIT</div>
        <div id="credit" class="info-value">50</div>
      </div>
      <div class="info-box">
        <div class="info-label">BET</div>
        <div id="bet" class="info-value">0</div>
      </div>
      <div class="info-box">
        <div class="info-label">PAYOUT</div>
        <div id="pay" class="info-value">0</div>
      </div>
    </div>

    <div class="play-panel">
      <div class="lever-deco"></div>

      <div class="control-panel">
        <button id="startBtn" class="btn-lever" onclick="start()" disabled>START<br>レバー</button>
        <button class="btn-bet" onclick="betOne()">BET</button>
        <button class="btn-bet" onclick="maxBet()">MAX<br>BET</button>
      </div>
    </div>

    <div class="stop-panel">
      <button id="s1" class="stop" onclick="stop(0)" disabled>STOP</button>
      <button id="s2" class="stop" onclick="stop(1)" disabled>STOP</button>
      <button id="s3" class="stop" onclick="stop(2)" disabled>STOP</button>
    </div>

    <button class="reset" onclick="resetGame()">リセット</button>

    <div class="role">
      777：BIG 50枚 / 🍇：8枚 / 🔔：10枚 / 🍒：2枚
    </div>

  </div>
</div>

<div id="payEffect" class="payEffect"></div>

<script>
const symbols = ["7","BAR","🍒","🍇","🔔","⭐"];

let credit = 50;
let bet = 0;
let pay = 0;
let reels = ["🍒","🍇","🔔"];
let spinning = [false,false,false];
let timers = [null,null,null];
let stopped = 0;
let bonus = false;

function update(){
  document.getElementById("credit").textContent = credit;
  document.getElementById("bet").textContent = bet;
  document.getElementById("pay").textContent = pay;

  document.getElementById("startBtn").disabled = bet !== 3 || spinning.includes(true);

  for(let i=0;i<3;i++){
    document.getElementById("s"+(i+1)).disabled = !spinning[i];
  }
}

function msg(t,big=false){
  const m = document.getElementById("msg");
  m.textContent = t;
  m.classList.toggle("big",big);
}

function rand(){
  return symbols[Math.floor(Math.random()*symbols.length)];
}

function betOne(){
  if(credit <= 0 || bet >= 3 || spinning.includes(true)) return;

  credit--;
  bet++;
  pay = 0;

  document.getElementById("lamp").classList.remove("on");
  msg(bet === 3 ? "STARTできます" : "BET中");

  update();
}

function maxBet(){
  if(spinning.includes(true)) return;

  while(bet < 3 && credit > 0){
    credit--;
    bet++;
  }

  pay = 0;
  document.getElementById("lamp").classList.remove("on");
  msg(bet === 3 ? "STARTできます" : "クレジット不足");

  update();
}

function start(){
  if(bet !== 3) return;

  stopped = 0;
  pay = 0;
  bonus = Math.random() < 0.06;

  if(bonus){
    document.getElementById("lamp").classList.add("on");
    msg("ペカッ！");
  }else{
    document.getElementById("lamp").classList.remove("on");
    msg("リール回転中");
  }

  for(let i=0;i<3;i++){
    spinning[i] = true;
    timers[i] = setInterval(()=>{
      reels[i] = rand();
      document.getElementById("r"+(i+1)).textContent = reels[i];
    },70);
  }

  update();
}

function stop(i){
  if(!spinning[i]) return;

  clearInterval(timers[i]);
  spinning[i] = false;

  if(bonus){
    reels[i] = "7";
  }else{
    reels[i] = rand();
  }

  const reelEl = document.getElementById("r"+(i+1));
  reelEl.textContent = reels[i];
  reelEl.classList.remove("stopFlash");
  void reelEl.offsetWidth;
  reelEl.classList.add("stopFlash");

  stopped++;

  if(stopped === 3){
    judge();
  }

  update();
}

function showPayEffect(amount){
  if(amount <= 0) return;

  const effect = document.getElementById("payEffect");
  effect.textContent = "+" + amount;
  effect.classList.remove("show");
  void effect.offsetWidth;
  effect.classList.add("show");
}

function judge(){
  if(reels[0] === "7" && reels[1] === "7" && reels[2] === "7"){
    pay = 50;
    credit += pay;
    document.getElementById("lamp").classList.add("on");
    document.body.classList.add("flash");

    setTimeout(()=>{
      document.body.classList.remove("flash");
    },1500);

    msg("BIG BONUS！！",true);
    showPayEffect(pay);

  }else if(reels[0] === "🍇" && reels[1] === "🍇" && reels[2] === "🍇"){
    pay = 8;
    credit += pay;
    msg("ブドウ 8枚");
    showPayEffect(pay);

  }else if(reels[0] === "🔔" && reels[1] === "🔔" && reels[2] === "🔔"){
    pay = 10;
    credit += pay;
    msg("ベル 10枚");
    showPayEffect(pay);

  }else if(reels.includes("🍒")){
    pay = 2;
    credit += pay;
    msg("チェリー 2枚");
    showPayEffect(pay);

  }else{
    pay = 0;
    msg("ハズレ");
  }

  bet = 0;
  update();
}

function resetGame(){
  for(let i=0;i<3;i++){
    clearInterval(timers[i]);
  }

  credit = 50;
  bet = 0;
  pay = 0;
  reels = ["🍒","🍇","🔔"];
  spinning = [false,false,false];
  stopped = 0;
  bonus = false;

  for(let i=0;i<3;i++){
    document.getElementById("r"+(i+1)).textContent = reels[i];
  }

  document.getElementById("lamp").classList.remove("on");
  document.body.classList.remove("flash");
  msg("BETしてください");

  update();
}

update();
</script>
</body>
</html>
