<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>リールバトルRPG Ver.RB-0.1</title>
<style>
*{box-sizing:border-box}
body{
  margin:0;
  background:#111;
  color:#fff;
  font-family:sans-serif;
  text-align:center;
}
.wrap{
  max-width:390px;
  margin:auto;
  padding:12px;
}
.panel{
  background:#1e1e1e;
  border:1px solid #444;
  border-radius:12px;
  padding:12px;
  margin-bottom:10px;
}
h1{font-size:22px;margin:8px 0}
.status{
  display:flex;
  justify-content:space-between;
  gap:8px;
}
.box{
  flex:1;
  background:#2b2b2b;
  border-radius:10px;
  padding:8px;
}
.reels{
  display:flex;
  gap:10px;
  justify-content:center;
  margin:16px 0;
}
.reel{
  width:70px;
  height:80px;
  background:#fff;
  color:#111;
  border-radius:10px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:42px;
  font-weight:bold;
}
button{
  width:100%;
  padding:14px;
  border:0;
  border-radius:12px;
  font-size:18px;
  font-weight:bold;
  margin-top:8px;
}
.main{background:#ffd54a}
.sub{background:#ddd}
.log{
  min-height:90px;
  text-align:left;
  white-space:pre-line;
  line-height:1.5;
}
</style>
</head>
<body>
<div class="wrap">
  <h1>リールバトルRPG</h1>
  <div class="panel" id="scene"></div>
</div>

<script>
const nums = [1,2,3,4,5,6,7];

const characters = [
  {
    id:"hero",
    name:"主人公",
    level:1,
    hp:120,
    maxHp:120,
    exp:0,
    nextExp:100,
    skills:["斬撃","強打","二連撃","火炎斬り","雷撃","必殺技","奥義"]
  }
];

const enemies = [
  {
    id:"slime",
    name:"スライム",
    hp:100,
    maxHp:100,
    baseExp:10,
    skills:["体当たり","跳ねる","粘液","ぶつかる","強打","突進","怒り"]
  }
];

const stages = [
  {
    id:"grass",
    name:"草原",
    enemyId:"slime"
  }
];

let party = [structuredClone(characters[0])];
let enemy = null;
let phase = "party";
let battleStep = "turn";
let turnOwner = null;
let lastRoll = [1,1,1];
let logText = "";

function roll(){
  return [
    nums[Math.floor(Math.random()*nums.length)],
    nums[Math.floor(Math.random()*nums.length)],
    nums[Math.floor(Math.random()*nums.length)]
  ];
}

function damageRoll(actor){
  const r = roll();
  lastRoll = r;

  const skill = actor.skills[r[0]-1];
  const baseDamage = r[1] * 10;
  const multipliers = [1,2,3,4,5,7,10];
  const mult = multipliers[r[2]-1];
  const damage = baseDamage * mult;

  return {r, skill, baseDamage, mult, damage};
}

function expRoll(baseExp){
  const r = roll();
  lastRoll = r;

  const m1 = r[0] % 2 === 0 ? 2 : 1;
  const m2 = r[1] % 2 === 0 ? 4 : 3;
  const m3 = r[2] % 2 === 0 ? 6 : 5;

  return {
    r,
    total: baseExp * m1 * m2 * m3,
    text:`${baseExp} × ${m1} × ${m2} × ${m3}`
  };
}

function render(){
  const p = party[0];

  if(phase === "party"){
    scene.innerHTML = `
      <div class="panel">
        <h2>仲間選択</h2>
        <p>現在は主人公のみ</p>
        <div class="box">${p.name} Lv${p.level}<br>HP ${p.hp}/${p.maxHp}<br>EXP ${p.exp}/${p.nextExp}</div>
        <button class="main" onclick="goStage()">ステージ選択へ</button>
      </div>
    `;
  }

  if(phase === "stage"){
    scene.innerHTML = `
      <div class="panel">
        <h2>ステージ選択</h2>
        <button class="main" onclick="startBattle()">草原へ進む</button>
      </div>
    `;
  }

  if(phase === "battle"){
    scene.innerHTML = `
      <div class="status">
        <div class="box">${p.name}<br>HP ${p.hp}/${p.maxHp}</div>
        <div class="box">${enemy.name}<br>HP ${enemy.hp}/${enemy.maxHp}</div>
      </div>

      <div class="panel">
        <h2>${battleStep === "turn" ? "ターン判定" : "攻撃パート"}</h2>
        <div class="reels">
          <div class="reel">${lastRoll[0]}</div>
          <div class="reel">${lastRoll[1]}</div>
          <div class="reel">${lastRoll[2]}</div>
        </div>
        <div class="log">${logText}</div>
        <button class="main" onclick="spinBattle()">SPIN</button>
      </div>
    `;
  }

  if(phase === "exp"){
    scene.innerHTML = `
      <div class="panel">
        <h2>経験値パート</h2>
        <div class="reels">
          <div class="reel">${lastRoll[0]}</div>
          <div class="reel">${lastRoll[1]}</div>
          <div class="reel">${lastRoll[2]}</div>
        </div>
        <div class="log">${logText}</div>
        <button class="main" onclick="backParty()">仲間選択へ</button>
      </div>
    `;
  }
}

function goStage(){
  phase = "stage";
  render();
}

function startBattle(){
  enemy = structuredClone(enemies[0]);
  phase = "battle";
  battleStep = "turn";
  logText = "戦闘開始！\nまずはターン判定。";
  lastRoll = [1,1,1];
  render();
}

function spinBattle(){
  const p = party[0];

  if(battleStep === "turn"){
    lastRoll = roll();
    const sum = lastRoll[0] + lastRoll[1] + lastRoll[2];
    turnOwner = sum % 2 === 0 ? "player" : "enemy";
    logText = `合計 ${sum}\n${turnOwner === "player" ? "プレイヤーターン！" : "敵ターン！"}\n次は攻撃パート。`;
    battleStep = "attack";
    render();
    return;
  }

  if(battleStep === "attack"){
    const actor = turnOwner === "player" ? p : enemy;
    const result = damageRoll(actor);

    if(turnOwner === "player"){
      enemy.hp -= result.damage;
      if(enemy.hp < 0) enemy.hp = 0;
      logText = `${p.name}の${result.skill}！\n${result.baseDamage} × ${result.mult}\n${result.damage}ダメージ！`;

      if(enemy.hp <= 0){
        phase = "exp";
        const exp = expRoll(enemy.baseExp);
        p.exp += exp.total;
        logText += `\n\n${enemy.name}を倒した！\n経験値計算：${exp.text}\n${exp.total}EXP獲得！`;

        if(p.exp >= p.nextExp){
          p.level++;
          p.exp -= p.nextExp;
          p.nextExp += 100;
          p.maxHp += 20;
          p.hp = p.maxHp;
          logText += `\n\nレベルアップ！ Lv${p.level}`;
        }

        render();
        return;
      }
    }else{
      p.hp -= result.damage;
      if(p.hp < 0) p.hp = 0;
      logText = `${enemy.name}の${result.skill}！\n${result.baseDamage} × ${result.mult}\n${result.damage}ダメージ！`;

      if(p.hp <= 0){
        logText += `\n\n敗北…仲間選択へ戻ります。`;
        setTimeout(() => {
          p.hp = p.maxHp;
          phase = "party";
          render();
        }, 1200);
      }
    }

    battleStep = "turn";
    render();
  }
}

function backParty(){
  phase = "party";
  render();
}

render();
</script>
</body>
</html>
