<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>七つの刻印 Ver.0.6</title>
<style>
*{box-sizing:border-box}

body{
  margin:0;
  background:radial-gradient(circle,#210038,#030006 70%);
  color:#fff;
  font-family:serif;
  text-align:center;
}

.wrap{
  max-width:390px;
  margin:auto;
  padding:3px;
}

.machine{
  overflow:hidden;
  background:linear-gradient(135deg,#060008,#24003a,#07000b);
  border:5px solid #7d35ff;
  border-radius:20px;
  padding:6px;
  box-shadow:0 0 24px #8f3cff,inset 0 0 35px #000;
}

.safe-body{
  height:48px;
  margin-bottom:4px;
  border-radius:16px;
  background:
    radial-gradient(circle at 20% 50%,rgba(190,100,255,.35),transparent 28%),
    radial-gradient(circle at 80% 50%,rgba(190,100,255,.35),transparent 28%),
    linear-gradient(180deg,#1c0030,#08000d 70%);
  border:2px solid #7430ff;
  box-shadow:
    0 0 18px #9b45ff,
    inset 0 0 24px #000;
  position:relative;
  overflow:hidden;
}

.safe-body:before{
  content:"";
  position:absolute;
  left:18px;
  right:18px;
  top:10px;
  height:15px;
  border-radius:20px;
  background:linear-gradient(90deg,#5a00a8,#ff7bff,#5a00a8);
  box-shadow:0 0 18px #d86cff;
  animation:led 1.5s infinite alternate;
}

.safe-body:after{
  content:"";
  position:absolute;
  left:42px;
  right:42px;
  bottom:8px;
  height:5px;
  border-radius:8px;
  background:linear-gradient(90deg,transparent,#b86cff,transparent);
  box-shadow:0 0 12px #b86cff;
}

.title-area{
  position:relative;
  height:44px;
  display:flex;
  align-items:center;
  justify-content:center;
}

.title{
  font-size:27px;
  font-weight:bold;
  text-shadow:0 0 12px #c06cff;
  letter-spacing:2px;
}

.brand{
  position:absolute;
  right:20px;
  top:22px;
  font-size:13px;
  color:#e9d7ff;
  text-shadow:0 0 8px #c06cff;
}

.panel{
  margin:4px 0;
  border:2px solid #b66cff;
  border-radius:12px;
  overflow:hidden;
  background:#050008;
  box-shadow:0 0 15px #7d35ff;
}

.panel img{
  width:100%;
  height:92px;
  object-fit:cover;
  display:block;
}

.mode{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:6px;
  margin:5px 0;
  background:linear-gradient(90deg,#120018,#300046,#120018);
  border:1px solid #7d35ff;
  border-radius:10px;
  font-size:15px;
}

.mode-name{
  color:#ff4b4b;
  font-weight:bold;
}

.chance{
  color:#e7c6ff;
}

.reels{
  display:flex;
  justify-content:center;
  gap:7px;
  background:#111;
  border:3px solid #4b1b80;
  border-radius:12px;
  padding:7px;
}

.reel{
  width:78px;
  height:96px;
  background:linear-gradient(#f0f0f0,#999,#f0f0f0);
  border:4px solid #111;
  border-radius:9px;
  display:flex;
  align-items:center;
  justify-content:center;
  overflow:hidden;
}

.reel img{
  width:62px;
  height:62px;
  object-fit:contain;
}

.msg{
  font-size:16px;
  min-height:21px;
  margin:4px 0;
  color:#e7c6ff;
  text-shadow:0 0 8px #c06cff;
}

.info{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:5px;
  margin:5px 0;
}

.box{
  background:#09000f;
  border:1px solid #7d35ff;
  border-radius:8px;
  padding:4px;
  font-size:11px;
}

.num{
  color:#ff3bff;
  font-size:17px;
}

.buttons-top{
  display:grid;
  grid-template-columns:1fr 1fr 1fr 1fr;
  gap:6px;
  margin-top:5px;
}

.buttons-stop{
  display:flex;
  justify-content:center;
  gap:32px;
  margin:6px 0 5px;
}

button{
  border:none;
  color:white;
  font-weight:bold;
  cursor:pointer;
  box-shadow:0 0 10px #000;
}

.start,.bet,.reset{
  height:44px;
  border-radius:16px;
  padding:5px;
  font-size:12px;
  background:linear-gradient(#ff5454,#850000);
}

.stop{
  width:46px;
  height:46px;
  border-radius:50%;
  font-size:10px;
  background:radial-gradient(circle,#ff5a5a,#8c0018);
  border:3px solid #ffb6b6;
}

button:disabled{
  opacity:.35;
}

.bottom-panel-wrap{
  width:88%;
  margin:6px auto 0;
  border:2px solid #b66cff;
  border-radius:12px;
  overflow:hidden;
  background:#050008;
  box-shadow:0 0 15px #7d35ff;
}

.bottom-panel{
  width:100%;
  height:auto;
  display:block;
}

.bottom-safe{
  height:45px;
  margin-top:5px;
  border-radius:16px;
  background:linear-gradient(180deg,#0a0010,#210038,#050008);
  box-shadow:
    inset 0 0 25px #000,
    0 0 18px #7d35ff;
  border:1px solid #4d1688;
}

.flash{
  animation:flash .5s 3;
}

.apocalis{
  animation:apocalisGlow 1s infinite alternate;
}

@keyframes led{
  from{filter:brightness(1)}
  to{filter:brightness(1.8)}
}

@keyframes flash{
  50%{filter:brightness(2.3)}
}

@keyframes apocalisGlow{
  from{box-shadow:0 0 24px #8f3cff,inset 0 0 35px #000}
  to{box-shadow:0 0 38px #ff7bff,inset 0 0 50px #2a0040}
}
</style>
</head>

<body>
<div class="wrap">
  <div class="machine" id="machine">

    <div class="safe-body"></div>

    <div class="title-area">
      <div class="title">七つの刻印</div>
      <div class="brand">遊創舎</div>
    </div>

    <div class="panel">
      <img id="topPanel" src="seven_seals_panel_normal.png">
    </div>

    <div class="mode">
      <div>MODE：<span id="modeName" class="mode-name">通常</span></div>
      <div class="chance">刻印CHANCE</div>
    </div>

    <div class="reels">
      <div class="reel"><img id="r0"></div>
      <div class="reel"><img id="r1"></div>
      <div class="reel"><img id="r2"></div>
    </div>

    <div class="msg" id="msg">BETしてください</div>

    <div class="info">
      <div class="box">CREDIT<div class="num" id="credit">50</div></div>
      <div class="box">BET<div class="num" id="bet">0</div></div>
      <div class="box">PAY<div class="num" id="pay">0</div></div>
    </div>

    <div class="buttons-top">
      <button class="start" id="startBtn">START</button>
      <button class="bet" id="betBtn">BET</button>
      <button class="bet" id="maxBetBtn">MAX BET</button>
      <button class="reset" id="resetBtn">RESET</button>
    </div>

    <div class="buttons-stop">
      <button class="stop" id="s0">STOP</button>
      <button class="stop" id="s1">STOP</button>
      <button class="stop" id="s2">STOP</button>
    </div>

    <div class="bottom-panel-wrap">
      <img class="bottom-panel" src="24BE7708-F796-4B2F-BDEA-77A632106F3C.PNG">
    </div>

    <div class="bottom-safe"></div>
      </div>
</div>

<script>
const symbols={
  RED7:"symbol_red7.png",
  BLUE7:"symbol_bluepurple7.png",
  BELL:"symbol_bell.png",
  CHERRY:"symbol_cherry.png",
  REPLAY:"symbol_replay.png",
  SEAL:"symbol_seal.png"
};

const keys=Object.keys(symbols);

let credit=50;
let bet=0;
let pay=0;
let reels=["CHERRY","BELL","REPLAY"];
let result=["CHERRY","BELL","REPLAY"];
let spinning=[false,false,false];
let timers=[null,null,null];
let stopped=0;
let seals=0;

const $=id=>document.getElementById(id);

function update(){
  $("credit").textContent=credit;
  $("bet").textContent=bet;
  $("pay").textContent=pay;

  reels.forEach((s,i)=>{
    $("r"+i).src=symbols[s];
  });

  $("startBtn").disabled=bet<3 || spinning.some(Boolean);
  $("betBtn").disabled=credit<=0 || bet>=3 || spinning.some(Boolean);
  $("maxBetBtn").disabled=credit<=0 || bet>=3 || spinning.some(Boolean);

  for(let i=0;i<3;i++){
    $("s"+i).disabled=!spinning[i];
  }
}

function msg(t){
  $("msg").textContent=t;
}

function rand(){
  return keys[Math.floor(Math.random()*keys.length)];
}

function chooseResult(){
  const r=Math.random();

  if(r<0.015) return ["BLUE7","BLUE7","BLUE7"];
  if(r<0.060) return ["RED7","RED7","SEAL"];
  if(r<0.160) return ["SEAL","SEAL","SEAL"];
  if(r<0.270) return ["SEAL","SEAL","BELL"];
  if(r<0.420) return ["BELL","BELL","BELL"];
  if(r<0.560) return ["CHERRY","CHERRY","CHERRY"];
  if(r<0.700) return ["REPLAY","REPLAY","REPLAY"];

  return [rand(),rand(),rand()];
}

function start(){
  result=chooseResult();
  stopped=0;
  pay=0;
  msg("リール始動…");

  for(let i=0;i<3;i++){
    spinning[i]=true;
    timers[i]=setInterval(()=>{
      reels[i]=rand();
      update();
    },80);
  }

  update();
}

function stop(i){
  if(!spinning[i])return;

  clearInterval(timers[i]);
  reels[i]=result[i];
  spinning[i]=false;
  stopped++;

  update();

  if(stopped===3){
    judge();
  }
}

function judge(){
  const [a,b,c]=reels;
  let payout=0;

  if(a==="BLUE7"&&b==="BLUE7"&&c==="BLUE7"){
    payout=100;
    enterApocalis("青紫7揃い！終焉ノ刻 直撃！");
  }
  else if(a==="RED7"&&b==="RED7"&&c==="SEAL"){
    payout=50;
    sealGet("守護者BONUS！刻印獲得！");
  }
  else if(a==="SEAL"&&b==="SEAL"&&c==="SEAL"){
    sealGet("刻印3揃い！守護者MODE成功！");
  }
  else if(a==="SEAL"&&b==="SEAL"&&c==="BELL"){
    msg("刻印CHANCE！");
  }
  else if(a==="BELL"&&b==="BELL"&&c==="BELL"){
    payout=10;
    msg("ベル成立 +10");
  }
  else if(a==="CHERRY"&&b==="CHERRY"&&c==="CHERRY"){
    payout=5;
    msg("チェリー成立 +5");
  }
  else if(a==="REPLAY"&&b==="REPLAY"&&c==="REPLAY"){
    msg("リプレイ");
  }
  else{
    msg("ハズレ");
  }

  pay=payout;
  credit+=payout;
  bet=0;

  update();
}

function sealGet(text){
  if(seals<7) seals++;

  $("modeName").textContent="守護者MODE";
  msg(text+" 現在："+seals+"/7");
  flash();

  if(seals>=7){
    enterApocalis("七刻印完成！終焉神アポカリス降臨！");
  }
}

function enterApocalis(text){
  $("topPanel").src="seven_seals_panel_apocalis.png";
  $("modeName").textContent="終焉ノ刻";
  $("machine").classList.add("apocalis");
  msg(text);
  flash();
}

function flash(){
  $("machine").classList.add("flash");
  setTimeout(()=>{
    $("machine").classList.remove("flash");
  },1600);
}

$("betBtn").onclick=()=>{
  if(credit>0 && bet<3){
    credit--;
    bet++;
    msg("BETしました");
    update();
  }
};

$("maxBetBtn").onclick=()=>{
  while(credit>0 && bet<3){
    credit--;
    bet++;
  }
  msg("MAX BET");
  update();
};

$("startBtn").onclick=start;

$("s0").onclick=()=>stop(0);
$("s1").onclick=()=>stop(1);
$("s2").onclick=()=>stop(2);

$("resetBtn").onclick=()=>{
  credit=50;
  bet=0;
  pay=0;
  seals=0;
  reels=["CHERRY","BELL","REPLAY"];

  $("topPanel").src="seven_seals_panel_normal.png";
  $("modeName").textContent="通常";
  $("machine").classList.remove("apocalis");

  msg("BETしてください");
  update();
};

update();
</script>
</body>
</html>
