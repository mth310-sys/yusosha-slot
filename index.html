<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>リールバトルRPG Ver.RB-0.5.4</title>
<style>
*{box-sizing:border-box}
body{margin:0;background:#111;color:#fff;font-family:sans-serif;text-align:center}
.wrap{max-width:390px;margin:auto;padding:12px}

button{width:100%;padding:14px;border:0;border-radius:12px;font-size:20px;font-weight:bold;margin-top:10px}

.titleScreen{position:fixed;inset:0;background:url("title_bg.png") center center/cover no-repeat}
.titleBtn{
  position:absolute;left:21%;width:58%;height:8%;
  border-radius:12px;border:3px solid #d6a534;
  font-size:28px;font-weight:900;color:white;
  text-shadow:2px 2px 0 #000;
  box-shadow:0 5px 0 #2b1600,inset 0 0 12px rgba(255,255,255,.35);
}
.titleBtn.start{top:52%;background:linear-gradient(#138cff,#003f9e)}
.titleBtn.continue{top:63%;background:linear-gradient(#29a838,#075c12)}
.titleBtn:disabled{background:#333;color:#777;border-color:#555}

.actionScreen{
  position:fixed;inset:0;
  background:url("action_bg_town.png") center top/cover no-repeat;
  padding:12px;
}
.heroCard{
  position:absolute;top:24%;left:5%;width:48%;
  background:rgba(0,0,0,.72);
  border:2px solid #b8860b;border-radius:14px;
  padding:12px;text-align:left;font-size:16px;line-height:1.55;
  box-shadow:0 0 12px #000;
}
.actionMenu{position:absolute;top:45%;left:5%;width:90%}
.actionBtn{
  width:100%;padding:14px;margin-top:10px;
  border-radius:12px;border:2px solid #b8860b;
  font-size:22px;font-weight:900;color:white;
  text-shadow:2px 2px 0 #000;
  box-shadow:0 4px 0 #2b1600,inset 0 0 10px rgba(255,255,255,.25);
}
.actionBtn.mainAct{background:linear-gradient(#168cff,#003b91)}
.actionBtn.lockAct{background:linear-gradient(#3a3a3a,#171717);color:#aaa;border-color:#555}

.exploreScreen{
  position:fixed;
  inset:0;
  background:url("explore_bg.png") center center/cover no-repeat;
}
.exploreScreen .questBoard{
  position:absolute;
  top:44%;
  left:11%;
  width:78%;
}
.exploreScreen .questBtn{
  width:100%;
  margin-top:0;
  margin-bottom:28px;
  padding:4px 8px;
  border:none;
  border-radius:8px;
  background:transparent;
  box-shadow:none;
  color:#2b1600;
  font-size:28px;
  font-weight:900;
  line-height:1.2;
  text-shadow:1px 1px 0 rgba(255,255,255,.25);
}
.exploreScreen .questBtn.locked{color:#777}
.exploreScreen .questNav{
  position:absolute;
  bottom:4%;
  left:5%;
  width:90%;
  display:flex;
  gap:8px;
}
.exploreScreen .navBtn{
  width:auto;
  flex:1;
  margin-top:0;
  padding:12px 4px;
  border-radius:10px;
  border:2px solid #8d6b2f;
  background:rgba(0,0,0,.78);
  color:white;
  font-size:18px;
  font-weight:900;
  text-shadow:1px 1px 0 #000;
}
.exploreScreen .navBtn:disabled{opacity:.45}

.partyStatus{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:6px;
  margin-bottom:8px;
}
.partyBox{
  background:#2b2b2b;
  border-radius:12px;
  padding:8px 2px;
  font-size:13px;
  line-height:1.45;
  min-height:58px;
}
.partyName{
  font-weight:bold;
  font-size:15px;
}
.partyHp{
  font-size:13px;
  white-space:nowrap;
}

.battleField{
  position:relative;
  width:100%;
  height:250px;
  overflow:hidden;
  border-radius:14px;
  margin-bottom:12px;
  background:#000;
  border:2px solid #5c4424;
  box-shadow:inset 0 0 18px rgba(0,0,0,.65);
}
.battleBg{
  position:absolute;
  inset:0;
  width:100%;
  height:100%;
  object-fit:cover;
}
.enemyHud{
  position:absolute;
  left:50%;
  top:26%;
  transform:translateX(-50%);
  width:30%;
  z-index:3;
  pointer-events:none;
}
.enemyName{
  font-size:15px;
  font-weight:900;
  color:#fff;
  text-shadow:2px 2px 0 #000,0 0 5px #000;
}
.enemyHpBar{
  width:100%;
  height:9px;
  margin-top:2px;
  border:2px solid #111;
  border-radius:8px;
  background:#222;
  overflow:hidden;
  box-shadow:0 0 4px #000;
}
.enemyHpFill{
  height:100%;
  background:linear-gradient(#65ff5d,#16b91b);
}
.enemySprite{
  position:absolute;
  width:38%;
  left:50%;
  top:58%;
  transform:translate(-50%,-50%);
  filter:drop-shadow(0 10px 10px rgba(0,0,0,.55));
  pointer-events:none;
  z-index:2;
}

.panel{background:#1e1e1e;border:1px solid #444;border-radius:14px;padding:14px;margin-bottom:10px}
.main{background:#ffd54a;color:#0784ff}
.lock{background:#555;color:#aaa}
.sub{background:#333;color:#fff}

.rpgReelMachine{
  display:flex;
  justify-content:center;
  gap:10px;
  padding:14px;
  margin:0 0 10px;
  border-radius:18px;
  background:linear-gradient(145deg,#5b5146,#1c1a18 45%,#6b5b45);
  border:3px solid #8b6a36;
  box-shadow:inset 0 0 16px #000,0 4px 0 #1b1006;
}
.rpgReelWindow{
  width:78px;
  text-align:center;
}
.rpgReel{
  height:88px;
  border-radius:12px;
  background:linear-gradient(#e8dfc8,#9b907a);
  border:3px solid #31251a;
  color:#1b1208;
  font-size:46px;
  font-weight:900;
  display:flex;
  align-items:center;
  justify-content:center;
  box-shadow:inset 0 0 10px rgba(0,0,0,.6),0 0 0 2px #b89757;
}
.rpgLabel{
  display:none;
}

.topHint{display:none}
.judgeBar{display:none}
.log{height:85px;text-align:left;white-space:pre-line;line-height:1.3;font-size:12px;overflow:hidden}
</style>
</head>
<body>
<div class="wrap">
  <div id="scene"></div>
</div>

<script>
const nums=[1,2,3,4,5,6,7];

const DATA={
  characters:[{
    id:"hero",name:"主人公",level:1,hp:120,maxHp:120,exp:0,nextExp:100,gold:0,
    skills:["斬撃","強打","二連撃","火炎斬り","雷撃","必殺技","奥義"]
  }],
  enemies:[{
    id:"slime",name:"スライム",level:1,hp:100,maxHp:100,baseExp:10,baseGold:20,
    sprite:"monster_slime.png",
    skills:["体当たり","跳ねる","粘液","ぶつかる","強打","突進","怒り"]
  }],
  stages:[
    {id:"grass",name:"草原",needLv:1,enemyId:"slime",bg:"battle_grass_bg.png"},
    {id:"cave",name:"洞窟",needLv:3,enemyId:"slime",bg:"battle_cave_bg.png"},
    {id:"ruins",name:"遺跡",needLv:5,enemyId:"slime",bg:"battle_ruins_bg.png"}
  ]
};

let game=null;
let phase="title";
let battleStep="turnSpin";
let enemy=null;
let selectedStage=null;
let turnOwner=null;
let lastRoll=[1,1,1];
let logText="";
let lastReward=null;
let explorePage=0;
const stagesPerPage=3;

function copy(o){return JSON.parse(JSON.stringify(o))}
function roll(){return [1,2,3].map(()=>nums[Math.floor(Math.random()*nums.length)])}
function hero(){return game.party[0]}
function hasSave(){return localStorage.getItem("reelBattleRPGSave")!==null}
function save(){localStorage.setItem("reelBattleRPGSave",JSON.stringify(game))}
function load(){game=JSON.parse(localStorage.getItem("reelBattleRPGSave"))}

function newGame(){
  game={
    party:[copy(DATA.characters[0])],
    unlocked:{shop:false,recruit:false,extra1:false,extra2:false,extra3:false}
  };
  save();
  phase="action";
  render();
}

function updateUnlocks(){
  const p=hero();
  game.unlocked.shop=p.gold>0;
  game.unlocked.recruit=p.level>=2;
}

function render(){
  if(phase==="title")return renderTitle();
  if(phase==="action")return renderAction();
  if(phase==="explore")return renderExplore();
  if(phase==="battle")return renderBattle();
}

function renderTitle(){
  scene.innerHTML=`
  <div class="titleScreen">
    <button class="titleBtn start" onclick="newGame()">はじめから</button>
    <button class="titleBtn continue" onclick="continueGame()" ${hasSave()?'':'disabled'}>つづきから</button>
  </div>`;
}

function continueGame(){
  load();
  updateUnlocks();
  phase="action";
  render();
}

function renderAction(){
  updateUnlocks();
  save();
  const p=hero();

  scene.innerHTML=`
  <div class="actionScreen">
    <div class="heroCard">
      ${p.name} Lv${p.level}<br>
      HP ${p.hp}/${p.maxHp}<br>
      EXP ${p.exp}/${p.nextExp}<br>
      GOLD ${p.gold}
    </div>

    <div class="actionMenu">
      <button class="actionBtn mainAct" onclick="goExplore()">探索</button>
      <button class="actionBtn ${game.unlocked.shop?'mainAct':'lockAct'}" ${game.unlocked.shop?'onclick="dummy(\'買い物\')"':'disabled'}>買い物</button>
      <button class="actionBtn ${game.unlocked.recruit?'mainAct':'lockAct'}" ${game.unlocked.recruit?'onclick="dummy(\'仲間を集める\')"':'disabled'}>仲間を集める</button>
      <button class="actionBtn lockAct" disabled>？？？</button>
      <button class="actionBtn lockAct" disabled>？？？</button>
      <button class="actionBtn lockAct" disabled>？？？</button>
    </div>
  </div>`;
}

function dummy(name){alert(name+"は後で追加")}

function goExplore(){
  explorePage=0;
  phase="explore";
  render();
}

function renderExplore(){
  const p=hero();
  const maxPage=Math.ceil(DATA.stages.length/stagesPerPage)-1;
  const pageStages=DATA.stages.slice(explorePage*stagesPerPage,explorePage*stagesPerPage+stagesPerPage);

  scene.innerHTML=`
  <div class="exploreScreen">
    <div class="questBoard">
      ${pageStages.map(s=>{
        const ok=p.level>=s.needLv;
        return `
        <button class="questBtn ${ok?'':'locked'}" ${ok?`onclick="startStage('${s.id}')"`:'disabled'}>
          ${ok?s.name:`${s.name} Lv${s.needLv}で解放`}
        </button>`;
      }).join("")}
    </div>

    <div class="questNav">
      <button class="navBtn" onclick="prevExplorePage()" ${explorePage<=0?'disabled':''}>← 前へ</button>
      <button class="navBtn" onclick="phase='action';render()">戻る</button>
      <button class="navBtn" onclick="nextExplorePage()" ${explorePage>=maxPage?'disabled':''}>次へ →</button>
    </div>
  </div>`;
}

function prevExplorePage(){
  if(explorePage>0){explorePage--;render();}
}

function nextExplorePage(){
  const maxPage=Math.ceil(DATA.stages.length/stagesPerPage)-1;
  if(explorePage<maxPage){explorePage++;render();}
}

function startStage(id){
  selectedStage=DATA.stages.find(s=>s.id===id);
  enemy=copy(DATA.enemies.find(e=>e.id===selectedStage.enemyId));
  enemy.bg=selectedStage.bg;
  phase="battle";
  battleStep="encounter";
  lastRoll=[1,1,1];
  logText=`${enemy.name}に遭遇！`;
  render();
}

function renderPartyStatus(){
  const p=hero();
  const members=[
    {name:p.name,hp:p.hp,maxHp:p.maxHp},
    {name:"仲間1",hp:"--",maxHp:"--"},
    {name:"仲間2",hp:"--",maxHp:"--"},
    {name:"仲間3",hp:"--",maxHp:"--"}
  ];

  return `
  <div class="partyStatus">
    ${members.map(m=>`
      <div class="partyBox">
        <div class="partyName">${m.name}</div>
        <div class="partyHp">HP ${m.hp}/${m.maxHp}</div>
      </div>
    `).join("")}
  </div>`;
}

function renderBattle(){
  const p=hero();
  const enemyHpRate=Math.max(0,Math.min(100,(enemy.hp/enemy.maxHp)*100));

  const btn={
    encounter:"ターン判定へ",
    turnSpin:"SPIN",
    turnResult:"攻撃パートへ",
    attackSpin:"SPIN",
    attackResult:getAttackResultButton(),
    rewardSpin:"SPIN",
    rewardResult:"行動選択へ"
  }[battleStep];

  scene.innerHTML=`
  ${battleStep!=="rewardSpin"&&battleStep!=="rewardResult"?renderPartyStatus():""}

  <div class="panel">
    ${battleStep!=="rewardSpin"&&battleStep!=="rewardResult"?`
    <div class="battleField">
      <img src="${enemy.bg}" class="battleBg">

      <div class="enemyHud">
        <div class="enemyName">${enemy.name}</div>
        <div class="enemyHpBar">
          <div class="enemyHpFill" style="width:${enemyHpRate}%"></div>
        </div>
      </div>

      <img src="${enemy.sprite}" class="enemySprite">
    </div>`:""}

    ${renderReels()}
    <div class="log">${logText}</div>
    <button class="main" onclick="nextAction()">${btn}</button>
  </div>`;
}

function renderReels(){
  return `
  <div class="rpgReelMachine">
    ${lastRoll.map((n,i)=>`
      <div class="rpgReelWindow">
        <div class="rpgReel">${n}</div>
        <div class="rpgLabel"></div>
      </div>
    `).join("")}
  </div>`;
}

function getAttackResultButton(){
  const p=hero();
  if(enemy.hp<=0)return "報酬チャンスへ";
  if(p.hp<=0)return "行動選択へ";
  return "次のターン判定へ";
}

function calcAttack(actor){
  const r=roll();
  const skill=actor.skills[r[0]-1];
  const level=actor.level || 1;
  const baseDamage=r[1]*(level*5);
  const mult=[1,2,3,4,5,7,10][r[2]-1];
  const damage=baseDamage*mult;
  return {r,skill,baseDamage,mult,damage};
}

function calcReward(enemy){
  const r=roll();
  const type=r[0]%2===0?"gold":"exp";
  const m1=r[1]%2===0?2:1;
  const m2=r[2]%2===0?4:3;
  const base=type==="exp"?enemy.baseExp:enemy.baseGold;
  const total=base*m1*m2;
  return {r,type,m1,m2,base,total};
}

function nextAction(){
  const p=hero();

  if(battleStep==="encounter"){
    battleStep="turnSpin";
    lastRoll=[1,1,1];
    logText="";
    render();
    return;
  }

  if(battleStep==="turnSpin"){
    lastRoll=roll();
    const sum=lastRoll[0]+lastRoll[1]+lastRoll[2];
    turnOwner=sum%2===0?"player":"enemy";
    logText=`合計 ${sum}\n${turnOwner==="player"?"プレイヤーターン！":"敵ターン！"}`;
    battleStep="turnResult";
    render();
    return;
  }

  if(battleStep==="turnResult"){
    battleStep="attackSpin";
    lastRoll=[1,1,1];
    logText="";
    render();
    return;
  }

  if(battleStep==="attackSpin"){
    const actor=turnOwner==="player"?p:enemy;
    const a=calcAttack(actor);
    lastRoll=a.r;

    if(turnOwner==="player"){
      enemy.hp-=a.damage;
      if(enemy.hp<0)enemy.hp=0;
      logText=`${p.name}の${a.skill}！\n${a.baseDamage} × ${a.mult}\n${a.damage}ダメージ！`;
      if(enemy.hp<=0)logText+=`\n\n${enemy.name}を倒した！`;
    }else{
      p.hp-=a.damage;
      if(p.hp<0)p.hp=0;
      logText=`${enemy.name}の${a.skill}！\n${a.baseDamage} × ${a.mult}\n${a.damage}ダメージ！`;
      if(p.hp<=0)logText+=`\n\n敗北…`;
    }

    battleStep="attackResult";
    render();
    return;
  }

  if(battleStep==="attackResult"){
    if(enemy.hp<=0){
      battleStep="rewardSpin";
      lastRoll=[1,1,1];
      logText="";
      render();
      return;
    }

    if(p.hp<=0){
      p.hp=p.maxHp;
      phase="action";
      save();
      render();
      return;
    }

    battleStep="turnSpin";
    lastRoll=[1,1,1];
    logText="";
    render();
    return;
  }

  if(battleStep==="rewardSpin"){
    lastReward=calcReward(enemy);
    lastRoll=lastReward.r;

    if(lastReward.type==="exp"){
      p.exp+=lastReward.total;
      logText=`EXP獲得！\n${lastReward.base} × ${lastReward.m1} × ${lastReward.m2}\n${lastReward.total}EXP`;

      while(p.exp>=p.nextExp){
        p.exp-=p.nextExp;
        p.level++;
        p.nextExp+=100;
        p.maxHp+=20;
        p.hp=p.maxHp;
        logText+=`\n\nレベルアップ！ Lv${p.level}`;
      }
    }else{
      p.gold+=lastReward.total;
      logText=`GOLD獲得！\n${lastReward.base} × ${lastReward.m1} × ${lastReward.m2}\n${lastReward.total}GOLD`;
    }

    updateUnlocks();
    save();
    battleStep="rewardResult";
    render();
    return;
  }

  if(battleStep==="rewardResult"){
    phase="action";
    render();
    return;
  }
}

render();
</script>
</body>
</html>
