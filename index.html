<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>七つの刻印 筐体ドット Ver.C3</title>
<style>
*{box-sizing:border-box}

body{
  margin:0;
  background:#12001f;
  color:white;
  font-family:monospace;
  text-align:center;
  image-rendering:pixelated;
}

.wrap{
  max-width:390px;
  margin:auto;
  padding:8px;
}

.machine{
  position:relative;
  background:#050008;
  border:8px solid #111;
  box-shadow:
    0 0 0 4px #3b0066,
    0 0 0 8px #050008,
    0 0 24px #9b4dff;
  padding:10px;
}

.pixelFrame{
  border:4px solid #c8a8ff;
  box-shadow:
    inset 0 0 0 4px #260045,
    0 0 12px #8b4dff;
  background:#09000f;
  margin-bottom:8px;
}

/* 上部LED */
.topLed{
  height:42px;
  background:
    linear-gradient(90deg,
      #050008 0 8%,
      #3b0066 8% 18%,
      #c084ff 18% 28%,
      #ffffff 28% 34%,
      #8b4dff 34% 42%,
      #050008 42% 58%,
      #8b4dff 58% 66%,
      #ffffff 66% 72%,
      #c084ff 72% 82%,
      #3b0066 82% 92%,
      #050008 92% 100%);
  box-shadow:0 0 18px #c084ff;
}

/* メイン液晶 */
.screen{
  height:130px;
  background:
    linear-gradient(#1d0030 0 20%,#050008 20% 80%,#260045 80% 100%);
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
}

.title{
  font-size:24px;
  color:#ead7ff;
  text-shadow:3px 3px #3b0066,0 0 12px #c084ff;
}

.sub{
  font-size:12px;
  color:#c084ff;
}

/* 左右LED柱 */
.sideLed{
  position:absolute;
  top:72px;
  width:16px;
  height:460px;
  background:
    repeating-linear-gradient(
      to bottom,
      #c084ff 0 12px,
      #3b0066 12px 24px,
      #050008 24px 32px
    );
  box-shadow:0 0 12px #c084ff;
}
.sideLed.left{left:4px}
.sideLed.right{right:4px}

/* リール部 */
.reelFrame{
  height:140px;
  padding:8px;
  background:
    linear-gradient(#d7d7e8 0 8%,#222 8% 18%,#050505 18% 82%,#777 82% 100%);
}

.reels{
  height:100%;
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:6px;
  background:#000;
  padding:5px;
}

.reel{
  background:#eee;
  border:4px solid #333;
  display:flex;
  flex-direction:column;
  justify-content:space-around;
}

.sym{
  margin:2px;
  padding:4px;
  background:#1d0030;
  color:#fff;
  border:2px solid #8b4dff;
  font-size:13px;
}

/* カウンター */
.counterRow{
  display:grid;
  grid-template-columns:1fr 1fr 1fr;
  gap:6px;
  margin-bottom:8px;
}

.counter{
  background:#030006;
  border:3px solid #555;
  padding:4px;
  box-shadow:inset 0 0 0 2px #000;
}

.counter span{
  display:block;
  font-size:10px;
  color:#aaa;
}

.counter b{
  color:#ff3030;
  font-size:22px;
  text-shadow:0 0 8px red;
}

/* 操作台 */
.deck{
  background:
    linear-gradient(#333 0 12%,#12001f 12% 70%,#050008 70% 100%);
  border:4px solid #777;
  padding:10px 6px;
  margin-bottom:8px;
}

.buttons{
  display:flex;
  justify-content:center;
  align-items:center;
  gap:10px;
}

.push{
  width:58px;
  height:32px;
  background:#8b4dff;
  border:4px solid #d7b7ff;
  box-shadow:4px 4px #12001f;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:12px;
}

.stop{
  width:46px;
  height:46px;
  background:#d00000;
  border:5px solid #ff8080;
  box-shadow:4px 4px #300000;
  border-radius:50%;
}

/* 下パネル */
.lowerPanel{
  height:150px;
  display:grid;
  grid-template-columns:repeat(7,1fr);
  border:4px solid #c8a8ff;
  background:#050008;
  box-shadow:0 0 12px #8b4dff;
}

.guardian{
  border-left:2px solid rgba(255,255,255,.2);
  display:flex;
  align-items:flex-end;
  justify-content:center;
  padding-bottom:8px;
  font-size:11px;
  font-weight:bold;
}

.g1{background:#320000;color:#ff4040}
.g2{background:#222;color:#ccc}
.g3{background:#3a3000;color:#ffd84d}
.g4{background:#2d0044;color:#c084ff}
.g5{background:#003b11;color:#58ff72}
.g6{background:#001f44;color:#4da6ff}
.g7{background:#3b0028;color:#ff8bd8}

/* 下部スピーカー */
.speaker{
  height:42px;
  background:
    repeating-linear-gradient(
      90deg,
      #050505 0 8px,
      #222 8px 12px,
      #050505 12px 20px
    );
  border:4px solid #333;
  box-shadow:inset 0 0 12px #000;
}
</style>
</head>

<body>
<div class="wrap">
  <div class="machine">

    <div class="sideLed left"></div>
    <div class="sideLed right"></div>

    <div class="pixelFrame topLed"></div>

    <div class="pixelFrame screen">
      <div class="title">七つの刻印</div>
      <div class="sub">SEVEN SEALS / APOCALIS</div>
    </div>

    <div class="pixelFrame reelFrame">
      <div class="reels">
        <div class="reel">
          <div class="sym">紫7</div>
          <div class="sym">刻印</div>
          <div class="sym">ベル</div>
        </div>
        <div class="reel">
          <div class="sym">紫7</div>
          <div class="sym">BAR</div>
          <div class="sym">リプ</div>
        </div>
        <div class="reel">
          <div class="sym">紫7</div>
          <div class="sym">鐘</div>
          <div class="sym">刻印</div>
        </div>
      </div>
    </div>

    <div class="counterRow">
      <div class="counter"><span>CREDIT</span><b>050</b></div>
      <div class="counter"><span>BET</span><b>003</b></div>
      <div class="counter"><span>PAY</span><b>000</b></div>
    </div>

    <div class="deck">
      <div class="buttons">
        <div class="push">PUSH</div>
        <div class="stop"></div>
        <div class="stop"></div>
        <div class="stop"></div>
      </div>
    </div>

    <div class="lowerPanel">
      <div class="guardian g1">憤怒</div>
      <div class="guardian g2">怠惰</div>
      <div class="guardian g3">傲慢</div>
      <div class="guardian g4">強欲</div>
      <div class="guardian g5">嫉妬</div>
      <div class="guardian g6">暴食</div>
      <div class="guardian g7">色欲</div>
    </div>

    <div class="speaker"></div>

  </div>
</div>
</body>
</html>
