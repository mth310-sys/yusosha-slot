<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>七つの刻印 共通筐体A Ver.0.7</title>
<style>
*{box-sizing:border-box}
body{
  margin:0;
  background:#050008;
  color:#fff;
  font-family:serif;
  text-align:center;
}
.wrap{
  max-width:390px;
  margin:auto;
  padding:4px;
}
.machine{
  position:relative;
  height:760px;
  background:linear-gradient(135deg,#050008,#25003d,#050008);
  border:5px solid #7d35ff;
  border-radius:24px;
  padding:8px;
  box-shadow:0 0 26px #9b45ff,inset 0 0 35px #000;
  overflow:hidden;
}
.top-led{
  height:24px;
  border-radius:20px;
  background:linear-gradient(90deg,#4b0082,#ff7bff,#4b0082);
  box-shadow:0 0 18px #d86cff;
  animation:led 1.5s infinite alternate;
}
.title-area{
  position:relative;
  height:48px;
  display:flex;
  align-items:center;
  justify-content:center;
}
.title{
  font-size:28px;
  font-weight:bold;
  text-shadow:0 0 12px #c06cff;
}
.brand{
  position:absolute;
  right:18px;
  bottom:4px;
  font-size:13px;
  color:#e9d7ff;
}
.top-panel{
  height:88px;
  border:2px solid #b66cff;
  border-radius:12px;
  overflow:hidden;
  box-shadow:0 0 15px #7d35ff;
}
.top-panel img{
  width:100%;
  height:100%;
  object-fit:cover;
}
.center{
  margin-top:10px;
  height:160px;
  border:3px solid #4b1b80;
  border-radius:14px;
  background:#111;
  padding:10px;
}
.mode{
  height:28px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:0 8px;
  background:#180020;
  border:1px solid #7d35ff;
  border-radius:8px;
  font-size:14px;
}
.mode-name{color:#ff4b4b;font-weight:bold}
.reels{
  display:flex;
  justify-content:center;
  gap:10px;
  margin-top:10px;
}
.reel{
  width:82px;
  height:104px;
  background:linear-gradient(#f0f0f0,#999,#f0f0f0);
  border:4px solid #111;
  border-radius:10px;
  display:flex;
  align-items:center;
  justify-content:center;
}
.reel img{
  width:64px;
  height:64px;
  object-fit:contain;
}
.msg{
  height:28px;
  margin-top:8px;
  color:#e7c6ff;
  font-size:16px;
  text-shadow:0 0 8px #c06cff;
}
.info{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:6px;
  margin-top:8px;
}
.box{
  background:#09000f;
  border:1px solid #7d35ff;
  border-radius:8px;
  padding:5px;
  font-size:11px;
}
.num{
  color:#ff3bff;
  font-size:17px;
}
.buttons-main{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:7px;
  margin-top:10px;
}
button{
  border:none;
  color:#fff;
  font-weight:bold;
  cursor:pointer;
  box-shadow:0 0 10px #000;
}
.start,.bet,.reset{
  height:46px;
  border-radius:16px;
  font-size:12px;
  background:linear-gradient(#ff5454,#850000);
}
.buttons-stop{
  display:flex;
  justify-content:center;
  gap:34px;
  margin-top:10px;
}
.stop{
  width:52px;
  height:52px;
  border-radius:50%;
  font-size:10px;
  background:radial-gradient(circle,#ff5a5a,#8c0018);
  border:3px solid #ffb6b6;
}
button:disabled{opacity:.35}
.bottom-panel{
  width:86%;
  margin:12px auto 0;
  border:2px solid #b66cff;
  border-radius:12px;
  overflow:hidden;
  box-shadow:0 0 15px #7d35ff;
}
.bottom-panel img{
  width:100%;
  display:block;
}
.reset-zone{
  margin-top:10px;
  height:40px;
  border-radius:12px;
  background:linear-gradient(180deg,#0a0010,#210038,#050008);
  border:1px solid #4d1688;
}
.flash{animation:flash .5s 3}
.apocalis{animation:apocalisGlow 1s infinite alternate}
@keyframes led{from{filter:brightness(1)}to{filter:brightness(1.8)}}
@keyframes flash{50%{filter:brightness(2.3)}}
@keyframes apocalisGlow{
  from{box-shadow:0 0 26px #9b45ff,inset 0 0 35px #000}
  to{box-shadow:0 0 42px #ff7bff,inset 0 0 50px #2a0040}
}
</style>
</head>
<body>
<div class="wrap">
<div class="machine" id="machine">

<div class="top-led"></div>

<div class="title-area">
  <div class="title">七つの刻印</div>
  <div class="brand">遊創舎</div>
</div>

<div class="top-panel">
  <img id="topPanel" src="seven_seals_panel_normal.png">
</div>

<div class="center">
  <div class="mode">
    <div>MODE：<span id="modeName" class="mode-name">通常</span></div>
    <div>刻印CHANCE</div>
  </div>

  <div class="reels">
    <div class="reel"><img id="r0"></div>
    <div class="reel"><img id="r1"></div>
    <div class="reel"><img id="r2"></div>
  </div>
</div>

<div class="msg" id="msg">BETしてください</div>

<div class="info">
  <div class="box">CREDIT<div class="num" id="credit">50</div></div>
  <div class="box">BET<div class="num" id="bet">0</div></div>
  <div class="box">PAY<div class="num" id="pay">0</div></div>
</div>

<div class="buttons-main">
  <button class="start" id="startBtn">START</button>
  <button class="bet" id="betBtn">BET</button>
  <button class="bet" id="maxBetBtn">MAX BET</button>
  <button class="reset" id="resetBtn">RESET</button>
</div>

<div class="buttons-stop">
  <button class="stop" id="s0">STOP</button>
  <button class="stop" id="s1">STOP</button>
  <button class="stop" id="s2">STOP</button>
</div>

<div class="bottom-panel">
  <img src="24BE7708-F796-4B2F-BDEA-77A632106F3C.PNG">
</div>

<div class="reset-zone"></div>

</div>
</div>

<script>
const symbols={
  RED7:"symbol_red7.png",
  BLUE7:"symbol_bluepurple7.png",
  BELL:"symbol_bell.png",
  CHERRY:"symbol_cherry.png",
  REPLAY:"symbol_replay.png",
  SEAL:"symbol_seal.png"
};
const keys=Object.keys(symbols);
let credit=50,bet=0,pay=0;
let reels=["CHERRY","BELL","REPLAY"];
let result=["CHERRY","BELL","REPLAY"];
let spinning=[false,false,false];
let timers=[null,null,null];
let stopped=0,seals=0;
const $=id=>document.getElementById(id);

function update(){
  credit=Math.max(0,credit);
  $("credit").textContent=credit;
  $("bet").textContent=bet;
  $("pay").textContent=pay;
  reels.forEach((s,i)=>$("r"+i).src=symbols[s]);
  $("startBtn").disabled=bet<3||spinning.some(Boolean);
  $("betBtn").disabled=credit<=0||bet>=3||spinning.some(Boolean);
  $("maxBetBtn").disabled=credit<=0||bet>=3||spinning.some(Boolean);
  for(let i=0;i<3;i++)$("s"+i).disabled=!spinning[i];
}
function msg(t){$("msg").textContent=t}
function rand(){return keys[Math.floor(Math.random()*keys.length)]}
function chooseResult(){
  const r=Math.random();
  if(r<0.015)return["BLUE7","BLUE7","BLUE7"];
  if(r<0.060)return["RED7","RED7","SEAL"];
  if(r<0.160)return["SEAL","SEAL","SEAL"];
  if(r<0.270)return["SEAL","SEAL","BELL"];
  if(r<0.420)return["BELL","BELL","BELL"];
  if(r<0.560)return["CHERRY","CHERRY","CHERRY"];
  if(r<0.700)return["REPLAY","REPLAY","REPLAY"];
  return[rand(),rand(),rand()];
}
function start(){
  result=chooseResult();
  stopped=0;pay=0;
  msg("リール始動…");
  for(let i=0;i<3;i++){
    spinning[i]=true;
    timers[i]=setInterval(()=>{reels[i]=rand();update()},80);
  }
  update();
}
function stop(i){
  if(!spinning[i])return;
  clearInterval(timers[i]);
  reels[i]=result[i];
  spinning[i]=false;
  stopped++;
  update();
  if(stopped===3)judge();
}
function judge(){
  const[a,b,c]=reels;
  let payout=0;
  if(a==="BLUE7"&&b==="BLUE7"&&c==="BLUE7"){
    payout=100;enterApocalis("青紫7揃い！終焉ノ刻 直撃！");
  }else if(a==="RED7"&&b==="RED7"&&c==="SEAL"){
    payout=50;sealGet("守護者BONUS！刻印獲得！");
  }else if(a==="SEAL"&&b==="SEAL"&&c==="SEAL"){
    sealGet("刻印3揃い！守護者MODE成功！");
  }else if(a==="SEAL"&&b==="SEAL"&&c==="BELL"){
    msg("刻印CHANCE！");
  }else if(a==="BELL"&&b==="BELL"&&c==="BELL"){
    payout=10;msg("ベル成立 +10");
  }else if(a==="CHERRY"&&b==="CHERRY"&&c==="CHERRY"){
    payout=5;msg("チェリー成立 +5");
  }else if(a==="REPLAY"&&b==="REPLAY"&&c==="REPLAY"){
    msg("リプレイ");
  }else{
    msg("ハズレ");
  }
  pay=payout;
  credit+=payout;
  bet=0;
  update();
}
function sealGet(text){
  if(seals<7)seals++;
  $("modeName").textContent="守護者MODE";
  msg(text+" 現在："+seals+"/7");
  flash();
  if(seals>=7)enterApocalis("七刻印完成！終焉神アポカリス降臨！");
}
function enterApocalis(text){
  $("topPanel").src="seven_seals_panel_apocalis.png";
  $("modeName").textContent="終焉ノ刻";
  $("machine").classList.add("apocalis");
  msg(text);flash();
}
function flash(){
  $("machine").classList.add("flash");
  setTimeout(()=>$("machine").classList.remove("flash"),1600);
}
$("betBtn").onclick=()=>{if(credit>0&&bet<3){credit--;bet++;msg("BETしました");update()}};
$("maxBetBtn").onclick=()=>{while(credit>0&&bet<3){credit--;bet++}msg("MAX BET");update()};
$("startBtn").onclick=start;
$("s0").onclick=()=>stop(0);
$("s1").onclick=()=>stop(1);
$("s2").onclick=()=>stop(2);
$("resetBtn").onclick=()=>{
  credit=50;bet=0;pay=0;seals=0;
  reels=["CHERRY","BELL","REPLAY"];
  $("topPanel").src="seven_seals_panel_normal.png";
  $("modeName").textContent="通常";
  $("machine").classList.remove("apocalis");
  msg("BETしてください");
  update();
};
update();
</script>
</body>
</html>
