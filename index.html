<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>七つの刻印 Ver.0.4.0</title>
<style>
*{box-sizing:border-box}
body{
  margin:0;
  background:#020005;
  color:white;
  font-family:sans-serif;
  text-align:center;
}
.wrap{
  width:100%;
  max-width:420px;
  margin:auto;
  padding:4px;
}
.machine{
  position:relative;
  width:100%;
  aspect-ratio:538/983;
  margin:auto;
  background:url("machine_base_full.png") center/contain no-repeat;
  overflow:hidden;
}

/* リール */
.reelArea{
  position:absolute;
  left:29.5%;
  top:42.8%;
  width:39%;
  height:15%;
  display:flex;
  gap:4%;
  justify-content:center;
  align-items:center;
}
.reel{
  width:30%;
  height:82%;
  border-radius:8px;
  background:linear-gradient(#fff,#ddd);
  color:#24002f;
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:bold;
  font-size:18px;
  box-shadow:inset 0 0 14px #000,0 0 10px #b45cff;
  overflow:hidden;
}
.reel img{
  max-width:95%;
  max-height:95%;
  object-fit:contain;
}
.spin{
  animation:spin .1s infinite;
}
@keyframes spin{
  50%{transform:translateY(5px);filter:blur(1px)}
}

/* 表示系 */
.credit,.bet,.pay{
  position:absolute;
  top:62.5%;
  font-family:monospace;
  font-size:18px;
  color:#ff3030;
  text-shadow:0 0 8px #f00;
}
.credit{left:36.8%}
.bet{left:50%;transform:translateX(-50%);color:#76ff8f;text-shadow:0 0 8px #4dff78}
.pay{right:38%}

.stateText{
  position:absolute;
  top:61%;
  left:50%;
  transform:translateX(-50%);
  font-weight:bold;
  color:#fff3a0;
  font-size:13px;
  text-shadow:0 0 8px #b45cff;
  white-space:nowrap;
}
.msg{
  position:absolute;
  top:73.5%;
  left:50%;
  width:70%;
  transform:translateX(-50%);
  color:#fff3a0;
  font-weight:bold;
  font-size:18px;
  text-shadow:0 0 8px #b45cff;
}

/* 透明ボタン */
.hit{
  position:absolute;
  border:none;
  background:transparent;
  color:transparent;
  padding:0;
}
.hit:active{
  background:rgba(255,255,255,.12);
  border-radius:50%;
}
#startBtn{left:12%;top:58.9%;width:12%;height:4.5%}
#maxBetBtn{left:25%;top:58.9%;width:12%;height:4.5%}
#resetBtn{right:11%;top:58.9%;width:13%;height:4.5%}
#s0{left:31%;top:65.2%;width:10%;height:5.8%}
#s1{left:45%;top:65.2%;width:10%;height:5.8%}
#s2{left:59%;top:65.2%;width:10%;height:5.8%}
</style>
</head>

<body>
<div class="wrap">
  <div class="machine">

    <div class="reelArea">
      <div id="r0" class="reel">刻印</div>
      <div id="r1" class="reel">ベル</div>
      <div id="r2" class="reel">リプ</div>
    </div>

    <div id="stateView" class="stateText">STATE：通常</div>

    <div id="creditView" class="credit">100</div>
    <div id="betView" class="bet">0</div>
    <div id="payView" class="pay">0</div>

    <div id="msg" class="msg">BETしてください</div>

    <button id="startBtn" class="hit">START</button>
    <button id="maxBetBtn" class="hit">MAX BET</button>
    <button id="resetBtn" class="hit">RESET</button>

    <button id="s0" class="hit">STOP</button>
    <button id="s1" class="hit">STOP</button>
    <button id="s2" class="hit">STOP</button>

  </div>
</div>

<script>
const IMG={
  red7:"symbol_red7.png",
  blue7:"symbol_bluepurple7.png",
  bell:"symbol_bell.png",
  cherry:"symbol_cherry.png",
  replay:"symbol_replay.png",
  seal:"symbol_seal.png"
};

let credit=100;
let bet=0;
let pay=0;
let spinning=false;
let stopCount=0;
let finalReels=["刻印","ベル","リプ"];
let timers=[null,null,null];

const $=id=>document.getElementById(id);
const symbols=["赤7","青紫7","ベル","チェリー","リプ","刻印"];

function symbolHtml(name){
  const map={
    "赤7":IMG.red7,
    "青紫7":IMG.blue7,
    "ベル":IMG.bell,
    "チェリー":IMG.cherry,
    "リプ":IMG.replay,
    "刻印":IMG.seal
  };
  return map[name]
    ? `<img src="${map[name]}" onerror="this.parentNode.textContent='${name}'">`
    : name;
}

function setReel(i,name){
  $("r"+i).innerHTML=symbolHtml(name);
}

function update(){
  $("creditView").textContent=credit;
  $("betView").textContent=bet;
  $("payView").textContent=pay;

  $("startBtn").disabled=spinning || bet!==3;
  $("maxBetBtn").disabled=spinning || credit<3 || bet===3;
  $("s0").disabled=!spinning;
  $("s1").disabled=!spinning;
  $("s2").disabled=!spinning;
}

function maxBet(){
  if(spinning || bet===3 || credit<3)return;
  credit-=3;
  bet=3;
  $("msg").textContent="STARTできます";
  update();
}

function chooseResult(){
  const r=Math.random();

  if(r<0.015)return ["青紫7","青紫7","青紫7"];
  if(r<0.055)return ["赤7","赤7","赤7"];
  if(r<0.18)return ["ベル","ベル","ベル"];
  if(r<0.30)return ["チェリー","刻印","ベル"];
  if(r<0.43)return ["リプ","リプ","リプ"];
  if(r<0.52)return ["刻印","刻印","刻印"];

  return ["ベル","赤7","リプ"];
}

function start(){
  if(spinning || bet!==3)return;

  spinning=true;
  stopCount=0;
  pay=0;
  finalReels=chooseResult();

  for(let i=0;i<3;i++){
    $("r"+i).classList.add("spin");
    timers[i]=setInterval(()=>{
      setReel(i,symbols[Math.floor(Math.random()*symbols.length)]);
    },80);
  }

  $("msg").textContent="リール回転中";
  update();
}

function stop(i){
  if(!spinning || !$("r"+i).classList.contains("spin"))return;

  clearInterval(timers[i]);
  $("r"+i).classList.remove("spin");
  setReel(i,finalReels[i]);

  stopCount++;

  if(stopCount===3){
    spinning=false;
    resolve();
  }

  update();
}

function resolve(){
  bet=0;

  const result=finalReels.join("");

  if(result==="青紫7青紫7青紫7"){
    pay=100;
    credit+=pay;
    $("stateView").textContent="STATE：終焉ノ刻";
    $("msg").textContent="青紫7揃い！";
  }
  else if(result==="赤7赤7赤7"){
    pay=50;
    credit+=pay;
    $("stateView").textContent="STATE：BONUS";
    $("msg").textContent="赤7 BONUS";
  }
  else if(result==="ベルベルベル"){
    pay=8;
    credit+=pay;
    $("msg").textContent="ベル 8枚";
  }
  else if(result==="リプリプリプ"){
    pay=0;
    $("msg").textContent="リプレイ";
  }
  else if(result==="刻印刻印刻印"){
    pay=0;
    $("stateView").textContent="STATE：守護者MODE";
    $("msg").textContent="刻印揃い！";
  }
  else{
    pay=0;
    $("msg").textContent="ハズレ";
  }

  update();
}

function reset(){
  credit=100;
  bet=0;
  pay=0;
  spinning=false;
  stopCount=0;

  timers.forEach(t=>clearInterval(t));
  for(let i=0;i<3;i++){
    $("r"+i).classList.remove("spin");
  }

  setReel(0,"刻印");
  setReel(1,"ベル");
  setReel(2,"リプ");

  $("stateView").textContent="STATE：通常";
  $("msg").textContent="BETしてください";

  update();
}

$("maxBetBtn").onclick=maxBet;
$("startBtn").onclick=start;
$("resetBtn").onclick=reset;
$("s0").onclick=()=>stop(0);
$("s1").onclick=()=>stop(1);
$("s2").onclick=()=>stop(2);

setReel(0,"刻印");
setReel(1,"ベル");
setReel(2,"リプ");
update();
</script>
</body>
</html>
