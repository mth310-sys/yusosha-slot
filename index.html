<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>終焉神アポカリス専用機 Ver.C1</title>
<style>
*{box-sizing:border-box}

body{
  margin:0;
  background:radial-gradient(circle,#1b0030,#020005 75%);
  color:white;
  font-family:sans-serif;
  text-align:center;
}

.wrap{
  max-width:430px;
  margin:auto;
  padding:8px;
}

.machine{
  position:relative;
  overflow:hidden;
  border:10px solid #050505;
  border-radius:34px;
  padding:10px;
  background:
    linear-gradient(90deg,rgba(255,255,255,.45),transparent 9%,transparent 91%,rgba(255,255,255,.45)),
    linear-gradient(135deg,#d9d9e8,#0b0b0f 12%,#210033 45%,#050008 70%,#9b7cff);
  box-shadow:
    0 0 36px #9b4dff,
    inset 0 0 50px #000,
    inset 0 0 0 3px #7d39ff,
    inset 0 0 0 8px rgba(255,255,255,.12);
}

.machine:before{
  content:"";
  position:absolute;
  inset:10px;
  border-radius:26px;
  border:2px solid rgba(210,170,255,.7);
  box-shadow:0 0 18px #a45cff,inset 0 0 18px #a45cff;
  pointer-events:none;
}

.topLed{
  height:38px;
  margin-bottom:8px;
  border-radius:18px;
  background:
    radial-gradient(circle at center,#d6a8ff,#6d22c9 35%,#09000f 70%),
    linear-gradient(90deg,#160020,#b45cff,#160020);
  box-shadow:0 0 24px #c084ff,inset 0 0 14px #fff;
  position:relative;
}

.topLed:before{
  content:"✦";
  position:absolute;
  inset:0;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:26px;
  color:#f1ddff;
  text-shadow:0 0 12px #fff,0 0 20px #b45cff;
}

.sidePanel{
  position:absolute;
  top:70px;
  width:34px;
  height:62%;
  border-radius:20px;
  background:
    linear-gradient(90deg,#050505,#454545,#ffffff,#7d39ff,#12001c);
  box-shadow:
    inset 0 0 18px rgba(255,255,255,.7),
    inset 0 0 24px #000,
    0 0 20px #9b4dff;
  z-index:1;
}
.sidePanel.left{left:8px}
.sidePanel.right{right:8px;transform:scaleX(-1)}

.sideLed{
  position:absolute;
  top:92px;
  width:18px;
  height:52%;
  border-radius:14px;
  background:linear-gradient(#3b0066,#f0c8ff,#5a00a0,#110018);
  box-shadow:0 0 22px #c084ff,inset 0 0 10px #fff;
  z-index:2;
}
.sideLed.left{left:16px}
.sideLed.right{right:16px}

.panel{
  position:relative;
  z-index:3;
  border:2px solid #b68cff;
  border-radius:18px;
  background:linear-gradient(180deg,rgba(255,255,255,.14),rgba(20,0,35,.9) 20%,rgba(0,0,0,.92));
  box-shadow:
    inset 0 0 16px #000,
    inset 0 1px 5px rgba(255,255,255,.35),
    0 0 14px rgba(180,92,255,.75);
  margin:8px 0;
  padding:8px;
}

.mainScreen{
  height:150px;
  border-radius:16px;
  overflow:hidden;
  background:
    radial-gradient(circle at center,rgba(150,60,255,.45),rgba(0,0,0,.85) 65%),
    linear-gradient(135deg,#2b0040,#050008);
  border:3px solid #1a1a1a;
  box-shadow:inset 0 0 26px #000,0 0 20px #8b4dff;
  display:flex;
  align-items:center;
  justify-content:center;
  flex-direction:column;
}

.mainTitle{
  font-size:32px;
  font-weight:bold;
  color:#ead7ff;
  text-shadow:0 0 12px #fff,0 0 22px #9b4dff;
}

.subTitle{
  font-size:13px;
  color:#d7b7ff;
  letter-spacing:4px;
}

.reelFrame{
  height:150px;
  padding:10px;
  border-radius:18px;
  background:
    linear-gradient(180deg,#c9c9d2,#161616 12%,#050505 80%,#777);
  box-shadow:inset 0 0 20px #000,0 0 14px #7d39ff;
}

.reels{
  height:100%;
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:6px;
}

.reel{
  border-radius:8px;
  background:linear-gradient(180deg,#050505,#1b1b1b,#050505);
  border:2px solid #444;
  box-shadow:inset 0 0 18px #000;
  display:flex;
  flex-direction:column;
  justify-content:space-around;
  align-items:center;
  color:#d7b7ff;
  font-weight:bold;
}

.symbol{
  width:64px;
  height:30px;
  border-radius:6px;
  background:linear-gradient(135deg,#3b0066,#050008);
  border:1px solid #7d39ff;
  display:flex;
  align-items:center;
  justify-content:center;
  box-shadow:0 0 8px #7d39ff;
}

.infoRow{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:8px;
}

.infoBox{
  background:#050505;
  border:2px solid #333;
  border-radius:8px;
  padding:6px;
  box-shadow:inset 0 0 12px #000,0 0 8px #7d39ff;
}

.infoBox span{
  display:block;
  font-size:11px;
  color:#aaa;
}

.infoBox b{
  font-family:monospace;
  font-size:24px;
  color:#ff3030;
  text-shadow:0 0 10px red;
}

.controlPanel{
  height:72px;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:18px;
  border-radius:18px;
  background:
    linear-gradient(180deg,rgba(255,255,255,.18),rgba(0,0,0,.85)),
    linear-gradient(90deg,#050505,#32004d,#050505);
  box-shadow:inset 0 0 18px #000,0 0 14px #7d39ff;
}

.push{
  width:62px;
  height:34px;
  border-radius:12px;
  background:linear-gradient(#f0c8ff,#7d39ff,#24003d);
  box-shadow:0 0 14px #b45cff,inset 0 2px 6px #fff;
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:bold;
}

.stop{
  width:46px;
  height:46px;
  border-radius:50%;
  background:radial-gradient(circle at 35% 25%,#ffc0c0,#ff3030 42%,#5a0000);
  box-shadow:0 0 14px red,0 5px 0 #220000,inset 0 5px 8px rgba(255,255,255,.35);
}

.lowerPanel{
  height:150px;
  border-radius:16px;
  overflow:hidden;
  background:
    linear-gradient(90deg,#3b0000,#111,#6b5200,#210033,#173300,#001c40,#3b0028);
  border:3px solid #151515;
  box-shadow:inset 0 0 24px #000,0 0 18px #8b4dff;
  display:grid;
  grid-template-columns:repeat(7,1fr);
}

.guardian{
  border-left:1px solid rgba(255,255,255,.18);
  display:flex;
  align-items:flex-end;
  justify-content:center;
  padding-bottom:8px;
  font-size:12px;
  font-weight:bold;
  text-shadow:0 0 8px currentColor;
}

.g1{color:#ff4040;background:linear-gradient(#250000,#000)}
.g2{color:#ccc;background:linear-gradient(#222,#000)}
.g3{color:#ffd84d;background:linear-gradient(#3a2b00,#000)}
.g4{color:#c084ff;background:linear-gradient(#27003f,#000)}
.g5{color:#58ff72;background:linear-gradient(#003b10,#000)}
.g6{color:#4da6ff;background:linear-gradient(#001f44,#000)}
.g7{color:#66ffff;background:linear-gradient(#00333a,#000)}

.bottomFrame{
  height:46px;
  border-radius:0 0 24px 24px;
  background:
    radial-gradient(circle at 20% 50%,#111,#000 45%),
    radial-gradient(circle at 80% 50%,#111,#000 45%),
    linear-gradient(180deg,#333,#050505);
  box-shadow:inset 0 0 18px #000,0 0 16px #7d39ff;
}
</style>
</head>

<body>
<div class="wrap">
  <div class="machine">

    <div class="sidePanel left"></div>
    <div class="sidePanel right"></div>
    <div class="sideLed left"></div>
    <div class="sideLed right"></div>

    <div class="topLed"></div>

    <div class="panel">
      <div class="mainScreen">
        <div class="mainTitle">七つの刻印</div>
        <div class="subTitle">終焉ノ刻</div>
      </div>
    </div>

    <div class="panel">
      <div class="reelFrame">
        <div class="reels">
          <div class="reel">
            <div class="symbol">紫7</div>
            <div class="symbol">BAR</div>
            <div class="symbol">ベル</div>
          </div>
          <div class="reel">
            <div class="symbol">紫7</div>
            <div class="symbol">BAR</div>
            <div class="symbol">ベル</div>
          </div>
          <div class="reel">
            <div class="symbol">ベル</div>
            <div class="symbol">青珠</div>
            <div class="symbol">刻印</div>
          </div>
        </div>
      </div>
    </div>

    <div class="infoRow">
      <div class="infoBox">
        <span>CREDIT</span>
        <b>50</b>
      </div>
      <div class="infoBox">
        <span>PAYOUT</span>
        <b>00</b>
      </div>
    </div>

    <div class="panel">
      <div class="controlPanel">
        <div class="push">PUSH</div>
        <div class="stop"></div>
        <div class="stop"></div>
        <div class="stop"></div>
      </div>
    </div>

    <div class="panel">
      <div class="lowerPanel">
        <div class="guardian g1">憤怒</div>
        <div class="guardian g2">怠惰</div>
        <div class="guardian g3">傲慢</div>
        <div class="guardian g4">強欲</div>
        <div class="guardian g5">嫉妬</div>
        <div class="guardian g6">暴食</div>
        <div class="guardian g7">色欲</div>
      </div>
    </div>

    <div class="bottomFrame"></div>

  </div>
</div>
</body>
</html>
