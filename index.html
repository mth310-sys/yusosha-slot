<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>モンスターブリーダーサクセス Mock Ver.0.2</title>
<style>
*{box-sizing:border-box}
html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#111;font-family:-apple-system,BlinkMacSystemFont,"Helvetica Neue",sans-serif;color:#2b2418}
.app{width:100vw;height:100dvh;max-width:430px;margin:auto;background:#f4ead7;padding:8px;overflow:hidden}
.screen{display:none;height:100%;overflow:hidden}
.screen.active{display:flex;flex-direction:column}
.panel{background:#fff8e8;border:2px solid #b8955a;border-radius:10px;padding:6px;margin-bottom:6px;overflow:hidden}
.header{height:36px;display:flex;align-items:center;justify-content:space-between;background:#2d3b55;color:#fff4c4;font-weight:900;font-size:14px}
button{border:0;border-radius:9px;background:#2d3b55;color:#fff4c4;font-weight:900}
button:disabled{opacity:.45;background:#999;color:#eee}
.title-screen{justify-content:center;align-items:center;gap:22px;text-align:center}
.logo{font-size:30px;font-weight:900;line-height:1.3}
.big-btn{width:220px;height:44px;font-size:16px}
.center{justify-content:center;gap:12px}
.dialog{font-size:17px;line-height:1.7;padding:18px}
.choice{height:42px;font-size:16px}
.profile{height:104px;display:grid;grid-template-columns:1fr 1fr;gap:8px;font-size:12px;line-height:1.45}
.block-title{font-size:13px;font-weight:900;border-bottom:1px solid #c8a86a;margin-bottom:4px}
.monster-panel{height:118px;display:grid;grid-template-columns:88px 1fr;gap:8px;font-size:12px;line-height:1.45}
.chara{height:92px;border:2px solid #8b6f3d;border-radius:9px;background:#efe0bd;display:flex;align-items:center;justify-content:center;text-align:center;font-weight:900;font-size:34px;line-height:1.2}
.ability-grid{display:grid;grid-template-columns:1fr 1fr 1fr;row-gap:4px}
.actions-panel{height:106px}
.actions{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px}
.actions button{height:32px;font-size:14px}
.log-title{font-weight:900;font-size:14px;border-bottom:1px solid #b8955a;margin:0 0 5px}
.log{flex:1;min-height:116px;background:#241e12;color:#fff5d8;border-radius:9px;padding:8px 12px;font-size:13px;line-height:1.55;overflow:hidden}
.bottom{height:46px;display:grid;grid-template-columns:repeat(5,1fr);gap:5px;margin-top:6px}
.bottom button{font-size:13px}
.simple{flex:1;font-size:15px;line-height:1.65;overflow:hidden}
.command-buttons,.monster-buttons{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.command-buttons button,.monster-buttons button{height:54px;font-size:13px;line-height:1.25;padding:4px}
.box-list{font-size:13px;line-height:1.55;overflow:hidden}
.note{font-size:13px;line-height:1.6;color:#5b4a2c}
</style>
</head>

<body>
<div class="app">

<section id="title" class="screen active title-screen">
  <div class="logo">モンスター<br>ブリーダーサクセス</div>
  <button class="big-btn" onclick="newGame()">はじめる</button>
  <button class="big-btn" onclick="show('setting')">せってい</button>
</section>

<section id="main" class="screen">
  <div class="panel header">
    <span>モンスターブリーダー</span>
    <span id="dateLabel">1年目 1月</span>
  </div>

  <div class="panel profile">
    <div id="breederLeft"></div>
    <div id="breederRight"></div>
  </div>

  <div class="panel monster-panel">
    <div id="monsterIcon" class="chara">🐾</div>
    <div>
      <div class="block-title">育成中モンスター</div>
      <div id="monsterInfo"></div>
      <div class="block-title">能力値</div>
      <div id="abilityGrid" class="ability-grid"></div>
    </div>
  </div>

  <div class="panel actions-panel">
    <div class="block-title">行動</div>
    <div class="actions">
      <button onclick="openMonster()">モンスター</button>
      <button onclick="openTrain()">育成</button>
      <button onclick="openExplore()">探索</button>
      <button onclick="openTournament()">大会</button>
      <button onclick="restMonster()">休養</button>
      <button onclick="openBreed()">配合</button>
    </div>
  </div>

  <div class="log-title">牧場ログ（最新5件）</div>
  <div id="log" class="log"></div>

  <nav class="bottom">
    <button onclick="show('main')">メイン</button>
    <button onclick="show('record')">記録</button>
    <button onclick="show('box')">BOX</button>
    <button onclick="show('book')">図鑑</button>
    <button onclick="show('setting')">設定</button>
  </nav>
</section>

<section id="monster" class="screen">
  <div class="panel header"><span>モンスター管理</span><span>育成中 / BOX</span></div>
  <div id="monsterText" class="panel simple"></div>
  <div id="monsterButtons" class="panel monster-buttons"></div>
  <button class="choice" onclick="show('main')">戻る</button>
</section>

<section id="train" class="screen center">
  <div class="panel dialog">
    <b>育成メニュー</b><br><br>
    育成内容を選んでください。
  </div>
  <div id="trainButtons" class="panel command-buttons"></div>
  <button class="choice" onclick="show('main')">戻る</button>
</section>

<section id="explore" class="screen center">
  <div class="panel dialog">
    <b>探索先</b><br><br>
    探索すると素材やお金を見つけます。低確率で新しいモンスターも出ます。
  </div>
  <div id="exploreButtons" class="panel command-buttons"></div>
  <button class="choice" onclick="show('main')">戻る</button>
</section>

<section id="tournament" class="screen center">
  <div class="panel dialog">
    <b>大会</b><br><br>
    能力値で勝敗を判定します。
  </div>
  <div id="tournamentButtons" class="panel command-buttons"></div>
  <button class="choice" onclick="show('main')">戻る</button>
</section>

<section id="breed" class="screen">
  <div class="panel header"><span>配合</span><span>仮実装</span></div>
  <div id="breedText" class="panel simple"></div>
  <div id="breedButtons" class="panel monster-buttons"></div>
  <button class="choice" onclick="show('main')">戻る</button>
</section>

<section id="box" class="screen">
  <div class="panel header"><span>モンスターBOX</span><span id="boxCount"></span></div>
  <div id="boxText" class="panel simple box-list"></div>
  <nav class="bottom">
    <button onclick="show('main')">メイン</button><button onclick="show('record')">記録</button><button onclick="show('box')">BOX</button><button onclick="show('book')">図鑑</button><button onclick="show('setting')">設定</button>
  </nav>
</section>

<section id="record" class="screen">
  <div class="panel header"><span>記録</span><span>牧場日誌</span></div>
  <div id="recordText" class="panel simple"></div>
  <nav class="bottom">
    <button onclick="show('main')">メイン</button><button onclick="show('record')">記録</button><button onclick="show('box')">BOX</button><button onclick="show('book')">図鑑</button><button onclick="show('setting')">設定</button>
  </nav>
</section>

<section id="book" class="screen">
  <div class="panel header"><span>図鑑</span><span>発見種族</span></div>
  <div id="bookText" class="panel simple"></div>
  <nav class="bottom">
    <button onclick="show('main')">メイン</button><button onclick="show('record')">記録</button><button onclick="show('box')">BOX</button><button onclick="show('book')">図鑑</button><button onclick="show('setting')">設定</button>
  </nav>
</section>

<section id="setting" class="screen">
  <div class="panel header"><span>設定</span><span></span></div>
  <div class="panel simple">
    <button class="choice" onclick="newGame()">最初から</button><br><br>
    <div class="note">※Mock Ver.0.2ではセーブ機能は未実装です。BOXはゲーム起動中のみ保持されます。</div>
  </div>
  <nav class="bottom">
    <button onclick="show('main')">メイン</button><button onclick="show('record')">記録</button><button onclick="show('box')">BOX</button><button onclick="show('book')">図鑑</button><button onclick="show('setting')">設定</button>
  </nav>
</section>

</div>

<script>
const MAX=999;
const abilityNames=['HP','力','魔力','素早さ','賢さ','運'];
const logs=[];
const records=[];

let game=null;

const speciesData={
  モフ:{icon:'🐾',type:'バランス',base:{HP:[55,80],力:[25,45],魔力:[20,40],素早さ:[25,45],賢さ:[25,45],運:[25,45]}},
  ツノ:{icon:'🦌',type:'力型',base:{HP:[65,90],力:[45,70],魔力:[10,25],素早さ:[20,35],賢さ:[15,35],運:[15,35]}},
  ピヨ:{icon:'🐥',type:'素早さ型',base:{HP:[40,65],力:[15,35],魔力:[20,40],素早さ:[50,75],賢さ:[20,45],運:[30,55]}},
  スラ:{icon:'💧',type:'魔力型',base:{HP:[45,70],力:[10,30],魔力:[45,70],素早さ:[20,45],賢さ:[30,55],運:[20,45]}},
  モフノ:{icon:'🐏',type:'配合種',base:{HP:[70,95],力:[45,70],魔力:[25,50],素早さ:[25,50],賢さ:[25,50],運:[25,50]}},
  ホーンピヨ:{icon:'🐦',type:'配合種',base:{HP:[55,80],力:[35,60],魔力:[20,45],素早さ:[55,85],賢さ:[25,50],運:[30,60]}},
  スラモフ:{icon:'🫧',type:'配合種',base:{HP:[60,85],力:[20,45],魔力:[50,80],素早さ:[25,55],賢さ:[35,65],運:[30,60]}},
  ペカモフ:{icon:'⚡',type:'レア',base:{HP:[70,100],力:[45,80],魔力:[45,80],素早さ:[45,80],賢さ:[45,80],運:[60,100]}}
};

const trainCommands=[
  {key:'power',name:'力の訓練',ability:'力',hp:8,up:[4,8]},
  {key:'magic',name:'魔力の訓練',ability:'魔力',hp:8,up:[4,8]},
  {key:'speed',name:'走り込み',ability:'素早さ',hp:8,up:[4,8]},
  {key:'wise',name:'知恵遊び',ability:'賢さ',hp:6,up:[3,7]},
  {key:'luck',name:'おまじない',ability:'運',hp:5,up:[2,6]},
  {key:'hard',name:'総合特訓',ability:'random',hp:15,up:[5,10]}
];

const explorePlaces=[
  {key:'forest',name:'はじまりの森',need:0,reward:[20,60],risk:4},
  {key:'river',name:'きらめき川辺',need:120,reward:[50,120],risk:8},
  {key:'cave',name:'まよい洞窟',need:250,reward:[120,260],risk:14},
  {key:'ruin',name:'古代遺跡',need:450,reward:[300,700],risk:22}
];

const tournaments=[
  {key:'village',name:'村大会',need:0,prize:100,power:180},
  {key:'town',name:'町大会',need:200,prize:300,power:350},
  {key:'kingdom',name:'王国大会',need:450,prize:900,power:650},
  {key:'legend',name:'伝説杯',need:750,prize:3000,power:950}
];

function show(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  updateAll();
}

function randInt(min,max){return Math.floor(Math.random()*(max-min+1))+min}
function pick(arr){return arr[Math.floor(Math.random()*arr.length)]}

function newGame(){
  logs.length=0;
  records.length=0;
  const starter=createMonster('モフ',1);
  game={
    year:1,
    month:1,
    breeder:{name:'主人公',farm:'はじまり牧場',rank:'見習い',money:500,reputation:0,farmLv:1},
    current:starter,
    box:[createMonster('ツノ',1),createMonster('ピヨ',1)],
    book:['モフ','ツノ','ピヨ'],
    materials:{草:3,石:2,光:0},
    generation:1
  };
  addLog('はじまり牧場を開いた');
  addLog(`${starter.name}を育成開始した`);
  records.push(`<b>${dateText()}</b><hr>`);
  records.push(`・はじまり牧場を開いた<br>`);
  records.push(`・${starter.name}が仲間になった<br>`);
  updateAll();
  show('main');
}

function createMonster(species,gen,parentA=null,parentB=null){
  const data=speciesData[species];
  const abilities={};
  abilityNames.forEach(a=>{
    abilities[a]=randInt(data.base[a][0],data.base[a][1]);
    if(parentA && parentB){
      const pa=parentA.abilities[a]||0;
      const pb=parentB.abilities[a]||0;
      const inherit=Math.floor((pa+pb)/4);
      abilities[a]=Math.min(MAX,abilities[a]+inherit+randInt(-10,20));
    }
  });
  return {
    id:Date.now()+Math.random(),
    name:species+randInt(10,99),
    species,
    icon:data.icon,
    type:data.type,
    age:0,
    gen,
    sex:Math.random()<0.5?'♂':'♀',
    mood:'普通',
    hp:100,
    hpMax:100,
    wins:0,
    abilities
  };
}

function dateText(){return `${game.year}年目 ${game.month}月`}

function currentPower(mon=game.current){
  return Math.floor(
    mon.abilities.HP*0.8+
    mon.abilities.力+
    mon.abilities.魔力+
    mon.abilities.素早さ+
    mon.abilities.賢さ*0.8+
    mon.abilities.運*0.5+
    mon.hp
  );
}

function addAbility(mon,name,value){
  mon.abilities[name]=Math.max(1,Math.min(MAX,mon.abilities[name]+value));
}

function nextMonth(){
  game.month++;
  if(game.month>12){
    game.month=1;
    game.year++;
  }
  game.current.age++;
  if(game.current.age>48){
    game.current.mood='老体';
    addLog(`${game.current.name}は少し年を取った`);
  }
  addLog(`${dateText()}になった`);
  records.push(`・${dateText()}になった<br>`);
}

function finishTurn(text,result){
  addLog(text);
  addLog(result);
  records.push(`<br><b>${dateText()}</b><br>`);
  records.push(`・${text}<br>`);
  records.push(`・${result}<br>`);
  nextMonth();
  updateAll();
  show('main');
}

function openTrain(){
  document.getElementById('trainButtons').innerHTML=trainCommands.map(c=>
    `<button onclick="doTrain('${c.key}')">${c.name}<br>${c.ability==='random'?'ランダム':c.ability}上昇<br>体力-${c.hp}</button>`
  ).join('');
  show('train');
}

function doTrain(key){
  const c=trainCommands.find(x=>x.key===key);
  const m=game.current;
  if(m.hp<c.hp){
    addLog('体力が足りない');
    updateAll();
    show('main');
    return;
  }
  m.hp-=c.hp;
  let ab=c.ability==='random'?pick(abilityNames.filter(a=>a!=='HP')):c.ability;
  const up=randInt(c.up[0],c.up[1]);
  addAbility(m,ab,up);
  finishTurn(`${m.name}に${c.name}を行った`,`${ab}が${up}上昇した`);
}

function restMonster(){
  const m=game.current;
  const heal=randInt(20,35);
  m.hp=Math.min(m.hpMax,m.hp+heal);
  m.mood='元気';
  finishTurn(`${m.name}を休ませた`,`体力が${heal}回復した`);
}

function openExplore(){
  document.getElementById('exploreButtons').innerHTML=explorePlaces.map(p=>{
    const disabled=currentPower()<p.need?'disabled':'';
    const label=disabled?'？？？<br>必要戦力 ？？？':`${p.name}<br>報酬 ${p.reward[0]}〜${p.reward[1]}G`;
    return `<button ${disabled} onclick="doExplore('${p.key}')">${label}</button>`;
  }).join('');
  show('explore');
}

function doExplore(key){
  const p=explorePlaces.find(x=>x.key===key);
  const m=game.current;
  const reward=randInt(p.reward[0],p.reward[1]);
  game.breeder.money+=reward;
  m.hp=Math.max(0,m.hp-p.risk);
  const mat=pick(['草','石','光']);
  game.materials[mat]=(game.materials[mat]||0)+1;

  let result=`${reward}Gと素材「${mat}」を得た。体力が${p.risk}減少した`;

  if(Math.random()<0.18){
    const sp=pick(['スラ','モフ','ツノ','ピヨ']);
    const newMon=createMonster(sp,1);
    game.box.push(newMon);
    addBook(sp);
    result+=`。野生の${newMon.name}を発見しBOXへ送った`;
  }

  finishTurn(`${m.name}が${p.name}を探索した`,result);
}

function openTournament(){
  document.getElementById('tournamentButtons').innerHTML=tournaments.map(t=>{
    const disabled=currentPower()<t.need?'disabled':'';
    const label=disabled?'？？？<br>必要戦力 ？？？':`${t.name}<br>賞金 ${t.prize}G<br>目安戦力 ${t.power}`;
    return `<button ${disabled} onclick="doTournament('${t.key}')">${label}</button>`;
  }).join('');
  show('tournament');
}

function doTournament(key){
  const t=tournaments.find(x=>x.key===key);
  const m=game.current;
  const score=currentPower()+randInt(-80,80);
  let result='';
  if(score>=t.power){
    game.breeder.money+=t.prize;
    game.breeder.reputation+=Math.floor(t.prize/100);
    m.wins++;
    result=`優勝した。賞金${t.prize}Gを得た`;
    if(game.breeder.reputation>=20) game.breeder.rank='中堅';
    if(game.breeder.reputation>=60) game.breeder.rank='有名';
    if(game.breeder.reputation>=120) game.breeder.rank='名門';
    game.breeder.farmLv=1+Math.floor(game.breeder.reputation/30);
  }else{
    result=`敗退した。あと少し力が足りなかった`;
  }
  m.hp=Math.max(0,m.hp-12);
  finishTurn(`${m.name}が${t.name}に出場した`,result);
}

function openMonster(){
  const m=game.current;
  document.getElementById('monsterText').innerHTML=`
    <b>育成中</b><br>
    ${m.icon} ${m.name} / ${m.species} / ${m.sex}<br>
    世代：${m.gen}　年齢：${m.age}ヶ月　勝利：${m.wins}<br><br>
    <b>BOXから取り出す</b><br>
    BOXのモンスターを選ぶと、現在の育成中モンスターと入れ替えます。
  `;
  document.getElementById('monsterButtons').innerHTML=game.box.map((mon,i)=>
    `<button onclick="swapMonster(${i})">${mon.icon} ${mon.name}<br>${mon.species} / 世代${mon.gen}</button>`
  ).join('') || `<button disabled>BOXが空です</button>`;
  show('monster');
}

function swapMonster(index){
  const old=game.current;
  game.current=game.box[index];
  game.box.splice(index,1);
  game.box.push(old);
  addLog(`${game.current.name}を育成中にした`);
  updateAll();
  openMonster();
}

function openBreed(){
  document.getElementById('breedText').innerHTML=`
    <b>配合</b><br>
    育成中モンスターとBOXのモンスターを配合します。<br>
    親2体はBOXへ戻らず、新しい子が育成中になります。<br><br>
    親①：${game.current.icon} ${game.current.name}
  `;
  document.getElementById('breedButtons').innerHTML=game.box.map((mon,i)=>
    `<button onclick="breedWith(${i})">${mon.icon} ${mon.name}<br>${mon.species} / ${mon.sex}</button>`
  ).join('') || `<button disabled>相手がいません</button>`;
  show('breed');
}

function breedWith(index){
  const a=game.current;
  const b=game.box[index];
  const childSpecies=getBreedSpecies(a.species,b.species);
  const child=createMonster(childSpecies,Math.max(a.gen,b.gen)+1,a,b);

  game.box.splice(index,1);
  game.current=child;
  addBook(childSpecies);

  addLog(`${a.name}と${b.name}を配合した`);
  addLog(`${child.name}が誕生した`);
  records.push(`<br><b>${dateText()}</b><br>`);
  records.push(`・${a.name} × ${b.name}<br>`);
  records.push(`・${child.name}が誕生した<br>`);
  nextMonth();
  updateAll();
  show('main');
}

function getBreedSpecies(a,b){
  const pair=[a,b].sort().join('+');
  if(pair==='ツノ+モフ') return 'モフノ';
  if(pair==='ツノ+ピヨ') return 'ホーンピヨ';
  if(pair==='スラ+モフ') return 'スラモフ';
  if(Math.random()<0.05) return 'ペカモフ';
  return pick([a,b]);
}

function addBook(species){
  if(!game.book.includes(species)) game.book.push(species);
}

function updateAll(){
  if(!game) return;
  updateMain();
  updateLog();
  updateRecord();
  updateBox();
  updateBook();
}

function updateMain(){
  const m=game.current;
  document.getElementById('dateLabel').textContent=dateText();
  document.getElementById('monsterIcon').innerHTML=`${m.icon}<br><span style="font-size:12px">${m.species}</span>`;

  document.getElementById('breederLeft').innerHTML=`
    <div class="block-title">牧場主</div>
    名前：${game.breeder.name}<br>
    牧場：${game.breeder.farm}<br>
    ランク：${game.breeder.rank}
  `;

  document.getElementById('breederRight').innerHTML=`
    <div class="block-title">牧場情報</div>
    所持金：${game.breeder.money}G<br>
    評判：${game.breeder.reputation}<br>
    牧場Lv：${game.breeder.farmLv}<br>
    BOX：${game.box.length}体
  `;

  document.getElementById('monsterInfo').innerHTML=`
    名前：${m.name}　種族：${m.species}<br>
    性別：${m.sex}　世代：${m.gen}　年齢：${m.age}ヶ月<br>
    状態：${m.mood}　体力：${m.hp}/${m.hpMax}　勝利：${m.wins}
  `;

  document.getElementById('abilityGrid').innerHTML=`
    <div>HP　${m.abilities.HP}</div><div>力　${m.abilities.力}</div><div>魔力　${m.abilities.魔力}</div>
    <div>素早さ　${m.abilities.素早さ}</div><div>賢さ　${m.abilities.賢さ}</div><div>運　${m.abilities.運}</div>
  `;
}

function updateLog(){
  document.getElementById('log').innerHTML=logs.map(t=>'・'+t).join('<br>');
}

function addLog(text){
  logs.push(text);
  while(logs.length>5) logs.shift();
}

function updateRecord(){
  document.getElementById('recordText').innerHTML=records.join('');
}

function updateBox(){
  document.getElementById('boxCount').textContent=`${game.box.length}体`;
  document.getElementById('boxText').innerHTML=game.box.map((m,i)=>
    `${i+1}. ${m.icon} ${m.name} / ${m.species} / 世代${m.gen}<br>
    HP:${m.abilities.HP} 力:${m.abilities.力} 魔:${m.abilities.魔力} 速:${m.abilities.素早さ} 賢:${m.abilities.賢さ} 運:${m.abilities.運}<br>`
  ).join('<hr>') || 'BOXは空です';
}

function updateBook(){
  document.getElementById('bookText').innerHTML=game.book.map((s,i)=>{
    const d=speciesData[s];
    return `No.${String(i+1).padStart(3,'0')} ${d.icon} ${s}　${d.type}<br>`;
  }).join('');
}
</script>
</body>
</html>
