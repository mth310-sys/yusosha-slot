<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>黒髪ショートDK ～転生～ Ver.0.1β</title>

<style>
*{
  box-sizing:border-box;
}

:root{
  --gold:#d7aa43;
  --gold-dark:#76501a;
  --panel:rgba(17,20,18,.92);
  --panel2:rgba(36,42,36,.94);
  --green:#32934d;
  --blue:#2679c8;
  --red:#aa3838;
}

html,body{
  min-height:100%;
}

body{
  margin:0;
  background:
    radial-gradient(circle at top,#354937 0,#19211a 44%,#090c09 100%);
  color:#fff;
  font-family:
    -apple-system,
    BlinkMacSystemFont,
    "Hiragino Sans",
    "Yu Gothic",
    sans-serif;
  text-align:center;
}

button{
  font:inherit;
  touch-action:manipulation;
}

button:disabled{
  cursor:not-allowed;
}

.wrap{
  width:min(100%,430px);
  min-height:100vh;
  margin:auto;
  padding:
    12px
    12px
    calc(20px + env(safe-area-inset-bottom));
}

.hidden{
  display:none!important;
}

/* =========================
   タイトル画面
========================= */

.titleScreen{
  position:fixed;
  inset:0;
  overflow:auto;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:
    24px
    18px
    calc(28px + env(safe-area-inset-bottom));
  background:
    linear-gradient(rgba(0,0,0,.15),rgba(0,0,0,.72)),
    radial-gradient(circle at 50% 20%,#6d916b,#203321 48%,#090d09);
  z-index:100;
}

.titleContent{
  width:min(100%,390px);
}

.titleMark{
  font-size:58px;
  filter:drop-shadow(0 4px 5px #000);
}

.gameTitle{
  margin:8px 0 0;
  font-size:31px;
  font-weight:1000;
  line-height:1.2;
  letter-spacing:.04em;
  color:#fff;
  text-shadow:
    3px 3px 0 #000,
    0 0 12px rgba(255,255,255,.25);
}

.gameSubtitle{
  margin:8px 0 28px;
  font-size:22px;
  font-weight:900;
  color:#f4d582;
  text-shadow:2px 2px 0 #000;
}

.version{
  margin-bottom:25px;
  color:#ddd;
  font-size:14px;
}

.titleButton{
  width:82%;
  min-height:57px;
  margin:10px auto 0;
  display:block;
  border:3px solid var(--gold);
  border-radius:14px;
  color:#fff;
  font-size:23px;
  font-weight:1000;
  text-shadow:2px 2px 0 #000;
  box-shadow:
    0 5px 0 #241400,
    inset 0 0 13px rgba(255,255,255,.25);
}

.titleButton.start{
  background:linear-gradient(#228df2,#06458f);
}

.titleButton.continue{
  background:linear-gradient(#3bad55,#125f25);
}

.titleButton:disabled{
  background:linear-gradient(#555,#282828);
  border-color:#666;
  color:#999;
  box-shadow:0 5px 0 #111;
}

/* =========================
   オープニング
========================= */

.storyScreen{
  position:fixed;
  inset:0;
  z-index:90;
  display:flex;
  align-items:flex-end;
  justify-content:center;
  padding:
    20px
    16px
    calc(30px + env(safe-area-inset-bottom));
  background:
    linear-gradient(rgba(0,0,0,.2),rgba(0,0,0,.88)),
    radial-gradient(circle at 50% 15%,#515d67,#15191d 55%,#030303);
}

.storyScreen.forest{
  background:
    linear-gradient(rgba(0,0,0,.12),rgba(0,0,0,.82)),
    radial-gradient(circle at 50% 12%,#a5d58a,#365539 48%,#0b160d);
}

.storyBox{
  width:min(100%,390px);
  min-height:205px;
  padding:20px;
  border:2px solid var(--gold);
  border-radius:18px;
  background:rgba(6,7,7,.9);
  box-shadow:0 0 24px #000;
  text-align:left;
}

.storySpeaker{
  min-height:24px;
  color:#f3cf72;
  font-size:16px;
  font-weight:900;
}

.storyText{
  min-height:95px;
  margin-top:10px;
  white-space:pre-line;
  font-size:17px;
  line-height:1.75;
}

.storyNext{
  width:100%;
  min-height:48px;
  border:0;
  border-radius:12px;
  background:linear-gradient(#e3b94c,#93600f);
  color:#fff;
  font-size:18px;
  font-weight:1000;
  text-shadow:1px 1px 0 #000;
}

/* =========================
   メイン画面
========================= */

.header{
  margin-bottom:10px;
  padding:12px;
  border:2px solid var(--gold-dark);
  border-radius:16px;
  background:linear-gradient(145deg,#242b24,#111511);
  box-shadow:0 5px 15px rgba(0,0,0,.5);
}

.headerTitle{
  font-size:18px;
  font-weight:1000;
  color:#f1d380;
}

.worldInfo{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:6px;
  margin-top:10px;
}

.infoBox{
  padding:8px 2px;
  border-radius:10px;
  background:#0b0e0b;
  border:1px solid #3f4a3f;
}

.infoLabel{
  font-size:10px;
  color:#aaa;
}

.infoValue{
  margin-top:3px;
  font-size:14px;
  font-weight:900;
  white-space:nowrap;
}

.statusPanel{
  display:grid;
  grid-template-columns:1.25fr 1fr 1fr;
  gap:7px;
  margin-bottom:10px;
}

.statusBox{
  padding:9px 5px;
  border-radius:12px;
  background:var(--panel2);
  border:1px solid #505a50;
  font-size:12px;
}

.statusName{
  font-size:15px;
  font-weight:1000;
}

.statusNumber{
  margin-top:4px;
  font-weight:900;
}

.bar{
  height:7px;
  margin-top:5px;
  overflow:hidden;
  border-radius:8px;
  background:#111;
}

.barFill{
  height:100%;
  transition:width .25s;
}

.hpFill{
  background:linear-gradient(#ff6969,#a91818);
}

.hungerFill{
  background:linear-gradient(#ffcf51,#c87805);
}

.energyFill{
  background:linear-gradient(#66d4ff,#176ab0);
}

/* =========================
   現在地
========================= */

.locationPanel{
  position:relative;
  min-height:180px;
  margin-bottom:10px;
  overflow:hidden;
  border:2px solid #6f542a;
  border-radius:16px;
  background:
    linear-gradient(rgba(0,0,0,.1),rgba(0,0,0,.68)),
    radial-gradient(circle at 50% 30%,#6c9d5c,#2c4a2d 55%,#0e170f);
  box-shadow:inset 0 0 25px rgba(0,0,0,.55);
}

.locationPanel.grass{
  background:
    linear-gradient(rgba(0,0,0,.08),rgba(0,0,0,.62)),
    radial-gradient(circle at 50% 25%,#d3d66b,#68963d 52%,#263816);
}

.weatherOverlay{
  position:absolute;
  inset:0;
  pointer-events:none;
}

.weatherOverlay.rain{
  background:
    repeating-linear-gradient(
      105deg,
      transparent 0 15px,
      rgba(185,220,255,.2) 16px 18px
    );
  animation:rainMove .55s linear infinite;
}

.weatherOverlay.fog{
  background:rgba(220,230,225,.22);
  backdrop-filter:blur(2px);
}

.weatherOverlay.storm{
  background:rgba(40,45,70,.25);
  animation:stormFlash 3s infinite;
}

.weatherOverlay.snow{
  background:
    radial-gradient(circle at 20% 10%,#fff 0 2px,transparent 3px),
    radial-gradient(circle at 70% 25%,#fff 0 2px,transparent 3px),
    radial-gradient(circle at 45% 65%,#fff 0 2px,transparent 3px),
    radial-gradient(circle at 85% 80%,#fff 0 2px,transparent 3px);
  background-size:80px 80px;
  animation:snowMove 5s linear infinite;
}

@keyframes rainMove{
  to{background-position:0 30px}
}

@keyframes snowMove{
  to{background-position:20px 80px}
}

@keyframes stormFlash{
  0%,87%,92%,100%{background-color:rgba(40,45,70,.25)}
  89%{background-color:rgba(255,255,255,.5)}
}

.locationContent{
  position:relative;
  z-index:2;
  min-height:180px;
  padding:25px 18px;
  display:flex;
  flex-direction:column;
  justify-content:center;
}

.locationIcon{
  font-size:58px;
  filter:drop-shadow(0 5px 5px #000);
}

.locationName{
  margin-top:5px;
  font-size:25px;
  font-weight:1000;
  text-shadow:2px 2px 0 #000;
}

.locationDescription{
  margin-top:7px;
  font-size:13px;
  line-height:1.55;
  color:#e4e4e4;
  text-shadow:1px 1px 0 #000;
}

/* =========================
   行動メニュー
========================= */

.menuPanel{
  padding:11px;
  border:1px solid #444;
  border-radius:16px;
  background:var(--panel);
}

.menuTitle{
  margin-bottom:8px;
  font-size:15px;
  font-weight:1000;
  color:#e9d184;
}

.actionGrid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:8px;
}

.actionButton{
  min-height:54px;
  padding:8px 4px;
  border:2px solid #84662e;
  border-radius:12px;
  color:#fff;
  font-size:17px;
  font-weight:1000;
  text-shadow:1px 1px 0 #000;
  box-shadow:
    0 3px 0 #1b1003,
    inset 0 0 8px rgba(255,255,255,.16);
}

.actionButton.explore{
  background:linear-gradient(#3c9d58,#17612e);
}

.actionButton.craft{
  background:linear-gradient(#b98235,#68400d);
}

.actionButton.move{
  background:linear-gradient(#388bc0,#145070);
}

.actionButton.life{
  background:linear-gradient(#78a631,#3e6413);
}

.actionButton.inventory{
  background:linear-gradient(#8d6abd,#4c3472);
}

.actionButton.locked{
  background:linear-gradient(#4d4d4d,#242424);
  border-color:#555;
  color:#999;
}

.restButton{
  width:100%;
  min-height:49px;
  margin-top:9px;
  border:2px solid #516480;
  border-radius:12px;
  background:linear-gradient(#506e9c,#243954);
  color:#fff;
  font-size:18px;
  font-weight:1000;
  text-shadow:1px 1px 0 #000;
}

.messageBox{
  min-height:92px;
  margin-top:10px;
  padding:11px;
  overflow:auto;
  border-radius:12px;
  background:#070907;
  border:1px solid #384038;
  white-space:pre-line;
  text-align:left;
  font-size:13px;
  line-height:1.55;
}

.systemRow{
  display:flex;
  gap:7px;
  margin-top:9px;
}

.systemButton{
  flex:1;
  min-height:39px;
  border:1px solid #555;
  border-radius:9px;
  background:#292929;
  color:#eee;
  font-size:13px;
  font-weight:800;
}

/* =========================
   モーダル共通
========================= */

.modal{
  position:fixed;
  inset:0;
  z-index:80;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:
    18px
    14px
    calc(18px + env(safe-area-inset-bottom));
  background:rgba(0,0,0,.82);
}

.modalCard{
  width:min(100%,400px);
  max-height:88vh;
  overflow:auto;
  padding:16px;
  border:2px solid var(--gold);
  border-radius:17px;
  background:#171a17;
  box-shadow:0 0 25px #000;
}

.modalTitle{
  margin-bottom:12px;
  font-size:21px;
  font-weight:1000;
  color:#f0d17c;
}

.closeButton{
  width:100%;
  min-height:44px;
  margin-top:12px;
  border:0;
  border-radius:10px;
  background:#444;
  color:#fff;
  font-weight:900;
}

/* =========================
   マップ
========================= */

.mapGrid{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:5px;
}

.mapCell{
  aspect-ratio:1/1;
  padding:2px;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  border:2px solid #6f5d36;
  border-radius:9px;
  background:#304c2f;
  color:#fff;
  font-weight:900;
  text-shadow:1px 1px 0 #000;
}

.mapCell.grassCell{
  background:#738e35;
}

.mapCell.lockCell{
  background:#202020;
  border-color:#444;
  color:#777;
}

.mapCell.current{
  outline:3px solid #ffe264;
  box-shadow:0 0 14px #ffe264;
}

.mapCell.moveable{
  cursor:pointer;
}

.mapCell.moveable:active{
  transform:scale(.96);
}

.mapIcon{
  font-size:24px;
}

.mapName{
  margin-top:2px;
  font-size:11px;
}

.mapLock{
  margin-top:2px;
  font-size:11px;
  color:#aaa;
}

.mapHelp{
  margin-top:10px;
  font-size:12px;
  color:#ccc;
  line-height:1.5;
}

/* =========================
   持ち物
========================= */

.inventoryList{
  display:grid;
  gap:7px;
}

.inventoryItem{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:10px;
  border-radius:10px;
  background:#252b25;
  border:1px solid #465046;
  text-align:left;
}

.inventoryName{
  font-weight:900;
}

.inventoryCount{
  min-width:42px;
  text-align:right;
  color:#f0d17c;
  font-weight:1000;
}

/* =========================
   クラフト・生活
========================= */

.subActionList{
  display:grid;
  gap:8px;
}

.subActionButton{
  width:100%;
  min-height:53px;
  padding:9px;
  border:2px solid #6e5a31;
  border-radius:11px;
  background:linear-gradient(#4d554d,#242a24);
  color:#fff;
  text-align:left;
}

.subActionButton:disabled{
  opacity:.45;
}

.subActionName{
  font-size:16px;
  font-weight:1000;
}

.subActionNeed{
  margin-top:4px;
  font-size:11px;
  color:#d2d2d2;
}

/* =========================
   通知
========================= */

.toast{
  position:fixed;
  left:50%;
  bottom:calc(18px + env(safe-area-inset-bottom));
  z-index:120;
  width:min(88%,360px);
  padding:11px;
  transform:translateX(-50%);
  border:1px solid #d8ad4a;
  border-radius:12px;
  background:rgba(0,0,0,.92);
  color:#fff;
  font-weight:900;
  opacity:0;
  pointer-events:none;
  transition:.2s;
}

.toast.show{
  opacity:1;
}
</style>
</head>

<body>

<div class="wrap">
  <main id="gameRoot"></main>
</div>

<div id="toast" class="toast"></div>

<script>
"use strict";

/* =========================
   基本データ
========================= */

const SAVE_KEY = "kurokamiTensei_v001beta";

const TIME_NAMES = ["朝","昼","夜"];

const WEATHER_DATA = {
  clear:{
    name:"晴れ",
    icon:"☀️",
    overlay:""
  },
  cloudy:{
    name:"曇り",
    icon:"☁️",
    overlay:""
  },
  rain:{
    name:"雨",
    icon:"🌧️",
    overlay:"rain"
  },
  storm:{
    name:"雷雨",
    icon:"⛈️",
    overlay:"storm"
  },
  fog:{
    name:"霧",
    icon:"🌫️",
    overlay:"fog"
  },
  snow:{
    name:"雪",
    icon:"❄️",
    overlay:"snow"
  }
};

const MAP = [
  [
    {name:"古城",type:"locked",icon:"🏰",locked:true},
    {name:"山岳",type:"locked",icon:"⛰️",locked:true},
    {name:"洞窟",type:"locked",icon:"🕳️",locked:true},
    {name:"神殿",type:"locked",icon:"⛩️",locked:true}
  ],
  [
    {name:"森",type:"locked",icon:"🌲",locked:true},
    {name:"北西の森",type:"forest",icon:"🌲"},
    {name:"北の森",type:"forest",icon:"🌲"},
    {name:"北東の草原",type:"grass",icon:"🌾"}
  ],
  [
    {name:"村",type:"locked",icon:"🏘️",locked:true},
    {name:"西の森",type:"forest",icon:"🌲"},
    {name:"中央草原",type:"grass",icon:"🌾"},
    {name:"東の草原",type:"grass",icon:"🌾"}
  ],
  [
    {name:"港",type:"locked",icon:"⚓",locked:true},
    {name:"南西の森",type:"forest",icon:"🌲"},
    {name:"南の草原",type:"grass",icon:"🌾"},
    {name:"転生の森",type:"forest",icon:"🌲",start:true}
  ]
];

const STORY = [
  {
    speaker:"クロカミ",
    text:"いつもと変わらない学校帰りだった。\n\n信号の向こうから、子どもの叫び声が聞こえた。"
  },
  {
    speaker:"クロカミ",
    text:"「危ない！」\n\n考えるより先に、身体が動いていた。"
  },
  {
    speaker:"",
    text:"子どもを押し出した直後、激しい衝撃がクロカミを襲った。\n\n音も、光も、すべてが遠ざかっていく。"
  },
  {
    speaker:"謎の声",
    text:"『あなたの命は、ここで尽きました。』"
  },
  {
    speaker:"謎の声",
    text:"『ですが、あなたが示した勇気は、新たな世界で必要とされています。』"
  },
  {
    speaker:"",
    text:"まばゆい光が、クロカミの意識を包み込んだ。"
  },
  {
    speaker:"クロカミ",
    text:"「……ここは？」\n\n目を覚ますと、見知らぬ森の中にいた。"
  },
  {
    speaker:"謎の声",
    text:"『転生が完了しました。』\n\n『この世界で、あなた自身の生き方を見つけてください。』"
  },
  {
    speaker:"クロカミ",
    text:"「元の世界には……戻れないのか。」\n\n答える声は、もう聞こえなかった。"
  },
  {
    speaker:"",
    text:"Day 1　春　朝\n\nクロカミの異世界での100日が始まる。"
  }
];

const CRAFTS = [
  {
    id:"stoneAxe",
    name:"石斧",
    description:"木材の採取に使える簡単な斧。",
    need:{wood:2,stone:2}
  },
  {
    id:"campfire",
    name:"焚き火",
    description:"休憩時の回復量を増やす。",
    need:{wood:3,stone:2}
  },
  {
    id:"bed",
    name:"簡易寝床",
    description:"夜の休憩効果を高める。",
    need:{wood:4,grass:4}
  }
];

/* =========================
   ゲーム状態
========================= */

let game = null;
let storyIndex = 0;
let currentModal = null;

function createNewGame(){
  return {
    version:"0.1β",
    day:1,
    turn:0,
    weather:"clear",

    position:{
      row:3,
      col:3
    },

    player:{
      name:"クロカミ",
      level:1,
      hp:100,
      maxHp:100,
      hunger:100,
      energy:100
    },

    inventory:{
      wood:0,
      stone:0,
      grass:0,
      herb:0,
      berry:0,
      mushroom:0,
      water:1,
      fish:0
    },

    crafted:{
      stoneAxe:false,
      campfire:false,
      bed:false
    },

    stats:{
      explored:0,
      moved:0,
      rested:0,
      crafted:0
    },

    log:"見知らぬ森で目を覚ました。\nまずは周囲の状況を確認しよう。"
  };
}

/* =========================
   保存・読み込み
========================= */

function hasSave(){
  return localStorage.getItem(SAVE_KEY) !== null;
}

function saveGame(showMessage=true){
  if(!game)return;

  try{
    localStorage.setItem(SAVE_KEY,JSON.stringify(game));

    if(showMessage){
      showToast("セーブしました");
    }
  }catch(error){
    console.error(error);
    showToast("セーブに失敗しました");
  }
}

function loadGame(){
  try{
    const raw = localStorage.getItem(SAVE_KEY);

    if(!raw){
      showToast("セーブデータがありません");
      return false;
    }

    game = JSON.parse(raw);
    return true;
  }catch(error){
    console.error(error);
    showToast("セーブデータを読み込めませんでした");
    return false;
  }
}

/* =========================
   表示補助
========================= */

function getSeason(day){
  if(day <= 25)return {name:"春",icon:"🌸"};
  if(day <= 50)return {name:"夏",icon:"☀️"};
  if(day <= 75)return {name:"秋",icon:"🍁"};
  return {name:"冬",icon:"❄️"};
}

function chooseWeather(){
  const season = getSeason(game.day).name;
  const r = Math.random();

  if(season === "冬"){
    if(r < .27)return "clear";
    if(r < .47)return "cloudy";
    if(r < .62)return "snow";
    if(r < .75)return "fog";
    if(r < .9)return "rain";
    return "storm";
  }

  if(r < .36)return "clear";
  if(r < .57)return "cloudy";
  if(r < .76)return "rain";
  if(r < .87)return "fog";
  return "storm";
}

function getCurrentMap(){
  return MAP[game.position.row][game.position.col];
}

function getLocationDescription(cell){
  if(cell.type === "forest"){
    return "木材や薬草を集められる森。モンスターに遭遇することもある。";
  }

  if(cell.type === "grass"){
    return "見通しのよい草原。食料や草素材を見つけやすい。";
  }

  return "この場所にはまだ入れない。";
}

function itemLabel(key){
  const labels = {
    wood:"木材",
    stone:"石",
    grass:"丈夫な草",
    herb:"薬草",
    berry:"木の実",
    mushroom:"キノコ",
    water:"飲み水",
    fish:"魚"
  };

  return labels[key] || key;
}

function weatherOverlayClass(){
  return WEATHER_DATA[game.weather].overlay;
}

function clamp(value,min,max){
  return Math.max(min,Math.min(max,value));
}

function showToast(text){
  const toast = document.getElementById("toast");

  toast.textContent = text;
  toast.classList.add("show");

  clearTimeout(showToast.timer);

  showToast.timer = setTimeout(()=>{
    toast.classList.remove("show");
  },1500);
}

/* =========================
   ターン進行
========================= */

function consumeTurn(actionText){
  game.player.hunger = clamp(game.player.hunger - 5,0,100);
  game.player.energy = clamp(game.player.energy - 6,0,100);

  if(game.player.hunger <= 0){
    game.player.hp = clamp(game.player.hp - 8,0,game.player.maxHp);
    actionText += "\n\n空腹でHPが8減った。";
  }

  if(game.player.energy <= 0){
    game.player.hp = clamp(game.player.hp - 5,0,game.player.maxHp);
    actionText += "\n\n疲労でHPが5減った。";
  }

  game.turn++;

  if(game.turn >= 3){
    game.turn = 0;
    game.day++;

    if(game.day > 100){
      game.day = 100;
      game.log = actionText;
      saveGame(false);
      renderBetaEnding();
      return;
    }

    game.weather = chooseWeather();

    actionText +=
      `\n\nDay ${game.day}の朝になった。` +
      `\n今日の天候：${WEATHER_DATA[game.weather].name}`;
  }

  game.log = actionText;

  saveGame(false);
  renderGame();
}

/* =========================
   探索
========================= */

function exploreAction(){
  const place = getCurrentMap();

  if(place.type === "forest"){
    exploreForest();
    return;
  }

  if(place.type === "grass"){
    exploreGrass();
    return;
  }
}

function exploreForest(){
  game.stats.explored++;

  const r = Math.random();
  let text = "森を探索した。";

  if(r < .22){
    const amount = randomInt(1,3) + (game.crafted.stoneAxe ? 1 : 0);
    game.inventory.wood += amount;

    text += `\n木材を${amount}個入手した。`;

    if(game.crafted.stoneAxe){
      text += "\n石斧のおかげで多く集められた。";
    }
  }else if(r < .39){
    const amount = randomInt(1,3);
    game.inventory.stone += amount;
    text += `\n石を${amount}個入手した。`;
  }else if(r < .53){
    const amount = randomInt(1,3);
    game.inventory.grass += amount;
    text += `\n丈夫な草を${amount}個入手した。`;
  }else if(r < .64){
    game.inventory.herb++;
    text += "\n薬草を1個入手した。";
  }else if(r < .76){
    const amount = randomInt(1,2);
    game.inventory.berry += amount;
    text += `\n木の実を${amount}個入手した。`;
  }else if(r < .85){
    game.inventory.mushroom++;
    text += "\nキノコを1個入手した。";
  }else if(r < .93){
    const damage = randomInt(5,14);
    game.player.hp = clamp(
      game.player.hp-damage,
      0,
      game.player.maxHp
    );

    text +=
      `\n野生の魔物に襲われた！` +
      `\nなんとか逃げ切ったが、HPが${damage}減った。`;
  }else{
    game.inventory.water++;
    text += "\n小さな湧き水を発見した。\n飲み水を1個入手した。";
  }

  applyWeatherExploreBonus(text=>{
    consumeTurn(text);
  },text);
}

function exploreGrass(){
  game.stats.explored++;

  const r = Math.random();
  let text = "草原を探索した。";

  if(r < .28){
    const amount = randomInt(1,4);
    game.inventory.grass += amount;
    text += `\n丈夫な草を${amount}個入手した。`;
  }else if(r < .48){
    const amount = randomInt(1,3);
    game.inventory.berry += amount;
    text += `\n木の実を${amount}個入手した。`;
  }else if(r < .63){
    const amount = randomInt(1,2);
    game.inventory.stone += amount;
    text += `\n石を${amount}個入手した。`;
  }else if(r < .76){
    game.inventory.herb++;
    text += "\n薬草を1個入手した。";
  }else if(r < .88){
    text += "\n遠くで動物の姿を見つけたが、逃げられてしまった。";
  }else{
    const damage = randomInt(4,11);
    game.player.hp = clamp(
      game.player.hp-damage,
      0,
      game.player.maxHp
    );

    text +=
      `\n草むらから魔物が飛び出した！` +
      `\n逃走中にHPが${damage}減った。`;
  }

  applyWeatherExploreBonus(text=>{
    consumeTurn(text);
  },text);
}

function applyWeatherExploreBonus(callback,text){
  if(game.weather === "rain" && Math.random() < .35){
    game.inventory.mushroom++;
    text += "\n雨のおかげでキノコも1個見つけた。";
  }

  if(game.weather === "storm" && Math.random() < .3){
    const damage = randomInt(3,8);
    game.player.hp = clamp(
      game.player.hp-damage,
      0,
      game.player.maxHp
    );

    text += `\n雷雨で体力を消耗し、HPが${damage}減った。`;
  }

  if(game.weather === "snow"){
    game.player.energy = clamp(game.player.energy-5,0,100);
    text += "\n雪の寒さで体力を余計に消耗した。";
  }

  callback(text);
}

function randomInt(min,max){
  return Math.floor(Math.random()*(max-min+1))+min;
}

/* =========================
   移動
========================= */

function openMap(){
  const cells = MAP.map((row,rowIndex)=>{
    return row.map((cell,colIndex)=>{
      const current =
        rowIndex === game.position.row &&
        colIndex === game.position.col;

      const moveable = canMoveTo(rowIndex,colIndex);
      const classes = [
        "mapCell",
        cell.type === "grass" ? "grassCell" : "",
        cell.locked ? "lockCell" : "",
        current ? "current" : "",
        moveable ? "moveable" : ""
      ].join(" ");

      return `
        <button
          class="${classes}"
          ${moveable ? `onclick="moveTo(${rowIndex},${colIndex})"` : "disabled"}
        >
          <span class="mapIcon">${cell.icon}</span>
          <span class="mapName">${cell.name}</span>
          ${cell.locked ? `<span class="mapLock">🔒</span>` : ""}
          ${current ? `<span class="mapLock">現在地</span>` : ""}
        </button>
      `;
    }).join("");
  }).join("");

  openModal(`
    <div class="modalTitle">
      🧭 世界マップ
    </div>

    <div class="mapGrid">
      ${cells}
    </div>

    <div class="mapHelp">
      現在地と上下左右で隣接している、解放済みの場所へ移動できます。<br>
      移動すると1ターン経過します。
    </div>

    <button
      class="closeButton"
      onclick="closeModal()"
    >
      戻る
    </button>
  `);
}

function canMoveTo(row,col){
  const target = MAP[row]?.[col];

  if(!target || target.locked)return false;

  const distance =
    Math.abs(row-game.position.row) +
    Math.abs(col-game.position.col);

  return distance === 1;
}

function moveTo(row,col){
  if(!canMoveTo(row,col))return;

  game.position.row = row;
  game.position.col = col;
  game.stats.moved++;

  const place = getCurrentMap();

  closeModal(false);

  consumeTurn(
    `${place.name}へ移動した。` +
    `\n周囲の様子を確認した。`
  );
}

/* =========================
   クラフト
========================= */

function openCraft(){
  const list = CRAFTS.map(craft=>{
    const already = game.crafted[craft.id];
    const possible = canCraft(craft);

    return `
      <button
        class="subActionButton"
        onclick="craftItem('${craft.id}')"
        ${already || !possible ? "disabled" : ""}
      >
        <div class="subActionName">
          ${already ? "✅" : "🔨"} ${craft.name}
        </div>

        <div class="subActionNeed">
          ${craft.description}<br>
          必要：${needText(craft.need)}
          ${already ? "　【作成済み】" : ""}
        </div>
      </button>
    `;
  }).join("");

  openModal(`
    <div class="modalTitle">
      🔨 クラフト
    </div>

    <div class="subActionList">
      ${list}
    </div>

    <div class="mapHelp">
      クラフトに成功すると1ターン経過します。
    </div>

    <button
      class="closeButton"
      onclick="closeModal()"
    >
      戻る
    </button>
  `);
}

function canCraft(craft){
  return Object.entries(craft.need)
    .every(([key,value])=>game.inventory[key] >= value);
}

function needText(need){
  return Object.entries(need)
    .map(([key,value])=>`${itemLabel(key)}×${value}`)
    .join("、");
}

function craftItem(id){
  const craft = CRAFTS.find(item=>item.id === id);

  if(!craft || game.crafted[id] || !canCraft(craft)){
    return;
  }

  Object.entries(craft.need).forEach(([key,value])=>{
    game.inventory[key] -= value;
  });

  game.crafted[id] = true;
  game.stats.crafted++;

  closeModal(false);

  consumeTurn(
    `${craft.name}を作成した。` +
    `\n${craft.description}`
  );
}

function drinkWater(){
  if(game.inventory.water <= 0)return;

  game.inventory.water--;

  game.player.hp = clamp(
    game.player.hp+8,
    0,
    game.player.maxHp
  );

  game.player.energy = clamp(
    game.player.energy+12,
    0,
    100
  );

  closeModal(false);

  consumeTurn(
    "水を飲んだ。" +
    "\nHPが8、体力が12回復した。"
  );
}

function eatFood(){
  let foodName = "";

  if(game.inventory.berry > 0){
    game.inventory.berry--;
    foodName = "木の実";
  }else if(game.inventory.mushroom > 0){
    game.inventory.mushroom--;
    foodName = "キノコ";
  }else{
    return;
  }

  game.player.hunger = clamp(
    game.player.hunger+28,
    0,
    100
  );

  closeModal(false);

  consumeTurn(
    `${foodName}を食べた。` +
    "\n空腹が28回復した。"
  );
}

/* =========================
   休憩
========================= */

function restAction(){
  let hpRecovery = 8;
  let energyRecovery = 25;

  if(game.crafted.campfire){
    hpRecovery += 5;
    energyRecovery += 8;
  }

  if(game.crafted.bed && game.turn === 2){
    hpRecovery += 10;
    energyRecovery += 20;
  }

  game.player.hp = clamp(
    game.player.hp+hpRecovery,
    0,
    game.player.maxHp
  );

  game.player.energy = clamp(
    game.player.energy+energyRecovery,
    0,
    100
  );

  game.stats.rested++;

  consumeTurn(
    "その場で身体を休めた。" +
    `\nHPが${hpRecovery}、体力が${energyRecovery}回復した。`
  );
}

function openModal(content){
  closeModal(false);

  currentModal = document.createElement("div");
  currentModal.className = "modal";

  currentModal.innerHTML = `
    <div class="modalCard">
      ${content}
    </div>
  `;

  document.body.appendChild(currentModal);
}

function closeModal(remove=true){
  if(!currentModal)return;

  if(remove){
    currentModal.remove();
  }else{
    currentModal.remove();
  }

  currentModal = null;
}

function renderBetaEnding(){
  const developed =
    game.crafted.stoneAxe &&
    game.crafted.campfire &&
    game.crafted.bed;

  gameRoot.innerHTML = `
    <section class="storyScreen forest">
      <div class="storyBox">
        <div class="storySpeaker">
          Day 100
        </div>

        <div class="storyText">
${developed
? `100日前、クロカミは何も持たずにこの森へ転生した。
