<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>終焉神アポカリス筐体 Ver.C4</title>
<style>
*{box-sizing:border-box}

body{
  margin:0;
  background:radial-gradient(circle,#24003d,#020005 75%);
  color:white;
  font-family:sans-serif;
  text-align:center;
}

.wrap{
  max-width:430px;
  margin:auto;
  padding:6px;
}

.machine{
  position:relative;
  overflow:hidden;
  border:10px solid #050505;
  border-radius:34px;
  padding:8px 12px 10px;
  background:
    linear-gradient(90deg,rgba(255,255,255,.45),transparent 8%,transparent 92%,rgba(255,255,255,.45)),
    linear-gradient(135deg,#cfcfe0,#08080c 10%,#180020 42%,#050008 70%,#8b4dff);
  box-shadow:
    0 0 36px #9b4dff,
    inset 0 0 48px #000,
    inset 0 0 0 3px #7d39ff,
    inset 0 0 0 7px rgba(255,255,255,.12);
}

.part{
  display:block;
  width:100%;
  image-rendering:pixelated;
}

.topLed{
  margin-bottom:4px;
  filter:drop-shadow(0 0 10px #b45cff);
}

.mainLcd{
  margin-bottom:4px;
  border-radius:8px;
  filter:drop-shadow(0 0 10px #8b4dff);
}

.reelArea{
  margin-bottom:3px;
  filter:drop-shadow(0 0 8px #8b4dff);
}

.controlArea{
  margin-bottom:4px;
  filter:drop-shadow(0 0 8px #8b4dff);
}

.lowerPanel{
  margin-bottom:3px;
  filter:drop-shadow(0 0 9px #8b4dff);
}

.speaker{
  filter:drop-shadow(0 0 7px #8b4dff);
}

.sideLed{
  position:absolute;
  top:88px;
  width:14px;
  height:72%;
  border-radius:10px;
  background:linear-gradient(#28003f,#d7a4ff,#7d39ff,#180020);
  box-shadow:0 0 16px #c084ff,inset 0 0 8px #fff;
  opacity:.75;
  z-index:5;
  pointer-events:none;
}
.sideLed.left{left:8px}
.sideLed.right{right:8px}

.overlayGlow{
  position:absolute;
  inset:10px;
  border-radius:26px;
  border:2px solid rgba(200,160,255,.45);
  box-shadow:inset 0 0 18px #8b4dff,0 0 16px #8b4dff;
  pointer-events:none;
  z-index:6;
}

.note{
  font-size:10px;
  color:#caa7ff;
  margin-top:4px;
}
</style>
</head>

<body>
<div class="wrap">
  <div class="machine">

    <div class="sideLed left"></div>
    <div class="sideLed right"></div>
    <div class="overlayGlow"></div>

    <img class="part topLed" src="apocalis_top_led_unit.png" alt="上部LEDユニット">

    <img class="part mainLcd" src="apocalis_main_lcd.png" alt="メイン液晶">

    <img class="part reelArea" src="apocalis_reel_area.png" alt="リールエリア">

    <img class="part controlArea" src="apocalis_info_control_panel.png" alt="情報・操作パネル">

    <img class="part lowerPanel" src="apocalis_guardian_lower_panel.png" alt="下部守護者パネル">

    <img class="part speaker" src="apocalis_bottom_speaker.png" alt="下部スピーカー">

  </div>

  <div class="note">APOCALIS CABINET Ver.C4 / static mock</div>
</div>
</body>
</html>
