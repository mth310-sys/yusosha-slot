<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>七つの刻印 Ver.0.4.1 画像筐体版</title>
<style>
*{box-sizing:border-box}

body{
  margin:0;
  background:#050008;
  color:white;
  font-family:sans-serif;
  text-align:center;
}

.wrap{
  max-width:430px;
  margin:auto;
  padding:4px;
}

.machine{
  position:relative;
  width:100%;
  aspect-ratio:525/990;
  margin:auto;
  overflow:hidden;
  filter:drop-shadow(0 0 24px #9b4dff);
}

.base{
  position:absolute;
  inset:0;
  width:100%;
  height:100%;
  object-fit:contain;
  z-index:1;
  pointer-events:none;
}

.layer{
  position:absolute;
  inset:0;
  z-index:2;
}

/* リールだけ重ねる */
.reels{
  position:absolute;
  left:25.5%;
  top:45.5%;
  width:49%;
  height:13.2%;
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:3.5%;
  padding:0;
}

.reel{
  background:linear-gradient(#fff,#ddd);
  border:3px solid #d7c6ff;
  border-radius:10px;
  color:#22002f;
  font-size:15px;
  font-weight:bold;
  display:flex;
  align-items:center;
  justify-content:center;
  box-shadow:
    inset 0 0 12px #000,
    0 0 8px #8b4dff;
  overflow:hidden;
}

.spin{
  animation:spin .12s infinite;
}

@keyframes spin{
  50%{transform:translateY(4px);filter:blur(1px)}
}

/* 数字だけ重ねる */
.creditNum{
  position:absolute;
  left:35%;
  top:62.8%;
  width:12%;
  font-family:monospace;
  font-size:14px;
  color:#ff2424;
  text-shadow:0 0 6px #ff0000;
}

.betNum{
  position:absolute;
  left:49%;
  top:62.8%;
  width:8%;
  font-family:monospace;
  font-size:14px;
  color:#7dff9b;
  text-shadow:0 0 6px #4dff78;
}

.payNum{
  position:absolute;
  left:60.5%;
  top:62.8%;
  width:12%;
  font-family:monospace;
  font-size:14px;
  color:#ff2424;
  text-shadow:0 0 6px #ff0000;
}

/* 状態表示 */
.stateText{
  position:absolute;
  left:33%;
  top:60.4%;
  width:34%;
  font-size:11px;
  color:#ffeab7;
  font-weight:bold;
  text-shadow:0 0 6px #b45cff;
  pointer-events:none;
}

/* メッセージ */
.msg{
  position:absolute;
  left:18%;
  top:73.2%;
  width:64%;
  min-height:20px;
  color:#fff3a0;
  font-size:13px;
  font-weight:bold;
  text-shadow:0 0 8px #b45cff;
  pointer-events:none;
}

/* 透明操作ボタン */
button{
  position:absolute;
  border:none;
  background:rgba(255,255,255,.01);
  color:transparent;
  padding:0;
  z-index:4;
  -webkit-tap-highlight-color:transparent;
}

button:active{
  background:rgba(255,255,255,.18);
  box-shadow:0 0 12px #fff;
}

/* 筐体画像上の実ボタン位置に合わせる */
#startBtn{
  left:13.3%;
  top:62.2%;
  width:14%;
  height:4.4%;
  border-radius:50%;
}

#maxBetBtn{
  left:27%;
  top:62.2%;
  width:13%;
  height:4.4%;
  border-radius:50%;
}

#resetBtn{
  left:77%;
  top:62.2%;
  width:15%;
  height:4.4%;
  border-radius:50%;
}

#betBtn{
  left:42.5%;
  top:62.2%;
  width:7%;
  height:4.4%;
  border-radius:8px;
}

#s0{
  left:31%;
  top:68.2%;
  width:11%;
  height:5.6%;
  border-radius:50%;
}

#s1{
  left:45%;
  top:68.2%;
  width:11%;
  height:5.6%;
  border-radius:50%;
}

#s2{
  left:59%;
  top:68.2%;
  width:11%;
  height:5.6%;
  border-radius:50%;
}

button:disabled{
  pointer-events:none;
}
</style>
</head>

<body>
<div class="wrap">
  <div class="machine">
    <img class="base" src="machine_base_full.png" alt="七つの刻印 筐体">

    <div class="layer">
      <div class="reels">
        <div id="r0" class="reel">刻印</div>
        <div id="r1" class="reel">ベル</div>
        <div id="r2" class="reel">リプ</div>
      </div>

      <div class="stateText">STATE：<span id="stateView">通常</span></div>

      <div id="creditView" class="creditNum">100</div>
      <div id="betView" class="betNum">0</div>
      <div id="payView" class="payNum">0</div>

      <div id="msg" class="msg">BETしてください</div>

      <button id="startBtn">START</button>
      <button id="maxBetBtn">MAX</button>
      <button id="betBtn">BET</button>
      <button id="resetBtn">RESET</button>

      <button id="s0">STOP</button>
      <button id="s1">STOP</button>
      <button id="s2">STOP</button>
    </div>
  </div>
</div>

<script>
let credit=100;
let bet=0;
let pay=0;
let spinning=false;
let stopped=0;
let result=["刻印","ベル","リプ"];

const $=id=>document.getElementById(id);

function update(){
  $("creditView").textContent=credit;
  $("betView").textContent=bet;
  $("payView").textContent=pay;

  $("betBtn").disabled=spinning||bet>=3||credit<=0;
  $("maxBetBtn").disabled=spinning||bet>=3||credit<(3-bet);
  $("startBtn").disabled=spinning||bet!==3;

  for(let i=0;i<3;i++){
    $("s"+i).disabled=!spinning;
  }
}

function message(t){
  $("msg").textContent=t;
}

function betOne(){
  if(spinning||bet>=3||credit<=0)return;
  credit--;
  bet++;
  message(bet===3?"STARTできます":"3BETしてください");
  update();
}

function maxBet(){
  if(spinning||bet>=3)return;
  const need=3-bet;
  if(credit<need){
    message("クレジット不足");
    return;
  }
  credit-=need;
  bet=3;
  message("MAX BET");
  update();
}

function start(){
  if(spinning||bet!==3)return;

  spinning=true;
  stopped=0;
  pay=0;

  const patterns=[
    ["刻印","刻印","刻印"],
    ["青紫7","青紫7","青紫7"],
    ["ベル","ベル","ベル"],
    ["チェリー","刻印","ベル"],
    ["リプ","リプ","リプ"],
    ["ベル","赤7","リプ"]
  ];

  result=patterns[Math.floor(Math.random()*patterns.length)];

  for(let i=0;i<3;i++){
    $("r"+i).classList.add("spin");
    $("r"+i).textContent=["赤7","青紫7","ベル","リプ","刻印"][Math.floor(Math.random()*5)];
  }

  message("リール回転中");
  update();
}

function stop(i){
  if(!spinning)return;

  $("r"+i).classList.remove("spin");
  $("r"+i).textContent=result[i];

  stopped++;

  if(stopped===3){
    spinning=false;
    bet=0;

    const joined=result.join("");

    if(joined==="刻印刻印刻印"){
      pay=0;
      $("stateView").textContent="守護者MODE";
      message("刻印揃い！守護者MODE確定");
    }else if(joined==="青紫7青紫7青紫7"){
      pay=100;
      credit+=pay;
      $("stateView").textContent="終焉ノ刻";
      message("青紫7揃い！終焉ノ刻");
    }else if(joined==="ベルベルベル"){
      pay=8;
      credit+=pay;
      message("ベル 8枚");
    }else if(joined==="リプリプリプ"){
      pay=0;
      message("リプレイ");
    }else{
      pay=0;
      message("ハズレ");
    }
  }

  update();
}

function reset(){
  credit=100;
  bet=0;
  pay=0;
  spinning=false;
  stopped=0;
  result=["刻印","ベル","リプ"];
  $("stateView").textContent="通常";

  for(let i=0;i<3;i++){
    $("r"+i).classList.remove("spin");
    $("r"+i).textContent=result[i];
  }

  message("BETしてください");
  update();
}

$("betBtn").onclick=betOne;
$("maxBetBtn").onclick=maxBet;
$("startBtn").onclick=start;
$("resetBtn").onclick=reset;
$("s0").onclick=()=>stop(0);
$("s1").onclick=()=>stop(1);
$("s2").onclick=()=>stop(2);

update();
</script>
</body>
</html>
