<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ペカチュウ Ver.0.6.2</title>
<style>
*{box-sizing:border-box;}
body{margin:0;background:radial-gradient(circle,#2a2200,#020202);color:white;font-family:sans-serif;text-align:center;}
.wrap{max-width:390px;margin:auto;padding:4px;}
.machine{position:relative;overflow:hidden;background:linear-gradient(135deg,#f7f7f7 0%,#3c3c3c 5%,#050505 15%,#151200 50%,#050505 85%,#3c3c3c 95%,#ffffff 100%);border:6px solid #d8b900;border-radius:26px;padding:9px;box-shadow:0 0 34px #ffe600,0 0 60px #ffffff,0 0 75px #ff9900,inset 0 0 30px #000,inset 0 0 0 3px #25200a;}
.machine:before{content:"";position:absolute;inset:8px;border:2px solid #f7f7f7;border-radius:20px;box-shadow:0 0 20px #ffffff,0 0 28px #fff200,inset 0 0 16px #8a6a00;pointer-events:none;}
.machine:after{content:"⚡";position:absolute;inset:14px 16px auto 16px;height:34px;color:#fff200;font-size:30px;text-shadow:0 0 16px #fff200,0 0 32px #ffffff,0 0 42px #ff9900;opacity:.9;pointer-events:none;}
.led-side{position:absolute;top:42px;bottom:44px;width:13px;border-radius:8px;background:radial-gradient(circle,#ffffff 0 15%,#fff200 22%,#ffb300 42%,#ffffff 55%,#5b3a00 75%);background-size:13px 16px;box-shadow:0 0 20px #ffffff,0 0 30px #fff200,0 0 42px #ff9900;animation:ledPulse 1s infinite alternate;}
.led-left{left:8px}.led-right{right:8px}
.top-led{position:relative;z-index:1;height:25px;margin:0 42px 7px;border-radius:0 0 18px 18px;background:linear-gradient(90deg,#1c1600,#fff200,#ffffff,#ffb300,#ffffff,#fff200,#1c1600);box-shadow:0 0 20px #ffffff,0 0 30px #fff200,inset 0 0 12px #fff7b0;clip-path:polygon(12% 0,88% 0,100% 100%,0 100%);animation:topRun 1.8s infinite linear;}
.top-panel,.center-panel,.info-panel,.play-panel,.role,.reset{position:relative;z-index:1;}
.top-panel{background:linear-gradient(135deg,rgba(255,255,255,.18),transparent 20%,transparent 78%,rgba(255,230,0,.18)),radial-gradient(circle,#1b1700,#030303 75%);border:2px solid #d8d8d8;border-radius:16px;padding:8px 6px;margin-bottom:7px;box-shadow:inset 0 0 18px #000,0 0 0 2px #111,0 0 16px #ffffff,0 0 22px #ffd000;}
.logo{font-size:10px;color:#9cff9c;font-weight:bold;text-shadow:0 0 8px #3cff3c;opacity:.72;}
h1{font-size:34px;margin:2px 0;color:#fff200;letter-spacing:1px;text-shadow:0 0 12px #fff200,0 0 24px #ffffff,0 0 30px #ff9d00,2px 2px 0 #111;}
.version{font-size:11px;color:#fff7b0;}
.center-panel{background:linear-gradient(120deg,transparent 0 20%,rgba(255,230,0,.12) 21%,transparent 24%,transparent 70%,rgba(255,255,255,.12) 72%,transparent 75%),linear-gradient(#060606,#111,#050505);border:2px solid #d9d9d9;border-radius:16px;padding:9px 6px 6px;margin-bottom:7px;box-shadow:inset 0 0 18px #000,0 0 0 2px #111,0 0 14px #ffffff,0 0 18px #ffcc00;}
.reel-area{display:flex;align-items:center;justify-content:center;gap:7px;}
.lamp{width:52px;height:52px;flex:0 0 52px;border-radius:10px;background:radial-gradient(circle,#302200,#120900 75%);border:3px solid #ffe600;color:#ffe56b;display:flex;align-items:center;justify-content:center;font-weight:bold;font-size:13px;box-shadow:inset 0 0 10px #000,0 0 12px #ffffff,0 0 18px #4d3500;}
.lamp.on{background:radial-gradient(circle,#ffffff,#fff47a 25%,#ffd000 50%,#ff9900);color:#402000;box-shadow:0 0 34px #ffffff,0 0 55px gold,0 0 80px orange,inset 0 0 8px #fff;animation:peka .55s infinite alternate;}
.lamp.super{background:radial-gradient(circle,#ffffff,#e8d8ff 25%,#9b5cff 55%,#fff200);color:#250040;box-shadow:0 0 45px #ffffff,0 0 65px #b26cff,0 0 90px #fff200;animation:superPeka .35s infinite alternate;}
.reels{display:flex;gap:6px;}
.reel{width:80px;height:112px;background:linear-gradient(#fff,#e7e7e7 45%,#f7f7f7 55%,#d5d5d5);color:#111;border-radius:12px;border:4px solid #777;box-shadow:inset 0 0 14px #999,0 0 0 2px #151515,0 0 10px #000;display:flex;align-items:center;justify-content:center;font-size:34px;font-weight:bold;position:relative;}
.symbol{width:72px;height:72px;object-fit:contain;pointer-events:none;user-select:none;}
.reel.spark{box-shadow:inset 0 0 14px #999,0 0 0 2px #151515,0 0 16px #ffffff,0 0 26px #fff200,0 0 38px #ff9900;}
.reel.superSpark{box-shadow:inset 0 0 14px #999,0 0 0 2px #151515,0 0 20px #ffffff,0 0 34px #9b5cff,0 0 46px #fff200;}
.reel.spark:after,.reel.superSpark:after{content:"";position:absolute;inset:-10px;border-radius:14px;background:radial-gradient(circle at 20% 30%,#fff200 0 2px,transparent 3px),radial-gradient(circle at 80% 60%,#ffffff 0 2px,transparent 3px),linear-gradient(135deg,transparent 35%,#fff200 37%,transparent 39%),linear-gradient(45deg,transparent 58%,#ffffff 60%,transparent 62%);opacity:.9;pointer-events:none;animation:sparkFlash .45s infinite alternate;}
.msg{color:#fff200;font-weight:bold;min-height:28px;margin:7px 0 1px;font-size:20px;text-shadow:0 0 10px #ffffff,0 0 14px #ff9900;}
.msg.big{color:#fff200;font-size:23px;animation:bigFlash .55s infinite alternate;}
.msg.superMsg{color:#f2ddff;font-size:22px;text-shadow:0 0 12px #ffffff,0 0 22px #9b5cff,0 0 30px #fff200;animation:superMsg .4s infinite alternate;}
.info-panel{display:flex;justify-content:space-around;background:#020202;border:2px solid #d9d9d9;border-radius:13px;padding:7px;margin-bottom:7px;box-shadow:inset 0 0 12px #000,0 0 12px #ffffff,0 0 15px #ffd000;}
.info-box{width:32%;border-right:1px solid #252525}.info-box:last-child{border-right:none}
.info-label{font-size:10px;color:#fff7b0}
.info-value{font-size:30px;font-weight:bold;color:#ff2c2c;font-family:"Courier New",monospace;text-shadow:0 0 8px red,0 0 14px #5a0000;}
.play-panel{display:block;background:linear-gradient(145deg,#8a741e,#151515 30%,#080808 55%,#3f350d 78%,#f0cf42);border:2px solid #e0c84a;border-radius:17px;padding:8px;margin-bottom:8px;box-shadow:inset 0 0 14px #000,0 0 16px #ffffff,0 0 20px #ffd000,inset 0 0 0 2px #2b260f;}
.operation-unit{display:grid;grid-template-rows:auto auto;gap:8px;}
.control-panel{display:grid;grid-template-columns:1.15fr 1fr 1fr;gap:8px;background:linear-gradient(145deg,#4c3f00,#050505,#2b2300);border:2px solid #ffe600;border-radius:14px;padding:7px;box-shadow:inset 0 0 12px #000,0 0 16px #ffffff,0 0 18px #ffd000,inset 0 0 0 2px #111;}
.stop-panel{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;background:linear-gradient(145deg,#3a3000,#050505,#241d00);border:2px solid #fff200;border-radius:14px;padding:8px 10px;box-shadow:inset 0 0 12px #000,0 0 16px #ffffff,0 0 20px #ffe600,inset 0 0 0 2px #111;}
button{width:100%;font-size:15px;font-weight:bold;padding:8px 2px;border:none;color:white;position:relative;overflow:hidden;text-shadow:0 0 8px #fff;}
button:active{transform:translateY(3px) scale(.98);filter:brightness(.82);}
.btn-lever,.btn-bet{height:56px;border-radius:12px;border:3px solid #8f969d;background:linear-gradient(145deg,#fff8c5 0 8%,#766b3a 10%,#1b1b1b 18%,transparent 20%),linear-gradient(#fff479,#ffd000 45%,#9a6700);color:#111;text-shadow:0 0 8px #fff2a0;box-shadow:inset 0 2px 5px rgba(255,255,255,.8),inset 0 -7px 12px rgba(0,0,0,.75),0 4px 0 #050505,0 0 0 3px #262a2f,0 0 18px #ffffff,0 0 20px #ffe600;}
.stop{width:68px;height:68px;margin:auto;border-radius:50%;font-size:15px;padding:0;border:4px solid #f5f5f5;background:radial-gradient(circle at 35% 25%,#fff 0 5%,#ff4b4b 13%,#e60000 45%,#6b0000 80%);box-shadow:inset 0 4px 8px rgba(255,255,255,.9),inset 0 -8px 14px rgba(0,0,0,.8),0 4px 0 #030303,0 0 0 4px #171a1f,0 0 0 7px #d8d8d8,0 0 18px #ffffff,0 0 24px #ffe600;text-shadow:0 0 12px #fff;}
.stop:before{content:"";position:absolute;inset:-6px;border-radius:50%;border:2px solid #fff200;box-shadow:0 0 12px #ffffff,0 0 20px #fff200;pointer-events:none;}
.reset{background:linear-gradient(#c9b44a,#665300,#333);color:white;font-size:12px;padding:7px 20px;width:auto;margin-bottom:5px;border-radius:10px;}
button:disabled{opacity:.35;}
.role{font-size:10px;color:#f3eab0;line-height:1.35;}
.reel.stopFlash{animation:stopFlash .25s;}
.payEffect{position:fixed;top:45%;left:50%;transform:translate(-50%,-50%);font-size:38px;font-weight:bold;color:#fff200;text-shadow:0 0 18px #ffffff,0 0 24px orange;display:none;pointer-events:none;z-index:10;}
.payEffect.show{display:block;animation:payPop 1s forwards;}
.flash{animation:screenFlash .35s 4;}
.superFlash{animation:superScreen .25s 8;}
.revival{animation:revivalShake .12s 12;}
@keyframes ledPulse{from{opacity:.55;filter:brightness(1)}to{opacity:1;filter:brightness(1.9)}}
@keyframes topRun{0%{filter:brightness(1)}50%{filter:brightness(1.9)}100%{filter:brightness(1)}}
@keyframes stopFlash{0%{transform:scale(1.12)}100%{transform:scale(1)}}
@keyframes sparkFlash{from{opacity:.45;filter:brightness(1)}to{opacity:1;filter:brightness(1.8)}}
@keyframes peka{from{transform:scale(1);filter:brightness(1)}to{transform:scale(1.08);filter:brightness(1.75)}}
@keyframes superPeka{from{transform:scale(1);filter:brightness(1)}to{transform:scale(1.12);filter:brightness(2.1)}}
@keyframes bigFlash{from{text-shadow:0 0 8px yellow}to{text-shadow:0 0 24px #ffffff,0 0 34px orange;transform:scale(1.05)}}
@keyframes superMsg{from{transform:scale(1)}to{transform:scale(1.06)}}
@keyframes payPop{0%{opacity:0;transform:translate(-50%,-30%) scale(.5)}30%{opacity:1;transform:translate(-50%,-50%) scale(1.2)}100%{opacity:0;transform:translate(-50%,-90%) scale(1)}}
@keyframes screenFlash{0%{background:#fff200}100%{background:radial-gradient(circle,#2a2200,#020202)}}
@keyframes superScreen{0%{background:#ffffff}50%{background:#9b5cff}100%{background:radial-gradient(circle,#2a2200,#020202)}}
@keyframes revivalShake{0%{transform:translateX(0)}50%{transform:translateX(3px)}100%{transform:translateX(-3px)}}
</style>
</head>
<body>
<div class="wrap">
  <div class="machine">
    <div class="led-side led-left"></div>
    <div class="led-side led-right"></div>
    <div class="top-led"></div>

    <div class="top-panel">
      <div class="logo">🌱 遊創舎</div>
      <h1>⚡ペカチュウ⚡</h1>
      <div class="version">PEKACHU SLOT Ver.0.6.2 全役・雷復活版</div>
    </div>

    <div class="center-panel">
      <div class="reel-area">
        <div id="lamp" class="lamp">PEKA</div>
        <div class="reels">
          <div id="r1" class="reel"></div>
          <div id="r2" class="reel"></div>
          <div id="r3" class="reel"></div>
        </div>
      </div>
      <div id="msg" class="msg">BETしてください</div>
    </div>

    <div class="info-panel">
      <div class="info-box"><div class="info-label">CREDIT</div><div id="credit" class="info-value">50</div></div>
      <div class="info-box"><div class="info-label">BET</div><div id="bet" class="info-value">0</div></div>
      <div class="info-box"><div class="info-label">PAYOUT</div><div id="pay" class="info-value">0</div></div>
    </div>

    <div class="play-panel">
      <div class="operation-unit">
        <div class="control-panel">
          <button id="startBtn" class="btn-lever" onclick="start()" disabled>START<br>レバー</button>
          <button class="btn-bet" onclick="betOne()">BET</button>
          <button class="btn-bet" onclick="maxBet()">MAX<br>BET</button>
        </div>
        <div class="stop-panel">
          <button id="s1" class="stop" onclick="stop(0)" disabled>STOP</button>
          <button id="s2" class="stop" onclick="stop(1)" disabled>STOP</button>
          <button id="s3" class="stop" onclick="stop(2)" disabled>STOP</button>
        </div>
      </div>
    </div>

    <button class="reset" onclick="resetGame()">リセット</button>

    <div class="role">
      赤7：BIG 50枚 / 白7：SUPER BIG 100枚 / BAR：雷BONUS 20枚<br>
      STAR：15枚 / ベル：10枚 / ブドウ：8枚 / チェリー：2枚
    </div>
  </div>
</div>

<div id="payEffect" class="payEffect"></div>

<script>
const symbols = ["7R","7W","BAR","CHERRY","GRAPE","BELL","STAR"];

const symbolFiles = {
  "7R":"7_red.png",
  "7W":"7_white_purple.png",
  "BAR":"bar.png",
  "CHERRY":"cherry.png",
  "GRAPE":"grape.png",
  "BELL":"bell.png",
  "STAR":"star.png"
};

let credit = 50;
let bet = 0;
let pay = 0;
let reels = ["CHERRY","GRAPE","BELL"];
let spinning = [false,false,false];
let timers = [null,null,null];
let stopped = 0;
let resultType = "MISS";
let targetSymbol = null;
let revivalMode = false;

function drawReel(i){
  document.getElementById("r"+(i+1)).innerHTML =
    `<img src="${symbolFiles[reels[i]]}" class="symbol" alt="${reels[i]}">`;
}

function drawAllReels(){
  for(let i=0;i<3;i++) drawReel(i);
}

function update(){
  document.getElementById("credit").textContent = credit;
  document.getElementById("bet").textContent = bet;
  document.getElementById("pay").textContent = pay;
  document.getElementById("startBtn").disabled = bet !== 3 || spinning.includes(true);

  for(let i=0;i<3;i++){
    document.getElementById("s"+(i+1)).disabled = !spinning[i];
  }
}

function msg(t,type="normal"){
  const m = document.getElementById("msg");
  m.textContent = t;
  m.classList.remove("big","superMsg");
  if(type==="big") m.classList.add("big");
  if(type==="super") m.classList.add("superMsg");
}

function rand(){
  return symbols[Math.floor(Math.random()*symbols.length)];
}

function clearReelEffects(){
  for(let i=0;i<3;i++){
    document.getElementById("r"+(i+1)).classList.remove("spark","superSpark");
  }
}

function addReelEffects(cls="spark"){
  for(let i=0;i<3;i++){
    document.getElementById("r"+(i+1)).classList.add(cls);
  }
}

function clearSpecialBody(){
  document.body.classList.remove("flash","superFlash","revival");
}

function setLamp(mode){
  const lamp = document.getElementById("lamp");
  lamp.classList.remove("on","super");
  if(mode==="big") lamp.classList.add("on");
  if(mode==="super") lamp.classList.add("super");
}

function chooseResult(){
  const r = Math.random();

  if(r < 0.010) return {type:"SUPER", symbol:"7W"};
  if(r < 0.025) return {type:"REVIVAL", symbol:"7W"};
  if(r < 0.080) return {type:"BIG", symbol:"7R"};
  if(r < 0.125) return {type:"BAR", symbol:"BAR"};
  if(r < 0.185) return {type:"STAR", symbol:"STAR"};
  if(r < 0.275) return {type:"BELL", symbol:"BELL"};
  if(r < 0.385) return {type:"GRAPE", symbol:"GRAPE"};
  if(r < 0.565) return {type:"CHERRY", symbol:"CHERRY"};

  return {type:"MISS", symbol:null};
}

function betOne(){
  if(credit <= 0 || bet >= 3 || spinning.includes(true)) return;

  credit--;
  bet++;
  pay = 0;
  setLamp("off");
  clearSpecialBody();
  clearReelEffects();
  msg(bet === 3 ? "STARTできます" : "BET中");
  update();
}

function maxBet(){
  if(spinning.includes(true)) return;

  while(bet < 3 && credit > 0){
    credit--;
    bet++;
  }

  pay = 0;
  setLamp("off");
  clearSpecialBody();
  clearReelEffects();
  msg(bet === 3 ? "STARTできます" : "クレジット不足");
  update();
}

function start(){
  if(bet !== 3) return;

  stopped = 0;
  pay = 0;
  revivalMode = false;
  clearSpecialBody();
  clearReelEffects();

  const chosen = chooseResult();
  resultType = chosen.type;
  targetSymbol = chosen.symbol;

  if(resultType === "SUPER"){
    setLamp("super");
    addReelEffects("superSpark");
    msg("白7 SUPER予告！！","super");
  }else if(resultType === "BIG"){
    setLamp("big");
    addReelEffects("spark");
    msg("ペカッ！");
  }else if(resultType === "BAR"){
    setLamp("big");
    msg("雷BONUS気配");
  }else if(resultType === "STAR"){
    msg("STARチャンス");
  }else if(resultType === "REVIVAL"){
    setLamp("off");
    msg("リール回転中");
  }else{
    setLamp("off");
    msg("リール回転中");
  }

  for(let i=0;i<3;i++){
    spinning[i] = true;
    timers[i] = setInterval(()=>{
      reels[i] = rand();
      drawReel(i);
    },70);
  }

  update();
}

function stop(i){
  if(!spinning[i]) return;

  clearInterval(timers[i]);
  spinning[i] = false;

  if(resultType === "SUPER" || resultType === "BIG" || resultType === "BAR" || resultType === "STAR" || resultType === "BELL" || resultType === "GRAPE"){
    reels[i] = targetSymbol;
  }else if(resultType === "CHERRY"){
    reels[i] = i === 0 ? "CHERRY" : rand();
  }else if(resultType === "REVIVAL"){
    if(i < 2){
      reels[i] = "7W";
    }else{
      reels[i] = "STAR";
    }
  }else{
    reels[i] = rand();
    if(reels[0] === reels[1] && reels[1] === reels[2]) reels[i] = "CHERRY";
  }

  drawReel(i);

  const reelEl = document.getElementById("r"+(i+1));
  reelEl.classList.remove("stopFlash");
  void reelEl.offsetWidth;
  reelEl.classList.add("stopFlash");

  if(resultType === "SUPER" || resultType === "REVIVAL"){
    reelEl.classList.add("superSpark");
  }else{
    reelEl.classList.add("spark");
  }

  stopped++;

  if(resultType === "SUPER" && stopped === 2){
    msg("白7テンパイ！！","super");
    document.body.classList.add("revival");
    setTimeout(()=>document.body.classList.remove("revival"),900);
  }

  if(resultType === "REVIVAL" && stopped === 2){
    msg("白7テンパイ……？","super");
  }

  if(stopped === 3){
    judge();
  }

  update();
}

function showPayEffect(amount){
  if(amount <= 0) return;

  const effect = document.getElementById("payEffect");
  effect.textContent = "+" + amount;
  effect.classList.remove("show");
  void effect.offsetWidth;
  effect.classList.add("show");
}

function payout(amount,text,type="normal"){
  pay = amount;
  credit += pay;
  msg(text,type);
  showPayEffect(pay);
}

function judge(){
  if(resultType === "REVIVAL"){
    msg("雷復活モード！！","super");
    document.body.classList.add("superFlash","revival");

    setTimeout(()=>{
      reels = ["7W","7W","7W"];
      drawAllReels();
      setLamp("super");
      addReelEffects("superSpark");
      document.body.classList.remove("revival");
      payout(100,"白7 SUPER BIG！！","super");
      bet = 0;
      update();
    },900);

    return;
  }

  if(reels[0] === "7W" && reels[1] === "7W" && reels[2] === "7W"){
    setLamp("super");
    addReelEffects("superSpark");
    document.body.classList.add("superFlash");
    setTimeout(()=>document.body.classList.remove("superFlash"),1800);
    payout(100,"白7 SUPER BIG！！","super");

  }else if(reels[0] === "7R" && reels[1] === "7R" && reels[2] === "7R"){
    setLamp("big");
    addReelEffects("spark");
    document.body.classList.add("flash");
    setTimeout(()=>document.body.classList.remove("flash"),1500);
    payout(50,"BIG BONUS！！","big");

  }else if(reels[0] === "BAR" && reels[1] === "BAR" && reels[2] === "BAR"){
    setLamp("big");
    addReelEffects("spark");
    payout(20,"BAR 雷BONUS 20枚","big");

  }else if(reels[0] === "STAR" && reels[1] === "STAR" && reels[2] === "STAR"){
    payout(15,"STAR 15枚","big");

  }else if(reels[0] === "BELL" && reels[1] === "BELL" && reels[2] === "BELL"){
    payout(10,"ベル 10枚");

  }else if(reels[0] === "GRAPE" && reels[1] === "GRAPE" && reels[2] === "GRAPE"){
    payout(8,"ブドウ 8枚");

  }else if(reels.includes("CHERRY")){
    payout(2,"チェリー 2枚");

  }else{
    pay = 0;
    msg("ハズレ");
    setTimeout(clearReelEffects,700);
  }

  bet = 0;
  update();
}

function resetGame(){
  for(let i=0;i<3;i++){
    clearInterval(timers[i]);
  }

  credit = 50;
  bet = 0;
  pay = 0;
  reels = ["CHERRY","GRAPE","BELL"];
  spinning = [false,false,false];
  stopped = 0;
  resultType = "MISS";
  targetSymbol = null;
  revivalMode = false;

  drawAllReels();
  setLamp("off");
  clearSpecialBody();
  clearReelEffects();
  msg("BETしてください");
  update();
}

drawAllReels();
update();
</script>
</body>
</html>
