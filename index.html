<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>終焉神アポカリス専用筐体 Ver.C2</title>
<style>
*{box-sizing:border-box}

body{
  margin:0;
  background:radial-gradient(circle,#24003d,#030005 75%);
  color:white;
  font-family:sans-serif;
  text-align:center;
}

.wrap{
  max-width:430px;
  margin:auto;
  padding:8px;
}

.machine{
  position:relative;
  overflow:hidden;
  padding:12px 18px 14px;
  border:12px solid #030303;
  border-radius:36px;
  background:
    linear-gradient(90deg,rgba(255,255,255,.55),transparent 9%,transparent 91%,rgba(255,255,255,.55)),
    linear-gradient(135deg,#d6d6de 0%,#111 9%,#180020 28%,#050006 55%,#26003f 78%,#e6e6f0 100%);
  box-shadow:
    0 0 42px #9b4dff,
    inset 0 0 60px #000,
    inset 0 0 0 3px #6f35c8,
    inset 0 0 0 8px rgba(255,255,255,.1);
}

.machine:before{
  content:"";
  position:absolute;
  inset:10px;
  border-radius:28px;
  border:3px solid rgba(190,120,255,.7);
  box-shadow:
    0 0 18px #a45cff,
    inset 0 0 18px #a45cff;
  pointer-events:none;
}

.sideFrame{
  position:absolute;
  top:72px;
  width:42px;
  height:68%;
  border-radius:22px;
  background:
    linear-gradient(90deg,#030303,#2d2d34,#f4f4ff,#7d39ff,#100018);
  box-shadow:
    inset 0 0 24px rgba(255,255,255,.65),
    inset 0 0 26px #000,
    0 0 24px #9b4dff;
  z-index:1;
}
.sideFrame.left{left:5px}
.sideFrame.right{right:5px;transform:scaleX(-1)}

.sideLight{
  position:absolute;
  top:95px;
  width:18px;
  height:57%;
  border-radius:16px;
  background:linear-gradient(#220033,#ffccff,#8f48ff,#180020);
  box-shadow:
    0 0 24px #d9a3ff,
    inset 0 0 12px #fff;
  z-index:2;
}
.sideLight.left{left:17px}
.sideLight.right{right:17px}

.unit{
  position:relative;
  z-index:3;
  margin:8px 0;
}

.topWing{
  height:82px;
  position:relative;
  border-radius:24px 24px 12px 12px;
  background:
    linear-gradient(135deg,#050505,#2d123f,#050505);
  box-shadow:
    inset 0 0 20px #000,
    0 0 22px #9b4dff;
  overflow:hidden;
}

.topWing:before,
.topWing:after{
  content:"";
  position:absolute;
  top:18px;
  width:38%;
  height:34px;
  background:linear-gradient(135deg,#120018,#c084ff,#260045,#050505);
  box-shadow:0 0 18px #c084ff,inset 0 0 10px #fff;
}
.topWing:before{
  left:12px;
  transform:skewX(-25deg);
  border-radius:18px 6px 22px 8px;
}
.topWing:after{
  right:12px;
  transform:skewX(25deg);
  border-radius:6px 18px 8px 22px;
}

.emblem{
  position:absolute;
  left:50%;
  top:6px;
  transform:translateX(-50%);
  width:70px;
  height:70px;
  border-radius:50%;
  background:
    radial-gradient(circle,#d9a3ff,#6d22c9 45%,#08000d 72%);
  border:3px solid #c9a8ff;
  box-shadow:0 0 22px #d9a3ff,inset 0 0 12px #fff;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:34px;
  color:#fff;
  text-shadow:0 0 12px #fff;
}

.mainFrame{
  padding:10px;
  border-radius:22px;
  background:
    linear-gradient(135deg,#eee,#1a1a1f 10%,#070707 55%,#5a2ca0 82%,#ddd);
  box-shadow:
    inset 0 0 22px #000,
    0 0 18px #8b4dff;
}

.screen{
  height:150px;
  border-radius:14px;
  background:
    radial-gradient(circle at center,rgba(150,60,255,.4),rgba(0,0,0,.9) 65%),
    linear-gradient(135deg,#25003a,#050008);
  border:3px solid #111;
  box-shadow:
    inset 0 0 35px #000,
    0 0 16px #7d39ff;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
}

.title{
  font-size:34px;
  font-weight:bold;
  color:#ead7ff;
  text-shadow:0 0 10px #fff,0 0 22px #9b4dff;
}
.subtitle{
  color:#d9b8ff;
  font-size:13px;
  letter-spacing:5px;
}

.reelOuter{
  padding:10px;
  border-radius:18px;
  background:
    linear-gradient(180deg,#d6d6d6,#141414 12%,#050505 80%,#777);
  box-shadow:
    inset 0 0 24px #000,
    0 0 16px #8b4dff;
}

.reelWindow{
  height:142px;
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:6px;
  background:#050505;
  padding:6px;
  border-radius:10px;
  border:2px solid #333;
}

.reel{
  background:linear-gradient(180deg,#050505,#222,#050505);
  border:2px solid #3a3a3a;
  box-shadow:inset 0 0 18px #000;
  display:flex;
  flex-direction:column;
  justify-content:space-around;
  align-items:center;
}

.symbol{
  width:70px;
  height:32px;
  border-radius:6px;
  background:linear-gradient(135deg,#27003f,#050008);
  border:1px solid #9b4dff;
  color:#e9d7ff;
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:bold;
  box-shadow:0 0 8px #8b4dff;
}

.machineDeck{
  padding:8px;
  border-radius:18px;
  background:
    linear-gradient(135deg,#111,#4b236e,#050505,#32144f);
  box-shadow:
    inset 0 0 20px #000,
    0 0 18px #7d39ff;
}

.infoLine{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px;
  margin-bottom:8px;
}

.counter{
  background:#050505;
  border:2px solid #333;
  border-radius:8px;
  padding:5px;
  box-shadow:inset 0 0 12px #000,0 0 8px #7d39ff;
}
.counter span{
  display:block;
  font-size:10px;
  color:#aaa;
}
.counter b{
  font-family:monospace;
  font-size:24px;
  color:#ff3030;
  text-shadow:0 0 10px red;
}

.control{
  height:72px;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:18px;
  border-radius:16px;
  background:
    linear-gradient(180deg,rgba(255,255,255,.15),rgba(0,0,0,.85)),
    linear-gradient(90deg,#050505,#250038,#050505);
  box-shadow:inset 0 0 18px #000;
}

.push{
  width:62px;
  height:36px;
  border-radius:12px;
  background:linear-gradient(#f4d8ff,#8b4dff,#24003d);
  box-shadow:0 0 14px #b45cff,inset 0 2px 6px #fff;
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:bold;
}

.stop{
  width:48px;
  height:48px;
  border-radius:50%;
  background:radial-gradient(circle at 35% 25%,#ffc0c0,#ff3030 42%,#5a0000);
  box-shadow:
    0 0 14px red,
    0 5px 0 #220000,
    inset 0 5px 8px rgba(255,255,255,.35);
}

.lowerFrame{
  padding:8px;
  border-radius:18px;
  background:
    linear-gradient(135deg,#e6e6f0,#151515 12%,#050505 70%,#7d39ff);
  box-shadow:inset 0 0 20px #000,0 0 18px #8b4dff;
}

.guardianPanel{
  height:170px;
  display:grid;
  grid-template-columns:repeat(7,1fr);
  overflow:hidden;
  border-radius:12px;
  border:3px solid #111;
  box-shadow:inset 0 0 26px #000;
}

.guardian{
  border-left:1px solid rgba(255,255,255,.16);
  display:flex;
  align-items:flex-end;
  justify-content:center;
  padding-bottom:9px;
  font-size:12px;
  font-weight:bold;
  text-shadow:0 0 8px currentColor;
}

.g1{color:#ff4040;background:linear-gradient(#3a0000,#050005)}
.g2{color:#bbbbbb;background:linear-gradient(#333,#050005)}
.g3{color:#ffd84d;background:linear-gradient(#473800,#050005)}
.g4{color:#c084ff;background:linear-gradient(#2e0047,#050005)}
.g5{color:#58ff72;background:linear-gradient(#003b11,#050005)}
.g6{color:#4da6ff;background:linear-gradient(#001f44,#050005)}
.g7{color:#ff8bd8;background:linear-gradient(#3a0026,#050005)}

.bottomSpeaker{
  height:48px;
  border-radius:0 0 24px 24px;
  background:
    radial-gradient(circle at 18% 55%,#222,#000 38%),
    radial-gradient(circle at 82% 55%,#222,#000 38%),
    linear-gradient(180deg,#333,#050505);
  box-shadow:
    inset 0 0 18px #000,
    0 0 16px #7d39ff;
}
</style>
</head>

<body>
<div class="wrap">
<div class="machine">

  <div class="sideFrame left"></div>
  <div class="sideFrame right"></div>
  <div class="sideLight left"></div>
  <div class="sideLight right"></div>

  <div class="unit topWing">
    <div class="emblem">✶</div>
  </div>

  <div class="unit mainFrame">
    <div class="screen">
      <div class="title">七つの刻印</div>
      <div class="subtitle">終焉ノ刻</div>
    </div>
  </div>

  <div class="unit reelOuter">
    <div class="reelWindow">
      <div class="reel">
        <div class="symbol">紫7</div>
        <div class="symbol">BAR</div>
        <div class="symbol">鐘</div>
      </div>
      <div class="reel">
        <div class="symbol">紫7</div>
        <div class="symbol">BAR</div>
        <div class="symbol">珠</div>
      </div>
      <div class="reel">
        <div class="symbol">鐘</div>
        <div class="symbol">珠</div>
        <div class="symbol">刻印</div>
      </div>
    </div>
  </div>

  <div class="unit machineDeck">
    <div class="infoLine">
      <div class="counter"><span>CREDIT</span><b>50</b></div>
      <div class="counter"><span>PAYOUT</span><b>00</b></div>
    </div>
    <div class="control">
      <div class="push">PUSH</div>
      <div class="stop"></div>
      <div class="stop"></div>
      <div class="stop"></div>
    </div>
  </div>

  <div class="unit lowerFrame">
    <div class="guardianPanel">
      <div class="guardian g1">憤怒</div>
      <div class="guardian g2">怠惰</div>
      <div class="guardian g3">傲慢</div>
      <div class="guardian g4">強欲</div>
      <div class="guardian g5">嫉妬</div>
      <div class="guardian g6">暴食</div>
      <div class="guardian g7">色欲</div>
    </div>
  </div>

  <div class="bottomSpeaker"></div>

</div>
</div>
</body>
</html>
