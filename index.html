<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>七つの刻印 Ver.0.4.0</title>
<style>
*{box-sizing:border-box}

body{
  margin:0;
  height:100dvh;
  overflow:hidden;
  background:radial-gradient(circle,#2b1245,#020005 72%);
  color:#fff;
  font-family:sans-serif;
  text-align:center;
}

.wrap{
  max-width:440px;
  height:100dvh;
  margin:auto;
  padding:4px;
}

.machine{
  position:relative;
  overflow:hidden;
  height:calc(100dvh - 8px);
  border:8px solid #050505;
  border-radius:30px;
  padding:7px 12px 10px;
  display:flex;
  flex-direction:column;
  gap:4px;
  background:
    linear-gradient(90deg,rgba(255,255,255,.28),transparent 8%,transparent 92%,rgba(255,255,255,.28)),
    linear-gradient(135deg,#777 0%,#08050b 8%,#1d002d 35%,#050008 65%,#2b123f 92%,#ddd 100%);
  box-shadow:
    0 0 32px #9b4dff,
    inset 0 0 42px #000,
    inset 0 0 0 3px #7a36d6,
    inset 0 0 0 7px rgba(255,255,255,.08);
}

.machine > *{position:relative;z-index:2}

.sideMetal{
  position:absolute;
  top:28px;
  width:28px;
  height:82%;
  z-index:1;
  border-radius:18px;
  background:linear-gradient(90deg,#050505,#555,#eee,#551092,#090909);
  box-shadow:inset 0 0 12px #fff,inset 0 0 24px #000,0 0 18px #a45cff;
}
.sideMetal.left{left:4px}
.sideMetal.right{right:4px;transform:scaleX(-1)}

.speaker{
  position:absolute;
  top:95px;
  width:20px;
  height:44%;
  z-index:1;
  border-radius:14px;
  background:repeating-linear-gradient(135deg,#050505 0,#050505 4px,#222 4px,#222 7px);
  border:2px solid #555;
  box-shadow:inset 0 0 12px #000,0 0 10px #8b4dff;
  opacity:.9;
}
.speaker.left{left:10px}
.speaker.right{right:10px}

.topLed{
  height:12px;
  flex:0 0 12px;
  border-radius:10px;
  background:linear-gradient(90deg,#24003d,#e1c6ff,#24003d);
  animation:run 1.6s linear infinite;
  box-shadow:0 0 14px #c084ff,inset 0 0 8px #fff;
}
@keyframes run{50%{filter:brightness(2.4)}}

.panel{
  margin:0;
  padding:4px;
  border:2px solid #9d70ff;
  border-radius:15px;
  background:linear-gradient(180deg,rgba(60,0,90,.8),rgba(0,0,0,.82));
  box-shadow:inset 0 0 14px #000,0 0 10px rgba(180,92,255,.65),inset 0 1px 4px rgba(255,255,255,.18);
}

.topPanel{flex:0 0 104px}
.upperArt{
  height:100%;
  overflow:hidden;
  border-radius:13px;
  border:2px solid rgba(255,255,255,.18);
  box-shadow:0 0 18px #8b4dff,inset 0 0 24px #000;
}
.panelImg{
  width:100%;
  height:100%;
  object-fit:cover;
  border-radius:11px;
  display:block;
}

.statePanel{
  flex:0 0 54px;
  display:flex;
  flex-direction:column;
  justify-content:center;
  font-size:20px;
}
.state{font-weight:bold;color:#fff3a0}
.small{font-size:11px;color:#ccc}

.reels{
  flex:0 0 136px;
  display:flex;
  gap:8px;
  justify-content:center;
  align-items:center;
  padding:8px;
  border-radius:20px;
  background:
    linear-gradient(180deg,#eee,#9d70ff 5%,#120020 18%,#050008 82%,#9d70ff 95%,#eee);
  box-shadow:inset 0 0 22px #000,0 0 16px #8f48ff,inset 0 1px 8px rgba(255,255,255,.35);
}
.reel{
  width:88px;
  height:112px;
  border:5px solid #d7c6ff;
  border-radius:16px;
  background:linear-gradient(#fff,#ddd);
  display:flex;
  align-items:center;
  justify-content:center;
  box-shadow:inset 0 0 18px #000,inset 0 0 40px rgba(0,0,0,.28),0 0 14px #8f48ff,0 5px 0 #1b0028;
  overflow:hidden;
}
.reel img{max-width:82px;max-height:104px;object-fit:contain}
.spin{animation:spin .12s infinite}
@keyframes spin{50%{transform:translateY(4px);filter:blur(1px)}}

.msg{
  flex:0 0 28px;
  color:#ffeab7;
  font-weight:bold;
  text-shadow:0 0 8px #b45cff;
  display:flex;
  align-items:center;
  justify-content:center;
}

.info{
  flex:0 0 42px;
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:4px;
  font-size:10px;
}
.info div{
  background:#030006;
  border:2px solid #8b4dff;
  border-radius:10px;
  padding:2px;
  box-shadow:inset 0 0 12px #000,0 0 8px rgba(160,80,255,.5);
}
.info b{
  font-family:monospace;
  font-size:16px;
  color:#7dff9b;
  text-shadow:0 0 8px #4dff78,0 0 14px #4dff78;
}

.controlPanel{
  flex:0 0 50px;
  display:flex;
  align-items:center;
  justify-content:center;
}

button{
  border:none;
  border-radius:13px;
  padding:8px 10px;
  margin:2px;
  font-weight:bold;
  color:white;
  background:linear-gradient(#c8a8ff,#6d22c9 45%,#260045);
  box-shadow:0 4px 0 #100018,0 0 9px #8b4dff,inset 0 2px 5px rgba(255,255,255,.45),inset 0 -5px 10px rgba(0,0,0,.45);
}
button:disabled{opacity:.35}

.stopArea{
  flex:0 0 76px;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:5px 4px;
  border-radius:22px;
  background:linear-gradient(180deg,rgba(255,255,255,.12),rgba(0,0,0,.75));
  box-shadow:inset 0 0 14px #000;
}
.stop{
  width:64px;
  height:64px;
  border-radius:50%;
  border:3px solid #3b0000;
  background:radial-gradient(circle at 35% 25%,#ffc0c0,#ff3030 38%,#a00000 68%,#3a0000);
  box-shadow:0 0 16px rgba(255,0,0,.55),0 6px 0 #240000,inset 0 5px 10px rgba(255,255,255,.35),inset 0 -10px 14px rgba(0,0,0,.55);
}
.reset{background:linear-gradient(#888,#111)}

.lowerPanel{
  flex:1 1 auto;
  min-height:135px;
  display:flex;
  flex-direction:column;
}
.lowerPanel .small{flex:0 0 18px}
.lowerWrap{
  position:relative;
  flex:1;
  min-height:0;
  width:100%;
  padding:2px;
  border-radius:16px;
  background:linear-gradient(180deg,rgba(255,255,255,.25),rgba(0,0,0,.5));
  box-shadow:inset 0 0 10px #000;
}
.lowerPanelImg{
  width:100%;
  height:100%;
  object-fit:cover;
  object-position:center;
  border-radius:12px;
  display:block;
  border:2px solid rgba(255,255,255,.18);
  box-shadow:0 0 14px #8b4dff,inset 0 0 12px rgba(255,255,255,.2);
}
.lowerGlow{
  position:absolute;
  top:2px;
  height:calc(100% - 4px);
  width:14.285%;
  opacity:0;
  background:currentColor;
  mix-blend-mode:screen;
  box-shadow:0 0 24px currentColor,0 0 48px currentColor,inset 0 0 38px currentColor;
  border-radius:8px;
  pointer-events:none;
}
.lowerGlow.on{opacity:.45}
.lowerGlow.blink{animation:lowerBlink .5s infinite alternate}
@keyframes lowerBlink{from{opacity:.35}to{opacity:.85}}
.lowerGlow.all{width:100%;left:0;opacity:.25;border-radius:14px}

.bottomUnit{
  flex:0 0 20px;
  border-radius:0 0 20px 20px;
  background:
    linear-gradient(180deg,#333,#080808 55%,#000),
    repeating-linear-gradient(90deg,#111 0,#111 8px,#2d003f 8px,#2d003f 12px);
  box-shadow:inset 0 0 12px #000,0 0 14px #8b4dff;
}

.apoc{box-shadow:0 0 25px #c084ff;background:rgba(70,0,100,.55)}
.flash{animation:flash .25s 8}
@keyframes flash{50%{background:#fff;color:#000}}
.purpleFlash{animation:pflash .25s 12}
@keyframes pflash{50%{box-shadow:0 0 40px #d7a4ff;background:#520078}}
</style>
</head>

<body>
<div class="wrap">
<div id="machine" class="machine">

  <div class="sideMetal left"></div>
  <div class="sideMetal right"></div>
  <div class="speaker left"></div>
  <div class="speaker right"></div>

  <div class="topLed"></div>

  <div id="upperPanel" class="panel topPanel">
    <div class="upperArt">
      <img id="mainPanelImg" class="panelImg" src="seven_seals_panel_normal.png" alt="七つの刻印 通常パネル">
    </div>
  </div>

  <div class="panel statePanel">
    <div>STATE：<span id="stateView" class="state">通常</span></div>
    <div id="modeView" class="small">BETしてください</div>
  </div>

  <div class="reels">
    <div id="r0" class="reel">刻印</div>
    <div id="r1" class="reel">ベル</div>
    <div id="r2" class="reel">リプ</div>
  </div>

  <div id="msg" class="msg">BETしてください</div>

  <div class="info">
    <div>CREDIT<br><b id="creditView">100</b></div>
    <div>BET<br><b id="betView">0</b></div>
    <div>PAY<br><b id="payView">0</b></div>
  </div>

  <div class="panel controlPanel">
    <button id="betBtn">BET</button>
    <button id="maxBetBtn">MAX BET</button>
    <button id="startBtn">START</button>
    <button id="resetBtn" class="reset">RESET</button>
  </div>

  <div class="stopArea">
    <button id="s0" class="stop">STOP</button>
    <button id="s1" class="stop">STOP</button>
    <button id="s2" class="stop">STOP</button>
  </div>

  <div class="panel lowerPanel">
    <div class="small">七守護者 下パネル</div>
    <div class="lowerWrap">
      <img id="lowerPanelImg" class="lowerPanelImg" src="24BE7708-F796-4B2F-BDEA-77A632106F3C.PNG" alt="七守護者 下パネル">
      <div id="lowerAllGlow" class="lowerGlow all"></div>
      <div id="low-pride" class="lowerGlow"></div>
      <div id="low-envy" class="lowerGlow"></div>
      <div id="low-wrath" class="lowerGlow"></div>
      <div id="low-sloth" class="lowerGlow"></div>
      <div id="low-greed" class="lowerGlow"></div>
      <div id="low-gluttony" class="lowerGlow"></div>
      <div id="low-lust" class="lowerGlow"></div>
    </div>
  </div>

  <div class="bottomUnit"></div>

</div>
</div>

<script>
/* JavaScriptはVer.0.3.3と同じ */
</script>
</body>
</html>
