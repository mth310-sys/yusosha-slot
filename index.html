<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>遊創舎スロット Ver.0.5</title>
<style>
*{box-sizing:border-box;}

body{
  margin:0;
  min-height:100vh;
  background:
    radial-gradient(circle at center,#202020 0%,#050505 70%);
  color:white;
  font-family:sans-serif;
  text-align:center;
  overflow-x:hidden;
}

.wrap{
  max-width:390px;
  margin:auto;
  padding:4px;
}

.machine{
  position:relative;
  overflow:hidden;
  background:
    linear-gradient(135deg,#7c7c7c 0%,#1b1b1b 8%,#050505 18%,#171717 50%,#050505 82%,#8b8b8b 100%);
  border:4px solid #bfc4c8;
  border-radius:22px;
  padding:9px;
  box-shadow:
    0 0 22px #0077ff,
    inset 0 0 18px #000,
    inset 0 0 42px #111;
}

.machine::before{
  content:"";
  position:absolute;
  inset:7px;
  border:2px solid #005cff;
  border-radius:17px;
  box-shadow:
    0 0 12px #0095ff,
    inset 0 0 12px #003b88;
  pointer-events:none;
}

.machine::after{
  content:"";
  position:absolute;
  inset:0;
  background:
    linear-gradient(90deg,
      transparent 0%,
      rgba(0,140,255,.35) 3%,
      transparent 6%,
      transparent 94%,
      rgba(0,140,255,.35) 97%,
      transparent 100%);
  pointer-events:none;
  animation:ledPulse 1.4s infinite alternate;
}

.top-led{
  height:14px;
  margin:1px 34px 7px;
  border-radius:0 0 12px 12px;
  background:linear-gradient(90deg,#001633,#009dff,#001633);
  box-shadow:0 0 16px #009dff;
}

.top-panel{
  position:relative;
  z-index:1;
  background:
    radial-gradient(circle at center,#191919,#030303 75%);
  border:2px solid #444;
  border-radius:15px;
  padding:8px 6px;
  margin-bottom:7px;
  box-shadow:
    inset 0 0 18px #000,
    0 0 8px #111;
}

.logo{
  font-size:14px;
  color:#9cff9c;
  font-weight:bold;
  text-shadow:0 0 8px #3cff3c;
}

h1{
  font-size:28px;
  margin:4px 0;
  color:#ffd24a;
  text-shadow:
    0 0 10px #ff9d00,
    0 0 22px #9b5c00;
  letter-spacing:1px;
}

.version{
  font-size:11px;
  color:#eee;
}

.center-panel{
  position:relative;
  z-index:1;
  background:linear-gradient(#060606,#111,#050505);
  border:2px solid #3d3d3d;
  border-radius:15px;
  padding:8px 6px 6px;
  margin-bottom:7px;
  box-shadow:
    inset 0 0 18px #000,
    0 0 7px #001e4d;
}

.reel-area{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:7px;
}

.lamp{
  width:55px;
  height:55px;
  flex:0 0 55px;
  border-radius:8px;
  background:
    radial-gradient(circle,#302200 0%,#120900 70%);
  border:3px solid #b47a00;
  color:#ffd45a;
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:bold;
  font-size:14px;
  box-shadow:
    inset 0 0 10px #000,
    0 0 8px #3b2300;
  position:relative;
}

.lamp::before{
  content:"✦";
  position:absolute;
  top:-14px;
  left:50%;
  transform:translateX(-50%);
  color:#ffc400;
  text-shadow:0 0 8px #ff9d00;
  font-size:19px;
}

.lamp.on{
  background:radial-gradient(circle,#fff47a 0%,#ffd000 45%,#ff9900 100%);
  color:#402000;
  box-shadow:
    0 0 30px gold,
    0 0 60px orange,
    inset 0 0 8px #fff;
  animation:peka 0.65s infinite alternate;
}

.reels{
  display:flex;
  justify-content:center;
  gap:6px;
}

.reel{
  width:75px;
  height:96px;
  background:
    linear-gradient(#ffffff,#e7e7e7 45%,#f7f7f7 55%,#d5d5d5);
  color:#111;
  border-radius:10px;
  border:3px solid #7d7d7d;
  box-shadow:
    inset 0 0 12px #999,
    0 0 0 2px #151515,
    0 0 8px #000;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:30px;
  font-weight:bold;
}

.msg{
  color:#ffd76b;
  font-weight:bold;
  min-height:28px;
  margin:7px 0 1px;
  font-size:19px;
  text-shadow:0 0 9px #b56b00;
}

.msg.big{
  color:#fff200;
  font-size:22px;
  animation:bigFlash 0.55s infinite alternate;
}

.info-panel{
  position:relative;
  z-index:1;
  display:flex;
  justify-content:space-around;
  background:#020202;
  border:2px solid #454545;
  border-radius:13px;
  padding:7px;
  margin-bottom:7px;
  box-shadow:
    inset 0 0 12px #000,
    0 0 7px #002e66;
}

.info-box{
  width:32%;
  border-right:1px solid #252525;
}

.info-box:last-child{
  border-right:none;
}

.info-label{
  font-size:10px;
  color:#e7e7e7;
}

.info-value{
  font-size:29px;
  font-weight:bold;
  color:#ff2c2c;
  font-family:"Courier New",monospace;
  text-shadow:
    0 0 8px red,
    0 0 14px #5a0000;
}

.control-panel{
  position:relative;
  z-index:1;
  display:grid;
  grid-template-columns:1.15fr 1fr 1fr;
  gap:8px;
  background:
    linear-gradient(145deg,#3d3d3d,#0a0a0a 35%,#151515 65%,#555);
  border:2px solid #7f858a;
  border-radius:15px;
  padding:9px;
  margin-bottom:8px;
  box-shadow:
    inset 0 0 14px #000,
    0 0 10px #004eaa;
}

.stop-panel{
  position:relative;
  z-index:1;
  display:grid;
  grid-template-columns:1fr 1fr 1fr;
  gap:8px;
  background:
    linear-gradient(145deg,#2c2c2c,#070707,#2a2a2a);
  border:2px solid #6f767c;
  border-radius:15px;
  padding:10px;
  margin-bottom:8px;
  box-shadow:
    inset 0 0 14px #000,
    0 0 12px #004eaa;
}

button{
  width:100%;
  font-size:15px;
  font-weight:bold;
  padding:10px 2px;
  border:none;
  border-radius:10px;
  color:white;
  letter-spacing:.5px;
  box-shadow:
    inset 0 2px 5px rgba(255,255,255,.65),
    inset 0 -5px 9px rgba(0,0,0,.65),
    0 4px 0 #050505,
    0 0 7px #000;
}

button:active{
  transform:translateY(2px);
  box-shadow:
    inset 0 2px 5px rgba(255,255,255,.35),
    inset 0 -3px 7px rgba(0,0,0,.7),
    0 2px 0 #050505;
}

.btn-lever{
  background:linear-gradient(#ff6f66,#cf1010 45%,#6d0000);
  text-shadow:0 0 8px #ffb0b0;
}

.btn-bet{
  background:linear-gradient(#66ff85,#00a82b 45%,#004f13);
  text-shadow:0 0 8px #b7ffc4;
}

.stop{
  background:linear-gradient(#4fc3ff,#006eff 45%,#001f91);
  font-size:18px;
  padding:14px 2px;
  box-shadow:
    inset 0 2px 6px rgba(255,255,255,.75),
    inset 0 -5px 12px rgba(0,0,0,.7),
    0 4px 0 #030303,
    0 0 15px #008cff;
  text-shadow:0 0 10px #bde9ff;
}

.reset{
  position:relative;
  z-index:1;
  background:linear-gradient(#aaa,#555,#333);
  color:white;
  font-size:12px;
  padding:7px 20px;
  width:auto;
  margin-bottom:5px;
  border-radius:9px;
}

button:disabled{
  opacity:0.35;
}

.role{
  position:relative;
  z-index:1;
  font-size:11px;
  color:#e2e2e2;
  line-height:1.35;
  padding-bottom:2px;
}

.reel.stopFlash{
  animation:stopFlash 0.25s;
}

.payEffect{
  position:fixed;
  top:45%;
  left:50%;
  transform:translate(-50%,-50%);
  font-size:38px;
  font-weight:bold;
  color:#fff200;
  text-shadow:0 0 18px orange;
  display:none;
  pointer-events:none;
  z-index:10;
}

.payEffect.show{
  display:block;
  animation:payPop 1s forwards;
}

.flash{
  animation:screenFlash 0.35s 4;
}

@keyframes ledPulse{
  from{opacity:.55;filter:brightness(1);}
  to{opacity:1;filter:brightness(1.8);}
}

@keyframes stopFlash{
  0%{transform:scale(1.12);}
  100%{transform:scale(1);}
}

@keyframes peka{
  from{transform:scale(1);filter:brightness(1);}
  to{transform:scale(1.08);filter:brightness(1.75);}
}

@keyframes bigFlash{
  from{text-shadow:0 0 8px yellow;}
  to{text-shadow:0 0 24px red;transform:scale(1.05);}
}

@keyframes payPop{
  0%{opacity:0;transform:translate(-50%,-30%) scale(0.5);}
  30%{opacity:1;transform:translate(-50%,-50%) scale(1.2);}
  100%{opacity:0;transform:translate(-50%,-90%) scale(1);}
}

@keyframes screenFlash{
  0%{background:white;}
  100%{background:radial-gradient(circle at center,#202020 0%,#050505 70%);}
}
</style>
</head>

<body>
<div class="wrap">
  <div class="machine">

    <div class="top-led"></div>

    <div class="top-panel">
      <div class="logo">🌱 遊創舎</div>
      <h1>遊創舎スロット</h1>
      <div class="version">Ver.0.5 YD-001完成版</div>
    </div>

    <div class="center-panel">
      <div class="reel-area">
        <div id="lamp" class="lamp">PEKA</div>

        <div class="reels">
          <div id="r1" class="reel">🍒</div>
          <div id="r2" class="reel">🍇</div>
          <div id="r3" class="reel">🔔</div>
        </div>
      </div>

      <div id="msg" class="msg">BETしてください</div>
    </div>

    <div class="info-panel">
      <div class="info-box">
        <div class="info-label">CREDIT</div>
        <div id="credit" class="info-value">50</div>
      </div>
      <div class="info-box">
        <div class="info-label">BET</div>
        <div id="bet" class="info-value">0</div>
      </div>
      <div class="info-box">
        <div class="info-label">PAYOUT</div>
        <div id="pay" class="info-value">0</div>
      </div>
    </div>

    <div class="control-panel">
      <button id="startBtn" class="btn-lever" onclick="start()" disabled>START<br>レバー</button>
      <button class="btn-bet" onclick="betOne()">BET</button>
      <button class="btn-bet" onclick="maxBet()">MAX<br>BET</button>
    </div>

    <div class="stop-panel">
      <button id="s1" class="stop" onclick="stop(0)" disabled>STOP</button>
      <button id="s2" class="stop" onclick="stop(1)" disabled>STOP</button>
      <button id="s3" class="stop" onclick="stop(2)" disabled>STOP</button>
    </div>

    <button class="reset" onclick="resetGame()">リセット</button>

    <div class="role">
      777：BIG 50枚 / 🍇：8枚 / 🔔：10枚 / 🍒：2枚
    </div>

  </div>
</div>

<div id="payEffect" class="payEffect"></div>

<script>
const symbols = ["7","BAR","🍒","🍇","🔔","⭐"];

let credit = 50;
let bet = 0;
let pay = 0;
let reels = ["🍒","🍇","🔔"];
let spinning = [false,false,false];
let timers = [null,null,null];
let stopped = 0;
let bonus = false;

function update(){
  document.getElementById("credit").textContent = credit;
  document.getElementById("bet").textContent = bet;
  document.getElementById("pay").textContent = pay;

  document.getElementById("startBtn").disabled = bet !== 3 || spinning.includes(true);

  for(let i=0;i<3;i++){
    document.getElementById("s"+(i+1)).disabled = !spinning[i];
  }
}

function msg(t,big=false){
  const m = document.getElementById("msg");
  m.textContent = t;
  m.classList.toggle("big",big);
}

function rand(){
  return symbols[Math.floor(Math.random()*symbols.length)];
}

function betOne(){
  if(credit <= 0 || bet >= 3 || spinning.includes(true)) return;

  credit--;
  bet++;
  pay = 0;

  document.getElementById("lamp").classList.remove("on");
  msg(bet === 3 ? "STARTできます" : "BET中");

  update();
}

function maxBet(){
  if(spinning.includes(true)) return;

  while(bet < 3 && credit > 0){
    credit--;
    bet++;
  }

  pay = 0;
  document.getElementById("lamp").classList.remove("on");
  msg(bet === 3 ? "STARTできます" : "クレジット不足");

  update();
}

function start(){
  if(bet !== 3) return;

  stopped = 0;
  pay = 0;
  bonus = Math.random() < 0.06;

  if(bonus){
    document.getElementById("lamp").classList.add("on");
    msg("ペカッ！");
  }else{
    document.getElementById("lamp").classList.remove("on");
    msg("リール回転中");
  }

  for(let i=0;i<3;i++){
    spinning[i] = true;
    timers[i] = setInterval(()=>{
      reels[i] = rand();
      document.getElementById("r"+(i+1)).textContent = reels[i];
    },70);
  }

  update();
}

function stop(i){
  if(!spinning[i]) return;

  clearInterval(timers[i]);
  spinning[i] = false;

  if(bonus){
    reels[i] = "7";
  }else{
    reels[i] = rand();
  }

  const reelEl = document.getElementById("r"+(i+1));
  reelEl.textContent = reels[i];
  reelEl.classList.remove("stopFlash");
  void reelEl.offsetWidth;
  reelEl.classList.add("stopFlash");

  stopped++;

  if(stopped === 3){
    judge();
  }

  update();
}

function showPayEffect(amount){
  if(amount <= 0) return;

  const effect = document.getElementById("payEffect");
  effect.textContent = "+" + amount;
  effect.classList.remove("show");
  void effect.offsetWidth;
  effect.classList.add("show");
}

function judge(){
  if(reels[0] === "7" && reels[1] === "7" && reels[2] === "7"){
    pay = 50;
    credit += pay;
    document.getElementById("lamp").classList.add("on");
    document.body.classList.add("flash");

    setTimeout(()=>{
      document.body.classList.remove("flash");
    },1500);

    msg("BIG BONUS！！",true);
    showPayEffect(pay);

  }else if(reels[0] === "🍇" && reels[1] === "🍇" && reels[2] === "🍇"){
    pay = 8;
    credit += pay;
    msg("ブドウ 8枚");
    showPayEffect(pay);

  }else if(reels[0] === "🔔" && reels[1] === "🔔" && reels[2] === "🔔"){
    pay = 10;
    credit += pay;
    msg("ベル 10枚");
    showPayEffect(pay);

  }else if(reels.includes("🍒")){
    pay = 2;
    credit += pay;
    msg("チェリー 2枚");
    showPayEffect(pay);

  }else{
    pay = 0;
    msg("ハズレ");
  }

  bet = 0;
  update();
}

function resetGame(){
  for(let i=0;i<3;i++){
    clearInterval(timers[i]);
  }

  credit = 50;
  bet = 0;
  pay = 0;
  reels = ["🍒","🍇","🔔"];
  spinning = [false,false,false];
  stopped = 0;
  bonus = false;

  for(let i=0;i<3;i++){
    document.getElementById("r"+(i+1)).textContent = reels[i];
  }

  document.getElementById("lamp").classList.remove("on");
  document.body.classList.remove("flash");
  msg("BETしてください");

  update();
}

update();
</script>
</body>
</html>
