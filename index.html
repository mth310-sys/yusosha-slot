<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>七つの刻印 Ver.0.4.1</title>
<style>
*{box-sizing:border-box}

body{
  margin:0;
  background:#020005;
  color:white;
  font-family:sans-serif;
  text-align:center;
}

.wrap{
  max-width:420px;
  margin:auto;
  padding:4px;
}

.machine{
  position:relative;
  width:100%;
  aspect-ratio:538/983;
  background:url("machine_base_full.png") center/contain no-repeat;
  overflow:hidden;
}

/* リールだけ重ねる */
.reelArea{
  position:absolute;
  left:27%;
  top:41.8%;
  width:46%;
  height:17%;
  display:flex;
  justify-content:space-between;
  align-items:center;
  pointer-events:none;
}

.reel{
  width:31%;
  height:88%;
  display:flex;
  align-items:center;
  justify-content:center;
  overflow:hidden;
  background:transparent;
}

.reel img{
  width:92%;
  height:92%;
  object-fit:contain;
  filter:drop-shadow(0 0 5px rgba(180,92,255,.8));
}

.spin{
  animation:spin .08s infinite;
}

@keyframes spin{
  50%{
    transform:translateY(6px);
    filter:blur(1px);
  }
}

/* 数字だけ重ねる */
.credit,.pay{
  position:absolute;
  top:58.6%;
  font-family:monospace;
  font-size:12px;
  color:#ff2727;
  text-shadow:0 0 6px red;
  pointer-events:none;
}

.credit{left:39.7%}
.pay{left:54.6%}

.betHidden,
.msgHidden,
.stateHidden{
  display:none;
}

/* 透明ボタン */
.hit{
  position:absolute;
  border:none;
  background:transparent;
  color:transparent;
  padding:0;
  z-index:5;
}

.hit:active{
  background:rgba(255,255,255,.15);
  border-radius:50%;
}

/* 画像上のボタン位置 */
#startBtn{
  left:12.5%;
  top:57.7%;
  width:13%;
  height:4%;
}

#maxBetBtn{
  left:26%;
  top:57.7%;
  width:12%;
  height:4%;
}

#resetBtn{
  right:11%;
  top:57.7%;
  width:14%;
  height:4%;
}

#s0{
  left:31%;
  top:63.5%;
  width:10%;
  height:5.8%;
}

#s1{
  left:45.2%;
  top:63.5%;
  width:10%;
  height:5.8%;
}

#s2{
  left:59.5%;
  top:63.5%;
  width:10%;
  height:5.8%;
}

button:disabled{
  pointer-events:none;
}
</style>
</head>

<body>
<div class="wrap">
<div class="machine">

  <div class="reelArea">
    <div id="r0" class="reel"></div>
    <div id="r1" class="reel"></div>
    <div id="r2" class="reel"></div>
  </div>

  <div id="creditView" class="credit">100</div>
  <div id="payView" class="pay">0</div>

  <div id="betView" class="betHidden">0</div>
  <div id="msg" class="msgHidden">BETしてください</div>
  <div id="stateView" class="stateHidden">通常</div>

  <button id="startBtn" class="hit">START</button>
  <button id="maxBetBtn" class="hit">MAX BET</button>
  <button id="resetBtn" class="hit">RESET</button>

  <button id="s0" class="hit">STOP</button>
  <button id="s1" class="hit">STOP</button>
  <button id="s2" class="hit">STOP</button>

</div>
</div>

<script>
const IMG={
  red7:"symbol_red7.png",
  blue7:"symbol_bluepurple7.png",
  bell:"symbol_bell.png",
  cherry:"symbol_cherry.png",
  replay:"symbol_replay.png",
  seal:"symbol_seal.png"
};

const symbols=["赤7","青紫7","ベル","チェリー","リプ","刻印"];

let credit=100;
let bet=0;
let pay=0;
let spinning=false;
let stopCount=0;
let timers=[null,null,null];
let finalReels=["刻印","ベル","リプ"];

const $=id=>document.getElementById(id);

function symbolHtml(name){
  const map={
    "赤7":IMG.red7,
    "青紫7":IMG.blue7,
    "ベル":IMG.bell,
    "チェリー":IMG.cherry,
    "リプ":IMG.replay,
    "刻印":IMG.seal
  };

  return `<img src="${map[name]}" alt="${name}" onerror="this.style.display='none'">`;
}

function setReel(i,name){
  $("r"+i).innerHTML=symbolHtml(name);
}

function update(){
  $("creditView").textContent=credit;
  $("payView").textContent=pay;
  $("betView").textContent=bet;

  $("startBtn").disabled=spinning || bet!==3;
  $("maxBetBtn").disabled=spinning || bet===3 || credit<3;

  for(let i=0;i<3;i++){
    $("s"+i).disabled=!spinning;
  }
}

function maxBet(){
  if(spinning || bet===3 || credit<3)return;

  credit-=3;
  bet=3;
  pay=0;

  update();
}

function drawResult(){
  const r=Math.random();

  if(r<0.015)return ["青紫7","青紫7","青紫7"];
  if(r<0.055)return ["赤7","赤7","赤7"];
  if(r<0.18)return ["ベル","ベル","ベル"];
  if(r<0.30)return ["チェリー","刻印","ベル"];
  if(r<0.43)return ["リプ","リプ","リプ"];
  if(r<0.52)return ["刻印","刻印","刻印"];

  return ["ベル","赤7","リプ"];
}

function start(){
  if(spinning || bet!==3)return;

  spinning=true;
  stopCount=0;
  pay=0;
  finalReels=drawResult();

  for(let i=0;i<3;i++){
    $("r"+i).classList.add("spin");
    timers[i]=setInterval(()=>{
      const s=symbols[Math.floor(Math.random()*symbols.length)];
      setReel(i,s);
    },70);
  }

  update();
}

function stop(i){
  if(!spinning || !$("r"+i).classList.contains("spin"))return;

  clearInterval(timers[i]);
  $("r"+i).classList.remove("spin");
  setReel(i,finalReels[i]);

  stopCount++;

  if(stopCount===3){
    spinning=false;
    resolve();
  }

  update();
}

function resolve(){
  bet=0;

  const result=finalReels.join("");

  if(result==="青紫7青紫7青紫7"){
    pay=100;
    credit+=pay;
    $("stateView").textContent="終焉ノ刻";
    $("msg").textContent="青紫7揃い";
  }
  else if(result==="赤7赤7赤7"){
    pay=50;
    credit+=pay;
    $("stateView").textContent="BONUS";
    $("msg").textContent="赤7 BONUS";
  }
  else if(result==="ベルベルベル"){
    pay=8;
    credit+=pay;
    $("msg").textContent="ベル";
  }
  else if(result==="チェリー刻印ベル"){
    pay=2;
    credit+=pay;
    $("msg").textContent="チェリー";
  }
  else if(result==="リプリプリプ"){
    pay=0;
    $("msg").textContent="リプレイ";
  }
  else if(result==="刻印刻印刻印"){
    pay=0;
    $("stateView").textContent="守護者MODE";
    $("msg").textContent="刻印揃い";
  }
  else{
    pay=0;
    $("msg").textContent="ハズレ";
  }

  update();
}

function reset(){
  credit=100;
  bet=0;
  pay=0;
  spinning=false;
  stopCount=0;

  timers.forEach(t=>clearInterval(t));

  for(let i=0;i<3;i++){
    $("r"+i).classList.remove("spin");
  }

  finalReels=["刻印","ベル","リプ"];

  setReel(0,"刻印");
  setReel(1,"ベル");
  setReel(2,"リプ");

  $("stateView").textContent="通常";
  $("msg").textContent="BETしてください";

  update();
}

$("maxBetBtn").onclick=maxBet;
$("startBtn").onclick=start;
$("resetBtn").onclick=reset;

$("s0").onclick=()=>stop(0);
$("s1").onclick=()=>stop(1);
$("s2").onclick=()=>stop(2);

setReel(0,"刻印");
setReel(1,"ベル");
setReel(2,"リプ");
update();
</script>
</body>
</html>
